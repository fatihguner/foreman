# =============================================================================
# ID GENERATION RULES
# =============================================================================
# Implementation item IDs: "impl-" + zero-padded sequential number (impl-001, impl-002, ...)
# Blocker IDs: "blk-" + zero-padded sequential number (blk-001, blk-002, ...)
# IDs are globally unique within an entrepreneur's memory space
# IDs are never reused, even after items move to history
