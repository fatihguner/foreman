# Solo Skill Relevance Scoring
#
# Assigns a relevance tier to every skill when solo mode is active.
# The orchestrator uses these tiers to adjust routing priority during
# hook matching and skill selection.
#
# Tiers:
#   critical  — Front and center for solopreneurs. Prioritize in routing.
#   high      — Very useful. Normal routing priority.
#   moderate  — Useful but needs significant reframing for solo context.
#   low       — Mostly irrelevant. Apply only when explicitly requested.
#
# 14 categories, 158 skills.

category_defaults:
  frameworks: high
  ai-leadership: moderate
  writing: critical
  leadership: moderate
  game-theory: high
  stoic: critical
  storytelling: critical
  negotiation: critical
  people: critical
  creative: critical
  thinking: critical
  decisions: critical

