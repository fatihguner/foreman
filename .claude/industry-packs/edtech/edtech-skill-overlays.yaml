skill_overlays:

  # ─────────────────────────────────────────────
  # FRAMEWORKS (20 skills)
  # ─────────────────────────────────────────────

  - skill: "porters-five-forces"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "Porter's Five Forces in EdTech must contend with a structural anomaly: the buyer (institution) is not the user (learner), and a powerful intermediary (teacher/instructor) determines whether the product is actually used. Buyer power is extreme because education procurement is consolidated (14,000 US school districts control purchasing for 130,000 schools) and cyclical (tied to budget years). Threat of substitutes is uniquely intense — free, high-quality content (Khan Academy, YouTube, MIT OpenCourseWare, ChatGPT) competes with every paid product. Supplier power includes content creators, subject matter experts, and increasingly AI model providers. Rivalry is shaped by procurement inertia: once a product wins a district, switching costs are high due to curriculum alignment and teacher training investment."
    edtech_anti_patterns:
      - "Analyzing buyer power as though the student is the buyer. In institutional EdTech, the procurement officer or curriculum director holds purchasing authority. Their criteria (compliance, evidence, interoperability) differ entirely from the student's criteria (engagement, ease, relevance)."
      - "Ignoring the 'threat of free.' Khan Academy, YouTube educational channels, and open educational resources (OER) are genuine substitutes that set a price ceiling on many EdTech categories. Any paid product must deliver value that free alternatives cannot."
      - "Underestimating the regulatory force. FERPA, COPPA, state privacy laws, and accessibility requirements function as a de facto sixth force — raising barriers to entry for new competitors but also constraining incumbents."
    edtech_example: "A K-12 math platform uses Porter's Five Forces to map its competitive landscape. Buyer power: concentrated in district math coordinators who evaluate against state standards alignment. Substitutes: Khan Academy Math (free, high quality), IXL (entrenched incumbent), and now AI tutoring via ChatGPT. New entrants: barriers are moderate (compliance requirements, efficacy evidence) but AI-native products are entering rapidly. Supplier power: math content is commoditized but adaptive algorithm talent is scarce. Rivalry: intense within the 'adaptive math' subcategory but most competitors lack efficacy evidence. The analysis reveals that the sustainable competitive advantage is not content (commoditized) or technology (replicable) but efficacy evidence plus teacher adoption support — the combination competitors cannot quickly replicate."
    benchmark_references: ["institutional-churn-rate", "institutional-adoption-rate", "teacher-adoption-rate"]

  - skill: "blue-ocean-strategy"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "Blue ocean strategy is structurally essential for EdTech because the major categories (LMS, assessment, SIS, tutoring) are crowded red oceans with entrenched incumbents. Blue oceans in EdTech emerge from three sources: (1) Underserved stakeholders — products that serve teachers (historically neglected in favor of admin tools) or parents (no seat at the procurement table). (2) Unaddressed learning modalities — micro-learning, project-based learning, social-emotional learning, and skills-based credentialing are emerging spaces. (3) Delivery model innovation — shifting from semester-long courses to just-in-time learning, from content delivery to outcome guarantees, or from institutional licensing to individual subscriptions. The strategy canvas should map value across all three stakeholder groups: what buyers value (evidence, compliance, cost), what implementers value (ease, time savings, PD support), and what users value (engagement, relevance, outcomes)."
    edtech_anti_patterns:
      - "Creating a blue ocean that ignores the procurement channel. A product that is brilliant for learners but impossible to purchase through institutional procurement has found a blue ocean with no water — no viable path to revenue."
      - "Assuming that a new technology (AI, VR, blockchain credentials) automatically creates a blue ocean. Technology is a tool, not a strategy. The blue ocean is the unmet need the technology addresses."
      - "Building for a stakeholder who cannot buy. A product that teachers love but that has no district-level purchase path will remain a passion project, not a business."
    edtech_example: "ClassDojo found a blue ocean by targeting the parent-teacher communication gap — a space that no LMS, SIS, or assessment platform addressed. The strategy canvas showed that existing products over-served administrative workflows and under-served the human relationship between teacher and family. By eliminating complexity (no grades, no assignments, no compliance features) and adding what was missing (real-time behavioral feedback, multimedia sharing, parent translation), ClassDojo created a new category with 50+ million users in 180 countries."
    benchmark_references: ["learner-engagement-rate", "teacher-adoption-rate", "free-to-paid-conversion"]

  - skill: "business-model-canvas"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "The Business Model Canvas in EdTech requires a fundamental structural modification: THREE distinct Customer Segments with different Value Propositions for each. Segment 1 — Buyer (district admin, provost, L&D director): values compliance, evidence, cost-effectiveness, and vendor reliability. Segment 2 — Implementer (teacher, professor, trainer): values ease of use, time savings, professional development support, and classroom management tools. Segment 3 — User (student, employee): values engagement, relevance, outcomes, and (in consumer) fun. Revenue Streams must map to the buyer segment — the user and implementer rarely pay directly. Key Activities must include regulatory compliance, efficacy research, and institutional relationship management alongside product development. Customer Relationships differ radically by segment: transactional with buyers (annual procurement), ongoing with implementers (training, support), and product-driven with users (engagement, retention)."
    edtech_anti_patterns:
      - "Filling the canvas with one Customer Segment. This is the cardinal sin of EdTech strategy. A canvas that names 'schools' as the customer fails to distinguish between the three stakeholders whose needs conflict."
      - "Placing 'great content' or 'engaging learning experience' as the sole Value Proposition. Content quality is necessary but not sufficient. The buyer's value proposition is evidence and compliance; the teacher's is time savings and ease; the student's is engagement and outcomes."
      - "Omitting the implementation cost from the Cost Structure. EdTech products with high implementation burden (teacher training, curriculum alignment, data integration) have structurally different economics than self-serve products."
    edtech_example: "An adaptive reading platform maps three BMCs on one canvas. For the Buyer (district literacy coordinator): Value Proposition is ESSA Tier 2 efficacy evidence, state standards alignment, and FERPA compliance. For the Implementer (reading teacher): Value Proposition is 20 minutes saved per class through automated differentiation, real-time diagnostic reports, and embedded PD. For the User (K-3 student): Value Proposition is personalized stories featuring characters they identify with, immediate positive feedback, and age-appropriate gamification. Revenue flows from the buyer; product engagement comes from the user; adoption depends on the implementer. The canvas reveals that the Key Activity most correlated with revenue is not product development but teacher onboarding — the bridge between purchase and usage."
    benchmark_references: ["average-contract-value", "teacher-adoption-rate", "learner-engagement-rate", "institutional-churn-rate"]

  - skill: "four-ps-marketing"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "The Four Ps in EdTech operate under constraints absent from most industries. Product must serve three stakeholders simultaneously (buyer, implementer, user) and meet regulatory requirements (FERPA, COPPA, accessibility). Price is budget-cycle-dependent — K-12 budgets are approved annually with specific funding windows (Title I, ESSER, state grants); higher ed procurement follows fiscal years; corporate L&D follows quarterly budgets. The pricing ceiling is set by free alternatives (Khan Academy, YouTube, ChatGPT) and the historical expectation that education should be publicly funded. Place (distribution) in EdTech is dominated by institutional procurement channels: conference relationships (ISTE, ASU+GSV, FETC), teacher word-of-mouth networks, district-level RFP processes, state adoption lists, and increasingly, teacher-first freemium-to-institutional conversion. Promotion must reach all three stakeholders through different channels: buyers through evidence and ROI data, implementers through peer networks and PD communities, users through product experience and word-of-mouth."
    edtech_anti_patterns:
      - "Pricing without understanding funding sources. An EdTech product priced at $15/student is affordable for a Title I school with federal funding but impossible for a school relying solely on local budget. Pricing strategy must account for how institutions actually pay."
      - "Marketing only to the buyer. A district administrator who has never seen a teacher use the product will not renew. Promotion must create pull from implementers and users, not just push from the sales team."
      - "Treating 'Place' as a website. EdTech distribution requires deep institutional relationship channels. A conference booth at ISTE, a partnership with a curriculum publisher, and a spot on a state adoption list each represent fundamentally different distribution strategies."
    edtech_example: "A K-12 science simulation platform applies the Four Ps. Product: three-layer design — student-facing simulations (engagement), teacher dashboard with standards-aligned lesson plans (ease), admin reporting with NGSS alignment data (evidence). Price: $5/student/year — priced to fit within Title IV-A allocations and below the threshold requiring school board approval in most districts. Place: teacher-first adoption — free individual teacher accounts, viral spread through teacher PD communities, conversion to school license when 3+ teachers at a school are active, then district-wide licensing through direct sales. Promotion: teacher testimonial videos for implementers, peer-reviewed efficacy study for buyers, student engagement demo for conference presentations."
    benchmark_references: ["average-contract-value", "student-acquisition-cost", "free-to-paid-conversion", "teacher-adoption-rate"]

  - skill: "net-promoter-score"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "NPS in EdTech must be measured and reported as THREE separate scores — one for each stakeholder — because satisfaction diverges dramatically across the buyer-implementer-user chain. A product can have Student NPS of 60 (they love it), Teacher NPS of -10 (it creates extra work), and Admin NPS of 30 (it meets compliance needs but teachers complain). Each NPS score predicts different outcomes: Admin NPS predicts contract renewal; Teacher NPS predicts actual usage and engagement; Student NPS predicts learning outcomes and word-of-mouth. The most dangerous configuration is high Admin NPS with low Teacher NPS — the product will be purchased but not used, leading to poor outcomes and eventual churn. NPS surveys must be timed differently for each segment: students after course completion, teachers mid-semester (after forming opinions but before end-of-year fatigue), administrators after receiving usage and outcome reports."
    edtech_anti_patterns:
      - "Measuring a single blended NPS across all stakeholders. A blended score of 30 could hide Student NPS of 50, Teacher NPS of 5, and Admin NPS of 35 — three completely different stories requiring three different strategies."
      - "Optimizing for student NPS at the expense of teacher NPS. Students may love gamification and social features that teachers find disruptive or irrelevant to learning objectives."
      - "Surveying admin NPS without providing them usage and outcome data first. Administrators cannot form meaningful opinions about an EdTech product they have never directly used — their NPS should be based on evidence of impact, not marketing materials."
    edtech_example: "A language learning platform for higher education measures segmented NPS and discovers a critical pattern: Student NPS is 55 (strong), Professor NPS is 15 (weak), and Department Chair NPS is 40 (moderate). Investigation reveals that professors view the platform as a threat to their pedagogical authority — it assigns exercises and measures progress independently of their syllabus. The fix is not to remove the adaptive features students love but to give professors a 'curriculum alignment' tool that integrates the platform's adaptive exercises into their existing course structure. After launch, Professor NPS rises to 42, and department-wide adoption follows."
    benchmark_references: ["nps-segmented", "teacher-adoption-rate", "institutional-churn-rate"]

  - skill: "product-life-cycle"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "The product lifecycle in EdTech is uniquely constrained by three external calendars that do not exist in other industries. First, the academic calendar: products launch and gain traction during the school year (September-May for K-12) and face a summer valley where engagement drops 30-60%. Second, the curriculum adoption cycle: textbook and core curriculum replacements occur every 5-8 years at the state level (in adoption states), creating windows of opportunity that open and close regardless of product readiness. Third, the budget cycle: institutional purchasing power is concentrated in specific months (May-August for K-12), meaning a product that reaches maturity in November must wait 6 months for the next purchasing window. The lifecycle stages map to EdTech as follows: Introduction = pilot period (typically one semester), Growth = district/institutional expansion, Maturity = category standardization (when the product becomes expected rather than innovative), Decline = curriculum shift or technological disruption."
    edtech_anti_patterns:
      - "Interpreting seasonal engagement drops as product decline. A K-12 product that loses 50% of engagement in June is not in decline — it is subject to the academic calendar. Report lifecycle metrics on an academic-year basis."
      - "Assuming EdTech products have the same iteration speed as consumer software. Curriculum-aligned products cannot pivot mid-semester without disrupting teachers' lesson plans. The iteration cycle aligns with semester boundaries."
      - "Ignoring the textbook replacement cycle. In states with adoption lists (Texas, California, Florida), landing on the state adoption list during a subject review cycle can create 10 years of growth. Missing the window means waiting for the next cycle."
    edtech_example: "An adaptive math platform uses product lifecycle analysis to time its market entry. The product launches pilot (Introduction) in Fall 2025 with 10 schools. Growth phase begins Fall 2026 after one full year of efficacy data. The critical insight: California's math curriculum adoption review occurs in 2027, a once-in-8-years event that determines which math products appear on the state's recommended list. By timing the product lifecycle to have ESSA Tier 3 evidence ready for the California review, the company positions for a state-level growth inflection that competitors who launched later cannot achieve."
    benchmark_references: ["institutional-adoption-rate", "learner-engagement-rate", "content-completion-rate"]

  - skill: "disruptive-innovation"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "EdTech is a textbook arena for disruptive innovation — the theory's originator studied education as a primary case. The disruptive dynamic in EdTech follows a specific pattern: incumbent solutions (textbooks, in-person tutoring, traditional LMS platforms) over-serve institutional requirements (compliance, reporting, administrative control) while under-serving the actual learning experience. Disruption enters through the 'non-consumption' path — reaching learners who have no access to the incumbent solution. Khan Academy disrupted tutoring by making it free. Coursera disrupted university continuing education by making it accessible online. Duolingo disrupted language schools by making learning a mobile habit. The key insight for EdTech founders: disrupt the delivery model, not the content. The content is often similar; the disruption is in who can access it, when, how, and at what cost."
    edtech_anti_patterns:
      - "Trying to disrupt the classroom teacher. Forty years of EdTech history demonstrate that products positioned to 'replace the teacher' fail commercially and pedagogically. The disruption path is augmenting the teacher, not eliminating them."
      - "Equating technology novelty with disruption. VR in classrooms, blockchain credentials, and AI tutors are technologies, not disruptions. They become disruptive only when they enable access or outcomes impossible through existing models."
      - "Ignoring the institutional inertia that sustains incumbents. School districts change suppliers slowly. A disruptive EdTech product must survive 2-5 years of coexistence with the incumbent before achieving meaningful displacement."
    edtech_example: "Quizlet disrupted traditional study methods (flashcards, study guides) by entering through non-consumption — students who could not afford expensive study materials or did not have access to study groups. The free, user-generated flashcard model was 'worse' than professionally created study materials but infinitely more accessible. As Quizlet improved (adding adaptive learning, diagrams, AI explanations), it moved upmarket, eventually competing with commercial test prep and corporate training products. The disruption path was classic: free, simple, and accessible at the bottom, then relentless quality improvement upward."
    benchmark_references: ["free-to-paid-conversion", "learner-engagement-rate", "student-acquisition-cost"]

  - skill: "balanced-scorecard"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "The Balanced Scorecard in EdTech must incorporate a dimension absent from the standard four perspectives: efficacy. Financial: revenue (institutional + consumer), gross margin, CAC, LTV, burn rate. Customer: segmented by all three stakeholders — institutional NPS (buyer), teacher adoption rate (implementer), learner engagement and retention (user). Internal Process: content production velocity, FERPA/COPPA compliance status, accessibility compliance, time to institutional sale, pilot-to-purchase conversion rate. Learning & Growth: instructional design team development, efficacy research pipeline, teacher professional development investment. The fifth dimension — Efficacy: learning outcomes improvement, completion rates, assessment score gains, efficacy evidence tier advancement. This efficacy dimension drives the customer dimension (institutions buy products that work) which drives the financial dimension."
    edtech_anti_patterns:
      - "Omitting the efficacy perspective. An EdTech balanced scorecard without learning outcomes metrics is a SaaS scorecard with education branding. If the product does not measurably improve learning, the business is selling software, not education technology."
      - "Measuring customer satisfaction without stakeholder segmentation. Blended satisfaction metrics hide the buyer-implementer-user divergences that determine renewal and adoption."
      - "Tracking financial metrics on a calendar year when the business is driven by the academic year. EdTech scorecards should align with the September-August cycle for K-12 or the fall-spring semester cycle for higher ed."
    edtech_example: "A corporate L&D platform builds a balanced scorecard with five perspectives. Financial: ARR growth (target: 80% YoY), gross margin (target: 70%), L&D buyer CAC (target: <$15K), enterprise LTV (target: >$100K). Customer: L&D buyer NPS (target: 45), trainer adoption rate (target: 65%), employee engagement rate (target: 55%), completion rate (target: 70%). Internal Process: course creation time (target: <40 hours per course), compliance certification maintenance (target: 100% current), sales cycle length (target: <90 days). Learning & Growth: instructional designer upskilling hours, AI content creation adoption, customer success team certifications. Efficacy: skill assessment improvement (target: 25%), manager-reported behavior change (target: 60%), credential completion rate (target: 50%). The scorecard reveals that high financial growth is masking declining efficacy metrics — new customers are buying but not achieving outcomes, a leading indicator of future churn."
    benchmark_references: ["learner-engagement-rate", "content-completion-rate", "learning-outcomes-improvement", "institutional-churn-rate", "nps-segmented", "gross-margin"]

  - skill: "growth-share-matrix"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "The BCG Growth-Share Matrix applies to EdTech product portfolios across content areas, grade levels, or learner segments. Stars are fast-growing product lines in high-growth segments (e.g., AI tutoring, skills-based credentialing). Cash Cows are mature product lines with strong institutional install bases (e.g., established LMS, core curriculum products with state adoption). Question Marks are new entries in emerging categories (e.g., social-emotional learning tools, micro-credentialing). Dogs are products in declining segments with weak market position (e.g., legacy on-premise products, CD-ROM-era content digitized without redesign). The matrix is particularly useful when EdTech companies diversify across segments (K-12 + higher ed + corporate) or across subject areas."
    edtech_anti_patterns:
      - "Treating an entire K-12 product as one unit. The product serving 3rd-grade reading may be a Star while the 8th-grade version is a Dog. Apply the matrix at the subject-grade level."
      - "Killing 'Dog' products that serve as entry points for institutional relationships. A weak product line that provides a foot in the door for selling the Star product has strategic value beyond its own growth metrics."
      - "Ignoring that education market growth is driven by policy, not market forces alone. A segment can shift from Question Mark to Star overnight when a new state mandate or federal funding program targets it."
    edtech_example: "A K-12 EdTech company maps its portfolio: Math adaptive learning (Star — high growth, strong market position due to ESSA evidence), Reading comprehension (Cash Cow — mature, entrenched in 500+ districts), Social-emotional learning (Question Mark — growing market but the company is one of many unproven entrants), Standardized test prep (Dog — declining as states move away from high-stakes testing). The matrix guides resource allocation: invest heavily in math, harvest reading revenue to fund math growth, make a go/no-go decision on SEL within two quarters, and gradually sunset test prep."
    benchmark_references: ["institutional-adoption-rate", "expansion-revenue-institutional", "learner-engagement-rate"]

  - skill: "swot-pest-analysis"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "SWOT and PEST analysis in EdTech must account for the sector's unique environmental forces. Political: education policy changes (Every Student Succeeds Act, state curriculum standards, federal funding programs like Title I/ESSER), school board politics, teachers' union positions on technology, and state-level textbook adoption lists. Economic: school district budget cycles (driven by property tax revenue and federal/state allocations, not market conditions), higher ed enrollment trends (demographic cliff of 2025-2030), and corporate training budget sensitivity to recession. Social: the digital equity divide (not all students have devices/connectivity at home), growing parent activism around screen time and data privacy, teacher burnout driving demand for time-saving tools, and the cultural expectation that education should be free or publicly funded. Technological: AI tutoring and content generation transforming every EdTech category, LMS platform consolidation, interoperability standards (LTI, QTI, xAPI, Ed-Fi), and the shift from content delivery to adaptive learning."
    edtech_anti_patterns:
      - "Treating 'technology' as a strength without specifying which technological capability creates defensible advantage. Every EdTech company has technology. The question is whether the technology creates a data moat, a pedagogical advantage, or merely a better UI."
      - "Ignoring the political dimension. A change in state leadership can add or remove your product from an adoption list, redirect $100M in funding, or mandate a competitor's approach. EdTech companies must monitor policy actively."
      - "Conducting SWOT without distinguishing between segments. The SWOT for a K-12 product is fundamentally different from the SWOT for the same company's higher ed or corporate product."
    edtech_example: "An EdTech company uses PEST to identify a strategic opportunity: the upcoming demographic cliff (2025-2030 decline in US college-age population) is a Social factor that threatens higher ed enrollment. The Economic impact will force universities to seek revenue efficiency. The Political response will likely include increased funding for alternative credentials and skills-based hiring. The Technological shift toward AI-enabled personalization makes smaller cohort instruction more viable. Combined SWOT reveals a blue ocean: mid-tier universities that cannot compete for shrinking traditional student pools but could thrive by offering AI-personalized, shorter-form credential programs to working adults."
    benchmark_references: ["institutional-adoption-rate", "average-contract-value"]

  - skill: "scenario-planning"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "Scenario planning in EdTech must account for three high-variance dimensions absent from other sectors. First, policy scenarios: education funding and mandates change with administrations at federal and state levels. A change in the US Secretary of Education or a state superintendent can redirect billions in purchasing power. Second, calendar scenarios: the academic calendar creates natural planning horizons (semester, academic year) but also cliffs — miss the back-to-school adoption window and wait 12 months. Third, technology disruption scenarios: AI tutoring (ChatGPT, Khanmigo) represents the most significant technology disruption in education since the internet. EdTech companies must scenario-plan for a world where AI tutoring is ubiquitous, free, and good enough for most learning tasks. The planning horizon should align with academic years, not calendar quarters."
    edtech_anti_patterns:
      - "Building all scenarios around market growth rates without including a policy disruption scenario. An EdTech company that depends on Title I funding must plan for a scenario where that funding is reduced or redirected."
      - "Treating AI as a distant threat rather than an immediate competitive force. AI tutoring is available now, improving rapidly, and free. Every EdTech scenario plan must include an 'AI good enough' scenario."
      - "Planning on a calendar year when revenue is driven by academic year cycles. The fiscal year should align with the selling season."
    edtech_example: "A test prep company builds three scenarios for the next two academic years: (1) Base: SAT/ACT remain important, states maintain standardized testing, AI tutoring supplements but does not replace structured prep. Revenue grows 20% YoY through institutional and consumer channels. (2) Upside: More states adopt college readiness assessments, creating new institutional demand. The company's adaptive technology outperforms generic AI tutoring on outcome metrics. Revenue grows 40% YoY. (3) Downside: Top universities go test-optional permanently, state testing mandates weaken, and ChatGPT provides 'good enough' test prep for free. Consumer revenue drops 30%; institutional revenue drops 15% as schools deprioritize test prep. Each scenario has a trigger (university testing policy announcements, state legislative actions) and a pre-planned strategic response."
    benchmark_references: ["institutional-adoption-rate", "free-to-paid-conversion", "learner-engagement-rate"]

  - skill: "smart-goals"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "SMART goals in EdTech must align with the academic calendar and account for the multi-stakeholder value chain. Goals should be set on a semester or academic-year basis, not calendar quarters, because the engagement data that measures progress is seasonal. Time-bound must respect the academic rhythm — setting a December goal for K-12 engagement ignores winter break. Measurable in EdTech requires specifying which stakeholder's metric is being targeted: institutional adoption (buyer), teacher activation (implementer), or learner engagement (user). Achievable must account for the procurement cycle — a goal to add 50 new districts in Q1 is unachievable if the budget approval window is Q3."
    edtech_anti_patterns:
      - "Setting calendar-quarter goals in an academic-year business. EdTech goals should be: Fall semester, Spring semester, and Summer (which may be a build/prepare period rather than a growth period)."
      - "Setting a single goal that blends stakeholders. 'Increase engagement by 20%' is meaningless without specifying whose engagement — teacher adoption and student engagement require different strategies."
      - "Setting time-to-value goals without accounting for the fact that teachers need PD before they can use the product, and PD happens on specific calendar days."
    edtech_example: "Instead of 'grow revenue,' an EdTech company sets academic-year goals: (1) Fall 2026: Activate 80% of teachers at newly contracted districts within the first 6 weeks of school through dedicated onboarding support (target: 30 of 38 new districts at 80%+ teacher activation by October 15). (2) Spring 2027: Achieve ESSA Tier 3 efficacy evidence from Year 1 pilot districts with pre/post assessment data (target: statistically significant effect size in 3 of 5 pilot districts). (3) Summer 2027: Convert 60% of pilot districts to multi-year contracts before fall budget deadlines (target: 24 of 40 pilots converting by August 1)."
    benchmark_references: ["teacher-adoption-rate", "learning-outcomes-improvement", "institutional-churn-rate"]

  - skill: "systems-thinking"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "EdTech businesses are complex multi-stakeholder systems with feedback loops that create counterintuitive outcomes. The most important feedback loops: (1) The efficacy loop: better learning outcomes generate better evidence, which drives more institutional adoption, which provides more data, which improves the adaptive algorithm, which improves outcomes further. (2) The teacher adoption spiral: poor teacher adoption leads to low student engagement, which leads to poor outcomes, which leads to institutional churn, which reduces case studies for sales, which makes the next institutional sale harder. (3) The content quality flywheel: more learners generate more interaction data, which identifies content gaps and optimization opportunities, which improves content quality, which improves engagement and outcomes, which attracts more learners. (4) The free content substitution trap: competing with free alternatives (Khan Academy, YouTube, ChatGPT) on price leads to margin compression, which reduces investment in content quality, which makes the free alternative relatively more attractive."
    edtech_anti_patterns:
      - "Treating low student engagement as a product design problem when it is actually a teacher adoption problem. If teachers are not assigning the product, students will not use it — no amount of gamification compensates for institutional non-adoption."
      - "Ignoring time delays in the efficacy loop. Investing in efficacy research today produces evidence in 12-18 months that drives sales 6-12 months later. Companies that cut research spending during cash crunches starve their future sales pipeline."
      - "Optimizing one stakeholder's experience without modeling the impact on others. Adding student-facing social features may improve student NPS while creating classroom management headaches that tank teacher NPS."
    edtech_example: "An EdTech company experiences declining institutional renewals despite stable student engagement metrics. Systems analysis reveals a hidden reinforcing loop: as the product added gamification features to improve student engagement, it inadvertently increased off-task behavior in classrooms (students playing gamified elements instead of learning). Teachers responded by reducing product usage. The engagement metrics looked strong (students were active) but the teacher satisfaction metric was collapsing. The system-level fix required redesigning gamification to reward learning behaviors visible to teachers (completed assignments, mastery demonstrations) rather than generic app engagement."
    benchmark_references: ["teacher-adoption-rate", "learner-engagement-rate", "institutional-churn-rate", "nps-segmented"]

  - skill: "cialdini-influence"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "Cialdini's six principles of influence operate differently across EdTech's three stakeholder groups. For Buyers (institutional administrators): Authority (efficacy evidence, research partnerships, ESSA tier ratings) and Social Proof (peer district adoption, state adoption list inclusion) are dominant. For Implementers (teachers): Social Proof (peer teacher testimonials, education conference presentations) and Commitment/Consistency (teachers who complete PD and set up their classroom are far more likely to adopt) drive behavior. For Users (students): Reciprocity (free access, helpful content) and Liking (relatable content, age-appropriate design) determine engagement. Scarcity operates differently in EdTech — limited-time pricing is less effective because budget cycles are fixed, but 'limited PD spots' or 'early adopter research partnership' create genuine scarcity that motivates institutional action."
    edtech_anti_patterns:
      - "Using consumer SaaS influence tactics (countdown timers, 'limited seats') in institutional EdTech. Procurement officers are not impulse buyers. Influence in institutional sales comes from evidence and peer reference, not urgency."
      - "Over-indexing on student engagement (Liking principle) at the expense of teacher authority (Authority principle). A product students love but teachers do not trust will not survive the institutional adoption chain."
      - "Neglecting the Commitment/Consistency principle in onboarding. Teachers who invest time in setting up their classroom within the product are dramatically more likely to continue using it. Design onboarding to create small commitments that compound."
    edtech_example: "A higher education LMS uses Cialdini's principles to accelerate faculty adoption. Authority: partners with three research universities to publish peer-reviewed studies on learning outcomes. Social Proof: creates a 'Faculty Spotlight' series showcasing how professors at peer institutions use the platform. Commitment: designs a 30-minute 'Quick Start' setup where professors import their syllabus and create one assignment — a small commitment that dramatically increases sustained usage. Reciprocity: offers free instructional design consultation to every new faculty member. The combination drives a 3x improvement in faculty adoption within adopting institutions."
    benchmark_references: ["teacher-adoption-rate", "institutional-adoption-rate", "free-to-paid-conversion"]

  - skill: "kotter-change-model"
    category: "frameworks"
    edtech_relevance: "critical"
    edtech_context: "Kotter's eight-step change model is essential for EdTech because every institutional sale is fundamentally a change management project. Purchasing the product is step zero — the real work is changing teacher behavior, classroom routines, and institutional processes. Step 1 (Create Urgency) in EdTech is often supplied by external data: declining test scores, accreditation reviews, state audit findings, or competitive pressure from peer institutions. Step 2 (Build Coalition) requires champions at multiple levels: an administrative sponsor, a teacher champion, and ideally a parent advocate. Step 5 (Remove Obstacles) typically means addressing professional development gaps, technology infrastructure issues, and schedule conflicts. Step 8 (Anchor in Culture) means the product becomes part of 'how we teach here,' not a temporary initiative that fades with the next administrator."
    edtech_anti_patterns:
      - "Treating the sale as the endpoint rather than the beginning of the change process. EdTech products that invest in sales but not in post-sale implementation support experience the 'bought but not used' phenomenon — high bookings, low renewal."
      - "Skipping Step 2 (Build Coalition) by relying solely on administrative mandates. Top-down mandates without teacher buy-in generate compliance, not adoption. Compliance without engagement produces poor outcomes."
      - "Expecting change to happen in one semester. Meaningful institutional change in education takes 2-3 years. Products must be designed and priced for multi-year adoption journeys."
    edtech_example: "A school district implements a new data analytics platform for personalized learning. Using Kotter's model: (1) Create urgency: state accountability ratings declined for two consecutive years. (2) Build coalition: the assistant superintendent, three teacher-leaders from different grade levels, and two active PTO parents. (3) Vision: 'Every student receiving instruction at their level within two years.' (4) Communicate: monthly updates to all teachers, quarterly community updates. (5) Remove obstacles: dedicated PD days, reduced teacher reporting requirements for the first year, IT infrastructure upgrades. (6) Quick wins: first grading period shows engagement data that teachers find actionable. (7) Build on gains: second semester adds teacher collaboration features. (8) Anchor: after two years, the platform is referenced in the district strategic plan and new teacher orientation."
    benchmark_references: ["teacher-adoption-rate", "institutional-churn-rate", "learning-outcomes-improvement"]

  - skill: "tipping-point"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "EdTech adoption follows tipping point dynamics at both the institutional and individual level. At the institutional level, adoption tips when a critical mass of peer institutions adopts — school districts watch neighboring districts, universities follow peer rankings, and corporations follow industry leaders. The connectors in EdTech are conference presenters, teacher-influencers, and state education technology directors. The mavens are instructional technology coaches, EdTech bloggers, and professional development leaders. The salespeople are energetic teachers who demonstrate the product at conferences and on social media. At the individual level within an institution, adoption tips when approximately 15-25% of teachers actively use the product — at this threshold, peer pressure, shared materials, and hallway conversations drive the remaining adoption without administrative push."
    edtech_anti_patterns:
      - "Trying to reach the tipping point through top-down mandates alone. Mandated adoption creates compliance, not enthusiasm. The tipping point requires genuine advocates, not reluctant compliers."
      - "Ignoring the role of teacher-influencers (the 'connectors' and 'mavens'). A handful of influential teachers with active social media presences and conference speaking roles can drive more adoption than a $500K marketing campaign."
      - "Expecting institutional adoption to tip without reaching the internal teacher adoption threshold first. Districts observe whether the product works within their own pilot schools before expanding."
    edtech_example: "A coding education platform identifies its tipping point strategy. Connectors: 50 teacher-ambassadors who present at state and national conferences and maintain active Twitter/educator communities. Mavens: partnerships with 10 instructional technology coaches who deeply understand the product and recommend it in their consulting work. Salespeople: a student showcase event where students present projects built with the platform to school boards and parent groups. The stickiness factor: a free 'Hour of Code' lesson that any teacher can run without preparation, creating first exposure that leads to deeper exploration. The company targets reaching 20% teacher adoption within pilot districts as the internal tipping point that drives district-wide expansion."
    benchmark_references: ["teacher-adoption-rate", "institutional-adoption-rate", "free-to-paid-conversion"]

  - skill: "trust-equation"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "Trust is existentially important in EdTech because the product handles student data (often children's data) and influences learning outcomes. The Trust Equation (Credibility + Reliability + Intimacy / Self-Orientation) maps to EdTech as follows: Credibility = efficacy evidence, research partnerships, compliance certifications (FERPA, COPPA, SOC 2), and state adoption list inclusion. Reliability = platform uptime during school hours (downtime during a class period is a catastrophe), consistent content quality, and predictable feature releases that do not disrupt mid-semester. Intimacy = understanding the specific school's context, the teacher's pedagogical approach, and the student population's needs. Self-Orientation = transparency about data use, honest communication about product limitations, and prioritizing learning outcomes over engagement metrics that serve the company's growth."
    edtech_anti_patterns:
      - "Investing in Credibility (logos, certifications, awards) while neglecting Reliability (the platform crashes during state testing week, or a critical feature breaks mid-semester). Teachers have zero tolerance for unreliability during instructional time."
      - "Using student engagement data to optimize for company metrics (DAU, session length) rather than learning outcomes. Parents and teachers perceive this as high Self-Orientation — the company cares about its metrics, not their children's learning."
      - "Treating trust-building as a sales activity that ends at purchase. In EdTech, trust must be earned continuously through the implementation process, the teacher's daily experience, and transparent communication about student data handling."
    edtech_example: "A student assessment platform builds trust across the equation. Credibility: publishes all efficacy research (including studies that show limitations), maintains publicly viewable VPAT and FERPA compliance documentation, and partners with university research labs. Reliability: guarantees 99.99% uptime during testing windows with a dedicated incident response team during assessment periods, and freezes feature deployments for the two weeks before and during state testing. Intimacy: assigns a dedicated implementation specialist to each district who attends PD days and understands each school's unique student demographics. Self-Orientation minimized: publishes a Student Data Bill of Rights, never uses student data for advertising, and provides free data portability if the district switches providers."
    benchmark_references: ["ferpa-coppa-compliance-status", "nps-segmented", "institutional-churn-rate"]

  - skill: "doblin-ten-types"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "The Ten Types of Innovation framework is highly instructive for EdTech because the sector over-indexes on Product Performance (content quality, adaptive algorithms) while underinvesting in the other nine types. The most powerful EdTech innovations often come from: Profit Model (shifting from per-student licensing to institution-wide flat-fee, or from one-time purchase to subscription), Network (teacher community and content-sharing ecosystems), Process (AI-enabled content creation at 1/10th traditional cost), Channel (teacher-first bottom-up adoption rather than top-down sales), Customer Engagement (gamification, streaks, social learning), and Service (embedded professional development, implementation support as a service). The framework helps EdTech founders recognize that building better content is necessary but insufficient — the innovation must also address how the product reaches institutions, how teachers adopt it, and how the business model sustains it."
    edtech_anti_patterns:
      - "Treating 'better content' or 'better adaptive algorithm' as sufficient differentiation. Content quality is Product Performance innovation — one of ten types, and the most easily replicated. Sustainable differentiation comes from combining multiple innovation types."
      - "Ignoring Channel innovation. The distribution challenge in EdTech (reaching 14,000 US school districts, 4,000 universities, or 300,000 corporate L&D teams) is harder than the product challenge. Products that innovate on distribution win."
      - "Skipping Service innovation. EdTech products that come with embedded professional development and ongoing teacher support outperform identical products sold without it. Service is an innovation type, not a cost center."
    edtech_example: "Khan Academy's innovation maps across multiple types: Product Performance (adaptive practice exercises), Profit Model (free for learners, funded by philanthropy and district licensing), Channel (direct-to-student free access, bypassing institutional procurement), Customer Engagement (mastery-based progression, energy points, leaderboards), Network (teacher community sharing lesson plans and assignments), and Service (free teacher training and implementation resources). Competitors focused on one or two innovation types could not replicate the combination."
    benchmark_references: ["teacher-adoption-rate", "learner-engagement-rate", "free-to-paid-conversion"]

  - skill: "eisenhower-matrix"
    category: "frameworks"
    edtech_relevance: "high"
    edtech_context: "EdTech founders face extreme prioritization challenges because the multi-stakeholder nature of the business creates demands from every direction simultaneously. Teachers request features (Urgent to them, often Not Important strategically), administrators require compliance documentation (Urgent for the deal, Not Urgent until it is), students generate support requests (Urgent operationally, rarely Important strategically), and the academic calendar creates artificial urgency (everything must ship before September). The Eisenhower Matrix must classify EdTech-specific demands: compliance and accessibility work (Not Urgent/Important — until a deal is blocked, then Urgent/Important), efficacy research (Not Urgent/Important — consistently deprioritized despite being the single most valuable long-term investment), seasonal preparation (Urgent/Important during back-to-school, Urgent/Not Important the rest of the year)."
    edtech_anti_patterns:
      - "Treating every teacher feature request as Urgent/Important. Teachers are the implementers, not the buyers. Their requests deserve respect and a systematic feedback loop, but they should not drive the roadmap away from strategic priorities."
      - "Deprioritizing efficacy research (Not Urgent/Important quadrant) indefinitely. Every semester without outcome data is a semester where institutional sales arguments weaken. Schedule efficacy work as a recurring commitment."
      - "Allowing the back-to-school rush to consume all Q3 engineering capacity. Seasonal urgency is predictable — prepare for it in Q2 so that Q3 execution is smooth, not chaotic."
    edtech_example: "An EdTech CEO reviews her priorities and discovers that 60% of her time is consumed by Urgent/Not Important tasks: responding to individual teacher support requests that should be handled by the CS team, reviewing marketing materials that the marketing lead should own, and attending conference planning meetings. Delegating these frees time for Not Urgent/Important work: building the district-level relationship network for next year's sales cycle, commissioning the efficacy study that will close enterprise deals in 18 months, and developing the product vision for the AI tutoring feature that will define the next growth phase."
    benchmark_references: ["time-to-institutional-sale", "efficacy-evidence-strength"]

  - skill: "organisational-culture"
    category: "frameworks"
    edtech_relevance: "moderate"
    edtech_context: "EdTech organizational culture must bridge two worlds: the mission-driven culture of education (impact, equity, student outcomes) and the performance-driven culture of technology (speed, metrics, growth). The most successful EdTech companies create a 'both/and' culture — rigorous about metrics and genuine about mission. This is harder than it sounds because tension between mission and metrics is constant: shipping a feature that improves engagement (metric) but does not improve learning (mission) is a cultural moment of truth. Hiring is complicated by the same tension: educators bring pedagogical depth but may resist speed and ambiguity; technologists bring execution speed but may lack educational empathy."
    edtech_anti_patterns:
      - "Treating 'mission' as a substitute for competitive compensation and career growth. EdTech's historically lower salaries (justified by mission) lead to talent attrition to higher-paying SaaS companies."
      - "Hiring only educators or only technologists. The best EdTech teams include both — instructional designers who understand pedagogy and product managers who understand software development. The cultural work is integration."
    edtech_example: "An EdTech company establishes a cultural practice called 'Learner Fridays' where every team member (including engineers, sales reps, and finance) spends two hours monthly tutoring students or observing classrooms. This practice bridges the education-technology cultural divide by ensuring everyone on the team has direct experience with the people the product serves. Engineering decisions improve because developers have seen students struggle with their UI. Sales conversations improve because reps can describe real classroom usage."
    benchmark_references: ["nps-segmented", "teacher-adoption-rate"]

  - skill: "thinking-fast-and-slow"
    category: "frameworks"
    edtech_relevance: "moderate"
    edtech_context: "System 1 and System 2 thinking dynamics affect EdTech decision-making at every level. Institutional buyers (System 2 territory) should make evidence-based procurement decisions but often rely on System 1 heuristics: brand familiarity, conference demos, and peer recommendations. Teachers (mixed) make System 1 adoption decisions based on first impressions of the product's interface and initial setup experience. Students (overwhelmingly System 1) decide within seconds whether a learning product is engaging or boring. The EdTech product designer must work with, not against, these thinking modes: design for System 1 in the student experience (intuitive, visually engaging, immediately rewarding) while providing System 2 ammunition (data, evidence, ROI) for the buyer experience."
    edtech_anti_patterns:
      - "Designing the purchasing experience for System 2 (rational evidence) while designing the product experience for System 2 (complex, feature-rich). Students and teachers need System 1 simplicity in the daily product experience."
      - "Assuming institutional buyers make purely rational decisions. Conference booth design, sales rep charisma, and peer influence (System 1 factors) matter as much as efficacy data (System 2 factors) in procurement decisions."
    edtech_example: "An adaptive learning platform applies dual-process theory to its multi-stakeholder design. For students (System 1): immediate visual feedback, no cognitive load from navigation, progress indicators that create dopamine-driven engagement. For teachers (System 1 first contact, System 2 sustained use): a 60-second setup wizard that gets the first assignment live immediately (System 1 ease), with deep customization and data analytics accessible for those who seek it (System 2 depth). For administrators (System 2): a structured evidence package with peer comparison data, efficacy research summaries, and total cost of ownership analysis."
    benchmark_references: ["learner-engagement-rate", "teacher-adoption-rate"]

  # ─────────────────────────────────────────────
  # GAME THEORY (4 skills)
  # ─────────────────────────────────────────────

  - skill: "prisoners-dilemma-and-cooperation"
    category: "game-theory"
    edtech_relevance: "high"
    edtech_context: "The prisoner's dilemma appears in several EdTech competitive dynamics. Pricing: if all EdTech companies in a category hold prices at sustainable levels, the market is healthy. But each company has an incentive to offer deep discounts (or free tiers) to win institutional deals, driving a race to the bottom. Free content: companies that release high-quality free content attract users but reduce willingness to pay across the category. The cooperation question: should EdTech companies participate in open standards and shared data frameworks (cooperate) or build proprietary ecosystems (defect)? The iterated nature of EdTech competition (the same districts renew annually, the same conferences recur) favors tit-for-tat cooperation strategies."
    edtech_anti_patterns:
      - "Racing to free without a monetization strategy. Khan Academy can be free because it is philanthropically funded. For-profit EdTech companies that match free pricing without a sustainable model destroy their own category."
      - "Refusing to participate in interoperability standards (LTI, xAPI, Ed-Fi) to protect lock-in. In EdTech, districts increasingly require interoperability. Non-cooperation on standards loses more deals than it protects."
    edtech_example: "Two competing reading assessment platforms face a classic prisoner's dilemma around data portability. If both offer easy data export, teachers can switch freely — competition is on quality alone. If one offers portability and the other locks data in, the locked platform retains users through friction. Both locking data creates mutual distrust with districts. The cooperative equilibrium — both offering portability — wins because districts increasingly mandate data portability in RFPs, and the cooperative players win the RFPs while the defector loses them."
    benchmark_references: ["institutional-churn-rate", "institutional-adoption-rate"]

  - skill: "information-asymmetry"
    category: "game-theory"
    edtech_relevance: "high"
    edtech_context: "Information asymmetry is pervasive in EdTech and operates in multiple directions simultaneously. The EdTech company knows more about its product's actual efficacy (or lack thereof) than the institutional buyer. The teacher knows more about the product's real classroom utility than either the company or the administrator. The student's actual learning is opaque to everyone unless properly measured. Institutional buyers face adverse selection — they cannot easily distinguish between EdTech products that genuinely improve learning and those that merely look impressive in a demo. This asymmetry has driven the ESSA evidence movement and the growing demand for third-party efficacy validation. Companies that voluntarily reduce information asymmetry (publishing efficacy data, including negative results) build trust that becomes a competitive advantage."
    edtech_anti_patterns:
      - "Exploiting information asymmetry by presenting cherry-picked engagement metrics as evidence of learning improvement. Institutional buyers are becoming sophisticated enough to detect this, and the reputational damage is severe."
      - "Ignoring the information asymmetry between administration and teachers. Products sold to administration based on dashboards and reports fail when teachers discover the product does not work in their classroom reality."
    edtech_example: "A math assessment company reduces information asymmetry by publishing its complete efficacy research — including two studies that showed no significant improvement for specific student subgroups. The transparency initially alarmed the sales team, but the long-term impact was positive: districts trusted the company's claims because they had demonstrated willingness to share unfavorable results. The company's competitive close rate against companies with only positive (cherry-picked) evidence improved by 15%, because procurement committees valued honesty."
    benchmark_references: ["efficacy-evidence-strength", "learning-outcomes-improvement", "institutional-adoption-rate"]

  - skill: "first-mover-strategy"
    category: "game-theory"
    edtech_relevance: "high"
    edtech_context: "First-mover advantage in EdTech is weaker than in most technology markets due to the sector's inherent conservatism and slow adoption cycles. Being first to market with a new EdTech category (VR classrooms, blockchain credentials, AI tutoring) means being first to educate the market — a costly proposition when buyers are risk-averse institutions. However, first-mover advantage in specific niches is powerful: the first product to win a state adoption list slot, the first to achieve ESSA Tier 2 evidence in a category, or the first to build a teacher community around a pedagogy. In EdTech, 'first to trust' often matters more than 'first to market.' The company that builds institutional trust first — through evidence, compliance, and reliable implementation — captures long-term contracts that are difficult for later entrants to displace."
    edtech_anti_patterns:
      - "Assuming first-mover advantage in EdTech works like first-mover advantage in consumer tech. Education adopts slowly. Being first to market by two years may mean absorbing two years of market-education costs while a fast follower enters when the market is ready."
      - "Racing to be first in a new EdTech category without first establishing the institutional trust infrastructure (compliance, evidence, PD) that enables institutional sales."
    edtech_example: "Canvas (Instructure) did not invent the LMS — Blackboard and Moodle preceded it by years. Canvas was a fast follower that entered with a better user experience (teacher-focused design), open standards compliance, and a cloud-native architecture. The first movers had established the category and educated the market; Canvas won by being 'first to trust' with a modern, reliable, teacher-friendly platform. The lesson: in EdTech, being first to the category matters less than being first to solve the adoption barriers."
    benchmark_references: ["institutional-adoption-rate", "teacher-adoption-rate"]

  - skill: "coalition-and-partnership-games"
    category: "game-theory"
    edtech_relevance: "high"
    edtech_context: "Coalition and partnership dynamics in EdTech are uniquely complex because the ecosystem includes unusual partner types: textbook publishers (Pearson, McGraw-Hill, HMH), LMS platforms (Canvas, Google Classroom, Schoology), assessment organizations (College Board, ACT, NWEA), accreditation bodies, teachers' unions, state education departments, and philanthropic funders (Gates Foundation, Chan Zuckerberg Initiative). Coalition strategy must consider: which partnerships provide distribution (LMS integration is critical — a product not integrated with Google Classroom or Canvas is invisible in K-12), which provide credibility (research university partnerships, publisher endorsements), and which create dependency risk (over-reliance on a single platform partner). The Shapley value concept applies: each partner's contribution to the coalition determines their share of value."
    edtech_anti_patterns:
      - "Treating publisher partnerships as simple distribution deals. Publishers (Pearson, McGraw-Hill) are simultaneously partners, competitors, and platforms. The relationship requires careful game-theoretic analysis."
      - "Building exclusively on Google Classroom or Canvas without a platform diversification strategy. Platform dependency in EdTech is as dangerous as it is in SaaS — one API change or competitive move can cut off distribution overnight."
    edtech_example: "A STEM learning platform designs its coalition strategy. Tier 1 (critical integrations): Google Classroom, Canvas, Clever (single sign-on) — these are distribution prerequisites, not optional. Tier 2 (credibility partnerships): Stanford CREDO research partnership for efficacy validation, ISTE certification for teacher trust. Tier 3 (growth coalitions): state-level adoption partnerships in Texas and California during upcoming curriculum review cycles. Tier 4 (strategic hedging): relationship with two textbook publishers simultaneously, ensuring neither becomes a single point of dependency. The coalition game reveals that the most valuable partnership is not the largest company but the one that provides access to the adoption gatekeepers — state curriculum reviewers."
    benchmark_references: ["institutional-adoption-rate", "time-to-institutional-sale"]

  # ─────────────────────────────────────────────
  # NEGOTIATION (3 skills)
  # ─────────────────────────────────────────────

  - skill: "competitive-negotiation"
    category: "negotiation"
    edtech_relevance: "high"
    edtech_context: "Competitive negotiation in EdTech occurs in three primary contexts: institutional procurement (negotiating with district procurement officers who manage fixed budgets with specific funding source constraints), publisher/platform partnerships (negotiating revenue shares and integration terms with entities that are simultaneously partners and potential competitors), and fundraising (negotiating with EdTech-focused investors who apply sector-specific benchmarks). Institutional procurement negotiations are uniquely constrained: budgets are fixed and often tied to specific funding sources (Title I, ESSER, state grants) with usage restrictions. The negotiation is rarely about price alone — it is about contract structure, data handling terms, implementation support, and multi-year commitment."
    edtech_anti_patterns:
      - "Discounting aggressively to win institutional deals. EdTech companies that establish a pattern of deep discounting train procurement officers to always negotiate. Offer implementation support, additional training, or extended pilots instead of price cuts."
      - "Negotiating contract terms without understanding the institution's funding source. Title I funds have different spending restrictions than general funds. A contract structure that aligns with the funding source's requirements closes faster."
      - "Treating every institutional negotiation as transactional. Education relationships are long-term. A school district that feels squeezed in a negotiation will remember at renewal time."
    edtech_example: "A learning analytics company negotiating a $150K district-wide contract faces pressure to discount by 40%. Instead of cutting price, the team identifies that the district's funding comes from a state innovation grant with a 'professional development' line item. They restructure the proposal: $100K for the platform license (10% discount from list) plus $50K for embedded PD services (which can be funded from the PD line item, accessing budget the district could not otherwise use for software). Total contract value unchanged; the district accesses additional funds; and the company delivers PD that increases adoption rates."
    benchmark_references: ["average-contract-value", "time-to-institutional-sale", "institutional-acquisition-cost"]

  - skill: "cooperative-negotiation"
    category: "negotiation"
    edtech_relevance: "high"
    edtech_context: "Cooperative negotiation is the foundation of EdTech partnership development and institutional relationship management. EdTech partnerships include: LMS/platform integrations (building within Canvas, Google Classroom, or Clever ecosystems), content partnerships (co-developing curricula with publishers or subject matter experts), research partnerships (collaborating with universities on efficacy studies), and district partnership models (co-designing implementation with institutional customers). The cooperative dimension is essential because EdTech relationships are long-term by nature — a district contract runs for years, a publisher relationship spans product cycles, and a research partnership produces results over multiple academic years."
    edtech_anti_patterns:
      - "Entering publisher partnerships without clearly defining IP ownership for co-created content. Content ownership disputes in EdTech are common and destructive."
      - "Treating institutional customers as buyers rather than partners. The most successful EdTech companies co-design implementation plans, co-author case studies, and co-present at conferences with their customer districts."
    edtech_example: "A small EdTech company negotiates a content partnership with a major publisher. Rather than accepting the publisher's standard licensing terms (exclusive rights, minimal royalty, publisher-controlled distribution), the company uses cooperative negotiation to propose a deeper structure: co-branded content with shared IP, the EdTech company's adaptive platform delivering the publisher's content, revenue sharing based on institutional sales, and joint marketing at publisher-sponsored events. The cooperative approach creates mutual dependency that protects the smaller company while giving the publisher access to technology it lacks."
    benchmark_references: ["institutional-adoption-rate", "expansion-revenue-institutional"]

  - skill: "delivering-the-deal"
    category: "negotiation"
    edtech_relevance: "high"
    edtech_context: "Deal execution in EdTech has unique characteristics shaped by institutional procurement. Procurement cycles are calendar-driven: K-12 budgets are approved May-August, higher ed procurement follows fiscal years (often July-June), and corporate L&D budgets align with calendar or fiscal year-end. Deals stall in three characteristic ways: (1) compliance review — FERPA/COPPA assessment, data privacy agreement review, accessibility audit, and security questionnaire can each add 2-4 weeks; (2) stakeholder approval chain — curriculum director, IT director, privacy officer, superintendent, and school board may all require sign-off; (3) pilot-to-purchase conversion — free pilots that never convert because no success criteria were defined upfront. The skill of delivering the EdTech deal means preparing compliance documentation proactively, managing the multi-stakeholder approval process, and designing pilots with clear conversion criteria."
    edtech_anti_patterns:
      - "Allowing compliance review to be sequential rather than parallel. Run FERPA review, accessibility audit, and IT security review simultaneously. Sequential processing doubles the timeline."
      - "Running free pilots without defined success metrics and a contractual path to purchase. Open-ended pilots are where EdTech deals go to die."
      - "Missing the budget window. A deal that is ready to sign in September but needed board approval in June will wait 12 months. Work backwards from budget approval dates."
    edtech_example: "An EdTech company creates a 'District Deal Kit' containing: pre-completed Student Data Privacy Agreement (aligned with the SDPC National DPA template), VPAT for accessibility compliance, penetration test results and SOC 2 report, FERPA compliance attestation, a standard order form with three pricing options (per-student, school-level flat fee, district-wide license), and a 90-day pilot agreement with success metrics and auto-conversion clause. This kit reduces average time-to-close from 8 months to 4 months by eliminating the three most common deal stalls before they occur."
    benchmark_references: ["time-to-institutional-sale", "average-contract-value"]

  # ─────────────────────────────────────────────
  # THINKING (3 skills)
  # ─────────────────────────────────────────────

  - skill: "enemies-of-clear-thinking"
    category: "thinking"
    edtech_relevance: "critical"
    edtech_context: "EdTech operators face sector-specific cognitive traps amplified by the mission-driven nature of education and the multi-stakeholder complexity. Survivorship bias: studying Duolingo and Khan Academy while ignoring the thousands of well-funded EdTech companies that failed. Mission creep bias: expanding into every underserved learner population because the mission demands it, rather than focusing on the market segment where the product excels. Availability bias: over-weighting the most vocal teacher's feedback while ignoring usage data from thousands of silent users. Sunk cost fallacy: continuing to invest in content areas or market segments because of existing content investment rather than pivot based on engagement and outcome data. Confirmation bias: interpreting modest engagement as 'teachers love it' while ignoring that 70% of licensed teachers never logged in."
    edtech_anti_patterns:
      - "Using engagement metrics (time on platform, sessions per week) as evidence of learning when they are merely evidence of usage. Engagement without outcomes is entertainment, not education."
      - "Assuming that because the mission is noble, the business model is secondary. The most impactful EdTech companies are commercially sustainable — unsustainable companies cannot serve learners long-term."
      - "Anchoring on the initial target segment (e.g., 'Title I schools') when the product-market fit data points to a different segment (e.g., 'suburban schools seeking enrichment'). Follow the data, not the narrative."
    edtech_example: "An EdTech CEO reviews metrics and concludes the business is healthy: 200,000 registered learners, 45% teacher satisfaction score, and 30 new institutional contracts this year. A clear-thinking advisor spots the hidden problems: of 200,000 registered learners, only 35,000 were active last month (82.5% registered but inactive). The 45% teacher satisfaction is a response rate, not an NPS score — and only enthusiasts respond. Of 30 new contracts, 22 came from a single ESSER funding source that expired in September 2024. Every headline metric masks a structural problem that clear thinking would surface."
    benchmark_references: ["learner-engagement-rate", "teacher-adoption-rate", "nps-segmented"]

  - skill: "evaluating-and-deciding"
    category: "thinking"
    edtech_relevance: "high"
    edtech_context: "EdTech operators make decisions that span the fast-reversible to slow-irreversible spectrum. Fast-reversible: UI changes, gamification adjustments, marketing messaging, individual teacher support approaches. These should be decided and tested within days. Slow-reversible: pricing structure, content format (video vs. text vs. interactive), LMS platform integrations. These take weeks to implement and months to evaluate. Irreversible: curriculum alignment decisions (aligning to Common Core vs. state standards locks product direction), technology architecture (choosing a content delivery approach), market segment focus (K-12 vs. higher ed vs. corporate), and publisher partnerships with exclusivity clauses. The decision framework must also account for academic-calendar constraints: decisions that affect the student experience should ship at semester boundaries, not mid-course."
    edtech_anti_patterns:
      - "Applying semester-boundary deliberation to decisions that should be made in days. Testing a new onboarding flow does not require waiting for a semester break."
      - "Making irreversible architecture decisions (monolith vs. microservices, content management approach) with the speed appropriate for reversible UI decisions."
      - "Deciding by committee across all three stakeholder representatives. Buyer-facing decisions need the sales team; teacher-facing decisions need the education team; student-facing decisions need the product team. Assign clear owners."
    edtech_example: "An EdTech product team debates whether to build Spanish language support (irreversible: requires content translation, cultural adaptation, and Spanish-speaking support staff) or improve the analytics dashboard (reversible: UI changes that can be tested and iterated). Using the reversibility framework: invest one sprint in dashboard improvements (test, learn, iterate), then make the Spanish-language decision with data from the customer pipeline — how many deals are blocked by lack of Spanish? The dashboard decision was being treated as equally weighty when it could be resolved in two weeks."
    benchmark_references: ["learner-engagement-rate", "institutional-adoption-rate"]

  - skill: "defining-and-exploring-problems"
    category: "thinking"
    edtech_relevance: "high"
    edtech_context: "Problem definition in EdTech is complicated by the multi-stakeholder value chain — different stakeholders often define the same problem differently. 'Low student engagement' might be defined as: by the admin — 'we are not getting ROI on our technology investment'; by the teacher — 'the product does not fit my lesson flow'; by the student — 'this is boring.' Each definition leads to a different solution. The real problem may be none of these — it may be that the product was purchased for state test prep but deployed in a school that values project-based learning. Exploring the problem requires talking to all three stakeholders and triangulating their perspectives, plus examining the implementation context (how the product was deployed, by whom, with what training, and with what expectations)."
    edtech_anti_patterns:
      - "Defining the problem from one stakeholder's perspective only. The admin who says 'engagement is low' and the teacher who says 'it is too hard to set up' and the student who says 'it is boring' are describing three different symptoms of possibly the same or possibly different root causes."
      - "Assuming the problem is the product when it may be the implementation. An excellent product poorly implemented looks identical to a mediocre product well implemented."
    edtech_example: "A reading platform is experiencing high institutional churn. The obvious problem definition: 'the product does not work.' Multi-stakeholder exploration reveals: administrators are disappointed because the promised test score improvements have not materialized (their problem: unmet expectations set during the sales process). Teachers report the product is useful but they only use it twice a week, not daily as designed (their problem: it does not fit the reading block schedule). Students find the content appropriate but report that 'reading on a screen for 30 minutes hurts their eyes' (their problem: ergonomic). The root cause is not the product or the content — it is a mismatch between the product's intended usage pattern (daily 15-minute sessions) and the deployment pattern (biweekly 30-minute sessions). The fix is implementation coaching, not product changes."
    benchmark_references: ["teacher-adoption-rate", "learner-engagement-rate", "institutional-churn-rate"]

  # ─────────────────────────────────────────────
  # LEADERSHIP & AI (5 skills)
  # ─────────────────────────────────────────────

  - skill: "leading-through-change"
    category: "leadership"
    edtech_relevance: "high"
    edtech_context: "Leading through change in EdTech operates on two levels simultaneously: internal organizational change (scaling the team, pivoting the product, adjusting the business model) and external institutional change (helping customer institutions adopt the product, which is itself a change management process). The EdTech leader must be a change management expert not just for their own company but for their customers' organizations. Every institutional sale creates a change initiative within the customer organization — new workflows for teachers, new expectations for students, new data for administrators. EdTech leaders who understand this become strategic advisors to their customers, not just vendors."
    edtech_anti_patterns:
      - "Underestimating the change resistance within educational institutions. Schools are among the most change-resistant organizations in any sector. Teachers have been 'technologized' repeatedly with tools that increased their workload and disappeared after the grant funding ended."
      - "Applying Silicon Valley change management ('move fast and break things') to education. Institutions that serve children have legitimate reasons for proceeding cautiously."
    edtech_example: "An EdTech CEO leads two simultaneous change initiatives. Internally: restructuring from a content-creation company to a platform company, requiring engineering team expansion, content team reskilling, and go-to-market motion change. Externally: supporting a 500-school district through a three-year technology transformation where the company's product is the cornerstone. The CEO recognizes that the internal change must align with the external change — the platform cannot evolve faster than the district can absorb. The leadership challenge is managing both clocks: startup speed internally, institutional speed externally."
    benchmark_references: ["teacher-adoption-rate", "institutional-churn-rate"]

  - skill: "ai-vision-and-strategy"
    category: "ai-leadership"
    edtech_relevance: "critical"
    edtech_context: "AI is transforming every EdTech category simultaneously, creating the most significant strategic inflection point since the internet entered classrooms. AI tutoring (ChatGPT, Khanmigo, Google's LearnLM) threatens every product that primarily delivers content — if an AI can explain any concept at any level at any time for free, what is the value of a content library? AI assessment threatens every product that primarily measures knowledge — if AI can evaluate open-ended responses, what is the value of a multiple-choice platform? AI content creation threatens every product with a significant content investment — if AI can generate learning materials at near-zero cost, what is the value of expensive human-created content? The strategic question for every EdTech company: what does your product do that AI cannot do alone? The durable answers typically involve: human connection (teacher facilitation, peer learning), institutional trust (compliance, data governance), implementation support (change management, PD), and evidence of outcomes (rigorous efficacy data)."
    edtech_anti_patterns:
      - "Adding 'AI-powered' to the marketing without fundamentally rethinking the value proposition. If the product's core value is content delivery, AI commoditizes that value. A thin AI wrapper does not solve the strategic problem."
      - "Ignoring AI because 'education is human.' AI will not replace teachers, but EdTech products that do not incorporate AI will be replaced by those that do."
      - "Treating AI as purely a cost-reduction tool (cheaper content creation, automated grading) without exploring AI as a value-creation tool (personalized learning paths, real-time formative assessment, natural language tutoring)."
    edtech_example: "A vocabulary learning platform faces the AI question: ChatGPT can teach vocabulary for free. The strategic response: redefine the value proposition from 'content delivery' (commoditized by AI) to 'evidence-based outcomes with institutional accountability.' The product integrates AI-powered personalization and natural language practice, but wraps it in: standards-aligned curriculum (institution value), progress tracking dashboards (teacher value), efficacy evidence (buyer value), and data privacy compliance (trust value). The AI does the teaching; the product does the institutional integration. This is the value AI alone cannot provide."
    benchmark_references: ["efficacy-evidence-strength", "learner-engagement-rate", "gross-margin"]

  - skill: "inclusive-leadership"
    category: "leadership"
    edtech_relevance: "high"
    edtech_context: "Inclusive leadership in EdTech carries a unique moral and commercial obligation: the products serve diverse learner populations (different abilities, languages, socioeconomic backgrounds, cultural contexts), and exclusion in the product directly translates to exclusion in learning. Accessibility (ADA/Section 508/WCAG compliance) is not an edge case — it is a legal requirement and an ethical imperative. Multilingual support is not a nice-to-have when serving school districts where 20-40% of students are English Language Learners. Cultural representation in content (images, names, scenarios, contexts) affects whether learners see themselves in the learning experience. Inclusive leadership in EdTech means building teams that reflect the diversity of learners served, testing products with diverse user populations, and making accessibility a first-class design constraint rather than a retrofit."
    edtech_anti_patterns:
      - "Treating accessibility as a compliance checkbox rather than a design principle. Products designed for accessibility from the start are better for all users, not just users with disabilities."
      - "Building content and products that reflect only the dominant cultural context. A math word problem about skiing trips excludes students who have never seen snow. An EdTech company serving a diverse population must audit content for cultural bias."
    edtech_example: "An EdTech company serving K-12 districts in the US Southwest discovers that its reading passages, illustrations, and scenario contexts are overwhelmingly suburban and Anglo-American. Usage data shows significantly lower engagement from Hispanic and Native American students. The inclusive leadership response: hire content creators from the communities served, commission a cultural relevance audit, redesign the adaptive engine to serve culturally relevant content based on school demographics, and create a Community Advisory Board with parents, teachers, and community leaders from underrepresented populations. Engagement gaps close by 40% within one academic year."
    benchmark_references: ["accessibility-compliance-score", "learner-engagement-rate", "nps-segmented"]

  - skill: "employee-engagement-retention"
    category: "leadership"
    edtech_relevance: "moderate"
    edtech_context: "EdTech employee engagement faces a unique tension between mission motivation and market-rate compensation. Many EdTech employees choose the sector because of a genuine desire to improve education, accepting lower-than-market salaries. This mission alignment is a strength until it is exploited — companies that systematically pay below market because 'the mission should be enough' experience talent attrition to higher-paying SaaS companies. The retention challenge is compounded by the academic-calendar-driven work rhythm: intense periods before and during back-to-school season, followed by quieter periods (a pattern that can lead to either burnout or boredom). The most engaged EdTech teams have direct exposure to the learners and teachers they serve."
    edtech_anti_patterns:
      - "Using mission as a justification for below-market compensation indefinitely. Mission attracts talent; fair compensation retains it."
      - "Hiring educators into roles that require technology skills they do not have, then failing to invest in their development. The education-to-tech transition requires genuine support."
    edtech_example: "An EdTech company addresses retention by implementing 'Classroom Connect' — every employee spends one day per quarter in a partner school observing the product in use and talking to teachers and students. This direct mission connection reduces attrition by 25% compared to the previous year, because employees can see the impact of their work. The company also adjusts compensation to 90th percentile of EdTech (not SaaS — that expectation is set clearly in hiring) and offers education stipends for employees' own learning."
    benchmark_references: ["nps-segmented"]

  - skill: "strategic-thinking-and-alignment"
    category: "leadership"
    edtech_relevance: "high"
    edtech_context: "Strategic alignment in EdTech requires reconciling three timelines that rarely sync: the product development timeline (agile sprints, quarterly releases), the academic calendar (semester-based adoption, annual renewals), and the institutional procurement timeline (12-18 month sales cycles, budget-year dependencies). A strategy that is brilliant on a quarterly SaaS cadence may be misaligned with the September-to-June reality of the education market. Strategic alignment also means ensuring that the product, sales, customer success, and research teams share a coherent understanding of which stakeholder problems the company solves, in which order, at which stage of the adoption journey."
    edtech_anti_patterns:
      - "Setting strategy on a SaaS quarterly cadence when the business operates on an academic-year rhythm. Strategic planning should begin in spring for the following academic year."
      - "Misaligning product development and sales timelines. A feature promised for back-to-school that ships in October is worse than a feature that ships a year earlier or a year later — it misses the adoption window."
    edtech_example: "An EdTech company aligns its strategic calendar to the academic year. Q1 (Sept-Nov): deploy and support new institutional customers through first semester, collect engagement data. Q2 (Dec-Feb): analyze first-semester data, produce efficacy reports, begin renewal conversations and expansion pitches for existing customers. Q3 (Mar-May): heavy sales season — present evidence and ROI reports for budget decisions, close expansion deals, prospect new institutions. Q4 (Jun-Aug): prepare for back-to-school — onboard new institutional customers, deliver teacher PD, release major product updates. Engineering sprints align with this calendar: no major UX changes September-November (teachers are establishing routines), major releases in July-August (pre-back-to-school)."
    benchmark_references: ["time-to-institutional-sale", "teacher-adoption-rate", "institutional-churn-rate"]
