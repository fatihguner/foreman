# EdTech Industry Pack — Skill Overlays
#
# For 35 of the 158 Foreman skills, this file provides EdTech-specific context
# that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add an EdTech lens.
#
# The defining challenge of applying any framework to EdTech: multi-stakeholder
# value chains. The buyer (district admin, university provost, L&D director) is
# rarely the user (student, employee). The implementer (teacher, professor,
# trainer) sits between them. Every framework must account for this three-layer
# chain — buyer, implementer, user — or risk solving for the wrong stakeholder.
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct EdTech application (strategy, pricing, marketing, adoption)
#   - Frameworks requiring fundamental reinterpretation for EdTech multi-stakeholder dynamics
#   - Decision and thinking skills (procurement complexity demands clear analysis)
#   - Negotiation skills (institutional sales, university partnerships, publisher deals)
#   - Leadership skills most affected by education-sector organizational dynamics
#   - Game theory skills applicable to EdTech competitive and partnership strategy
#
# Relevance tiers:
#   critical — The EdTech overlay materially changes how the skill is applied.
#              The skill executor should always surface EdTech context.
#   high     — EdTech context adds significant value. Surface when relevant.
#   moderate — Useful EdTech framing but the base skill works well as-is.

