# EdTech Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for EdTech companies. The output agent loads these rules
# when generating documents with the EdTech industry pack active.
#
# Key EdTech template principles:
#   1. Institutional vs. consumer distinction in every investor/board template —
#      EdTech companies must clearly delineate B2B (institutional) and B2C (consumer)
#      metrics, strategies, and narratives.
#   2. Efficacy data in every product template — learning outcomes evidence is
#      expected in any document that discusses product performance.
#   3. Multi-stakeholder analysis in every strategic template — buyer, implementer,
#      and user perspectives must be addressed separately.
#   4. Academic calendar awareness — planning templates must align with the
#      September-August (K-12) or semester-based (higher ed) rhythm.
#
# Adaptation types:
#   as-is    — The template works without modification for EdTech companies.
#   modified — The template requires field changes, additional sections, or
#              reframing of existing sections for EdTech context.

pack_metadata:
  sector: "edtech"
  display_name: "EdTech"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech unit economics must be reported separately for institutional and consumer segments because the metrics, benchmarks, and economics diverge completely. Institutional: ACV, institutional CAC, institutional LTV, teacher adoption rate as a unit-economics driver. Consumer: revenue per learner, student CAC, LTV by subscription tier, free-to-paid conversion rate."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "Revenue Segmentation: Institutional vs. Consumer"
        sector_guidance: "Report separately: Institutional (total contract revenue, ACV, revenue per institution, revenue per learner within institutions) and Consumer (subscription revenue, revenue per paying learner, ARPU by tier). Blended metrics are misleading — always segment."
      - field: "Cost per unit"
        sector_label: "Acquisition Cost (Dual-Channel)"
        sector_guidance: "Institutional CAC: include sales salaries, conference expenses, pilot costs, compliance documentation, and implementation support. Consumer CAC: include marketing, content marketing, app store optimization, and referral program costs. Report student-level CAC derived from institutional deals."
      - field: "Margin per unit"
        sector_label: "Gross Margin by Revenue Type"
        sector_guidance: "EdTech COGS includes content creation/licensing amortization, hosting, instructor costs (for live models), support, and implementation. Segment margins: pure platform (70-80%), content marketplace (55-70%), OPM (30-50%), live instruction (20-40%)."
      - field: "Lifetime value"
        sector_label: "LTV by Segment"
        sector_guidance: "Institutional LTV: ACV x average contract duration (in years) x gross margin %. Consumer LTV: ARPU x average subscriber lifetime (months) x gross margin %. Report both alongside the institutional churn rate and learner retention rate that drive them."
      - field: "Acquisition cost"
        sector_label: "CAC Payback Period by Segment"
        sector_guidance: "Institutional: CAC / (ACV x Gross Margin %). Target: < 18 months. Consumer: CAC / (Monthly ARPU x Gross Margin %). Target: < 12 months."
      - field: "Unit economics ratio"
        sector_label: "LTV:CAC by Segment"
        sector_guidance: "Report for each segment. Institutional LTV:CAC above 3x is strong. Consumer LTV:CAC above 3x is challenging to achieve in EdTech due to low consumer willingness to pay."
    sections_to_add:
      - section_name: "EdTech Metrics Dashboard"
        placement: "before:Revenue Segmentation: Institutional vs. Consumer"
        description: "Core EdTech metrics investors expect to see at a glance."
        fields:
          - "Total active learners (MAL)"
          - "Institutional customers (count and ACV)"
          - "Consumer subscribers (count and ARPU)"
          - "Learner engagement rate"
          - "Content completion rate"
          - "Teacher adoption rate (for institutional)"
          - "NPS segmented (learner / teacher / admin)"
      - section_name: "Efficacy Economics"
        placement: "after:LTV:CAC by Segment"
        description: "The relationship between efficacy evidence and unit economics — unique to EdTech."
        fields:
          - "Efficacy evidence tier (ESSA level or equivalent)"
          - "Learning outcomes improvement data (effect size or % gain)"
          - "Efficacy research investment (annual spend)"
          - "Estimated revenue attributable to efficacy evidence (deals won citing evidence)"
      - section_name: "Content Economics"
        placement: "end"
        description: "Content creation and leveraging economics specific to EdTech."
        fields:
          - "Content creation cost per hour of learning"
          - "Content-to-revenue ratio"
          - "Content library size and growth rate"
          - "Content shelf life and update frequency"
    sections_to_remove: []
    benchmark_references: ["average-contract-value", "student-acquisition-cost", "institutional-acquisition-cost", "revenue-per-learner", "gross-margin", "content-creation-cost", "content-to-revenue-ratio", "learner-engagement-rate", "efficacy-evidence-strength"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech investor updates must report metrics on an academic-calendar basis and clearly distinguish institutional from consumer performance. EdTech-specific investors expect efficacy data and adoption metrics alongside financial performance."
    field_changes:
      - field: "Financial highlights"
        sector_label: "EdTech KPIs"
        sector_guidance: "Report: Total Revenue (institutional + consumer), Institutional ARR/ACV, Consumer MRR/ARPU, Growth Rate (YoY for institutional, MoM for consumer), Cash Balance, Runway. Present as a table with current period, prior period, and trend. Note academic calendar context — compare to same period prior year, not prior month, for institutional metrics."
      - field: "Key metrics"
        sector_label: "Adoption and Engagement Metrics"
        sector_guidance: "Report: New institutional customers, Active learners (MAL), Teacher adoption rate (for institutional), Content completion rate, NPS (segmented), and any efficacy milestones. Choose 3-5 metrics most relevant to the current company focus."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include at least one quantified win: a named institution closed (with ACV and learner count), an efficacy milestone (study completed, outcome published), or a product milestone with measurable adoption impact."
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Lead with challenges. Common EdTech challenges to report honestly: seasonal engagement decline, institutional churn at contract boundaries, teacher adoption difficulties, and competition from free alternatives or AI tools."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "EdTech-specific asks: introductions to district superintendents or university provosts, connections to education conference organizers, introductions to potential research partners, and hiring referrals for EdTech hybrid roles."
    sections_to_add:
      - section_name: "Academic Calendar Context"
        placement: "after:EdTech KPIs"
        description: "Context that helps investors interpret metrics against the academic calendar."
        fields:
          - "Current position in academic calendar (start of year, mid-year, end of year, summer)"
          - "Seasonal adjustment notes (e.g., 'MAL declined 30% due to summer — consistent with prior year')"
          - "Next procurement window timing and pipeline"
    sections_to_remove: []
    benchmark_references: ["average-contract-value", "learner-engagement-rate", "teacher-adoption-rate", "nps-segmented"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech competitive analysis must map competitors across traditional EdTech products, free alternatives, AI tools, and publishers — a broader competitive set than most sectors. The brief must address the unique EdTech dynamic where the most dangerous competitor may be 'no technology at all' or 'free content.'"
    field_changes:
      - field: "Competitor overview"
        sector_label: "EdTech Competitive Map"
        sector_guidance: "Map competitors across four categories: (1) Direct EdTech competitors — same category, same segment. (2) Free alternatives — Khan Academy, YouTube, OER, ChatGPT. (3) Publisher-technology hybrids — Pearson, McGraw-Hill, HMH expanding into technology. (4) AI platforms — general-purpose AI providing competing functionality. Position on a 2x2: X-axis = segment (K-12 to Corporate), Y-axis = delivery model (content to platform)."
      - field: "Competitive advantages"
        sector_label: "EdTech Defensibility Analysis"
        sector_guidance: "Assess along EdTech-specific dimensions: efficacy evidence moat (published research), institutional relationships (depth and breadth of school/university partnerships), teacher community (educators who advocate for the product), content depth (proprietary, curriculum-aligned content), data asset (learner interaction data that improves the adaptive engine), and compliance infrastructure (FERPA, COPPA, accessibility certifications)."
      - field: "Competitive threats"
        sector_label: "Threat Vectors"
        sector_guidance: "Categorize: (1) Direct competitor feature parity. (2) Free alternative improvement (Khan Academy adding AI features). (3) AI commoditization (ChatGPT-level tutoring for free). (4) Publisher platform expansion (Pearson building your product's function). (5) Institutional non-adoption (the biggest competitor in EdTech is often 'the way we have always done it')."
    sections_to_add:
      - section_name: "Free Alternative Threat Assessment"
        placement: "after:Threat Vectors"
        description: "Specific assessment of free alternatives that set the price ceiling."
        fields:
          - "Free alternatives available to the target learner population"
          - "Capability comparison: what the free alternative does well vs. what it lacks"
          - "Premium justification: why institutions/learners should pay for this product"
          - "Trend analysis: are free alternatives improving faster than the paid product?"
      - section_name: "AI Disruption Assessment"
        placement: "after:Free Alternative Threat Assessment"
        description: "Assessment of how AI tools affect the EdTech competitive landscape."
        fields:
          - "Which product capabilities can be replicated by general-purpose AI?"
          - "Which capabilities require institutional integration that AI alone cannot provide?"
          - "How is the company incorporating AI to strengthen its position?"
          - "What is the timeline for AI to reach 'good enough' in the product's core function?"
    sections_to_remove: []
    benchmark_references: ["institutional-adoption-rate", "efficacy-evidence-strength", "nps-segmented"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech pitch decks must address investor concerns specific to the sector: long institutional sales cycles, competition from free content, seasonal revenue patterns, and the need for efficacy evidence. The deck should clearly present the institutional vs. consumer model choice and demonstrate efficacy."
    field_changes:
      - field: "Market opportunity"
        sector_label: "EdTech Market Opportunity"
        sector_guidance: "Present TAM/SAM/SOM with EdTech-specific sizing: (target institutions x ACV) for institutional, or (target learner population x willingness to pay x conversion rate) for consumer. Include education spending data (HolonIQ: $6.5T global education, $400B+ EdTech projected by 2030). Address policy tailwinds (digital learning mandates, AI in education adoption)."
      - field: "Business model"
        sector_label: "EdTech Business Model"
        sector_guidance: "Cover: revenue model (institutional licensing, consumer subscription, freemium, OPM, marketplace), pricing structure (per-student, per-seat, institution-wide), customer segments with the buyer-implementer-user distinction, and the go-to-market motion (top-down institutional sales, bottom-up teacher adoption, consumer growth)."
      - field: "Traction"
        sector_label: "EdTech Traction Metrics"
        sector_guidance: "Dedicated slide with: Revenue trajectory (segmented), Active learners (MAL), Institutional customers (count and ACV), Teacher adoption rate, Content completion rate, and Efficacy evidence. This slide must tell both the business story (revenue, growth) and the impact story (learners served, outcomes improved)."
    sections_to_add:
      - section_name: "Efficacy Evidence Slide"
        placement: "after:EdTech Traction Metrics"
        description: "Dedicated efficacy presentation that EdTech investors expect."
        fields:
          - "Learning outcomes data (effect size or improvement percentage)"
          - "Study design description (pilot, quasi-experimental, RCT)"
          - "Student testimonials with quantified impact"
          - "Efficacy roadmap (planned studies and evidence tier advancement)"
      - section_name: "Multi-Stakeholder Value Slide"
        placement: "after:Efficacy Evidence Slide"
        description: "Demonstrates understanding of EdTech's buyer-implementer-user complexity."
        fields:
          - "Buyer value proposition (what the admin/procurement officer gets)"
          - "Implementer value proposition (what the teacher/trainer gets)"
          - "User value proposition (what the learner gets)"
          - "How each stakeholder's needs are served simultaneously"
      - section_name: "Go-to-Market Slide"
        placement: "after:Multi-Stakeholder Value Slide"
        description: "EdTech GTM must address the procurement cycle and multi-stakeholder adoption chain."
        fields:
          - "GTM motion (institutional sales, teacher-first adoption, consumer growth, or hybrid)"
          - "Sales cycle description and optimization strategy"
          - "Teacher adoption strategy (PD, onboarding, community)"
          - "Procurement facilitation (compliance readiness, pilot-to-purchase path)"
    sections_to_remove: []
    benchmark_references: ["average-contract-value", "institutional-adoption-rate", "learner-engagement-rate", "efficacy-evidence-strength", "teacher-adoption-rate"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "An EdTech strategic one-pager must anchor analysis in the multi-stakeholder value chain, efficacy positioning, and the unique competitive dynamics of education markets."
    field_changes:
      - field: "Strategic position"
        sector_label: "EdTech Strategic Position"
        sector_guidance: "Frame in EdTech terms: market segment (K-12 / higher ed / corporate / consumer), stakeholder alignment (which stakeholder is the primary wedge — buyer, teacher, or learner?), competitive differentiation (vs. paid competitors AND free alternatives), and the efficacy moat (strength of outcome evidence)."
      - field: "Key metrics"
        sector_label: "EdTech Health Metrics"
        sector_guidance: "Core 6: Revenue + growth rate, Institutional retention rate, Learner engagement rate, Teacher adoption rate, Efficacy evidence tier, Gross margin. Compare each to EdTech stage-appropriate benchmarks."
    sections_to_add:
      - section_name: "Multi-Stakeholder Alignment Assessment"
        placement: "end"
        description: "Assessment of whether the product serves all three stakeholders in the value chain."
        fields:
          - "Buyer satisfaction and renewal likelihood"
          - "Implementer (teacher/trainer) adoption and satisfaction"
          - "User (learner) engagement and outcome data"
          - "Alignment gaps and strategic implications"
    sections_to_remove: []
    benchmark_references: ["institutional-churn-rate", "learner-engagement-rate", "teacher-adoption-rate", "efficacy-evidence-strength", "gross-margin"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech market sizing must use education-specific methodologies and address unique market dynamics: the role of government funding, policy-driven demand shifts, the academic calendar, and the split between institutional and consumer segments."
    field_changes:
      - field: "Total addressable market"
        sector_label: "EdTech TAM / SAM / SOM"
        sector_guidance: "Use bottom-up sizing by segment: K-12 = (target districts x schools/district x ACV/school), Higher Ed = (target institutions x departments x ACV), Corporate = (target companies x L&D budget allocation). Cross-reference with HolonIQ global EdTech spending data. Address the 'free content' TAM adjustment — not all learners represent revenue potential."
      - field: "Market dynamics"
        sector_label: "Education Market Dynamics"
        sector_guidance: "Address: policy environment (ESSA, state mandates, federal funding programs), procurement cycle structure (budget timing, adoption lists, evaluation processes), competitive landscape (direct, free, AI, publishers), and demographic trends (K-12 enrollment, higher ed demographic cliff, lifelong learning growth)."
    sections_to_add:
      - section_name: "Policy and Funding Environment"
        placement: "after:Education Market Dynamics"
        description: "EdTech-specific analysis of the funding and policy landscape."
        fields:
          - "Federal funding programs relevant to the product (Title I, Title IV, Perkins, WIOA)"
          - "State-level policy tailwinds (digital learning mandates, curriculum adoption cycles)"
          - "Funding sustainability assessment (one-time vs. recurring funding sources)"
      - section_name: "AI Impact on Market"
        placement: "end"
        description: "Assessment of how AI changes the EdTech market opportunity."
        fields:
          - "AI-driven market expansion (new use cases enabled by AI)"
          - "AI-driven market contraction (existing functions commoditized by AI)"
          - "Net market impact and company positioning"
    sections_to_remove: []
    benchmark_references: ["average-contract-value", "institutional-adoption-rate"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech due diligence has specific focus areas: efficacy evidence validation, multi-stakeholder satisfaction assessment, compliance verification (FERPA, COPPA, accessibility), and revenue sustainability analysis given funding-source dependencies."
    field_changes:
      - field: "Financial review"
        sector_label: "EdTech Financial Verification"
        sector_guidance: "Verify: revenue segmentation (institutional vs. consumer), ACV calculation, institutional churn rate (logo and revenue), funding-source dependency analysis (what % of revenue comes from time-limited grants?), seasonal revenue pattern, and gross margin by segment."
      - field: "Operational review"
        sector_label: "Adoption and Retention Review"
        sector_guidance: "Review: teacher adoption rates by institution, learner engagement data by cohort, NPS by stakeholder segment, content completion rates, implementation success rates, and support ticket volume and resolution."
    sections_to_add:
      - section_name: "Efficacy Evidence Due Diligence"
        placement: "after:Adoption and Retention Review"
        description: "EdTech-specific assessment of learning outcomes evidence."
        fields:
          - "Study designs reviewed (pilot, quasi-experimental, RCT)"
          - "Effect sizes and statistical significance of outcome claims"
          - "Independence of research (self-conducted vs. third-party)"
          - "ESSA evidence tier assessment"
          - "Generalizability of results (populations, settings, implementations)"
      - section_name: "Compliance Due Diligence"
        placement: "after:Efficacy Evidence Due Diligence"
        description: "Education-sector regulatory compliance assessment."
        fields:
          - "FERPA compliance verification"
          - "COPPA compliance (if product serves children under 13)"
          - "Accessibility compliance (WCAG 2.1 AA / Section 508 / VPAT status)"
          - "State data privacy agreement participation"
          - "Data handling practices (storage, retention, deletion, portability)"
      - section_name: "Content and IP Review"
        placement: "end"
        description: "Assessment of content assets and intellectual property."
        fields:
          - "Content ownership (original, licensed, user-generated, AI-generated)"
          - "Content update cycle and standards alignment currency"
          - "Content creation cost structure and scalability"
          - "Third-party content licensing terms and renewal risk"
    sections_to_remove: []
    benchmark_references: ["institutional-churn-rate", "learner-engagement-rate", "teacher-adoption-rate", "efficacy-evidence-strength", "ferpa-coppa-compliance-status", "accessibility-compliance-score"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Cap table structure is not EdTech-specific. Standard venture capital cap table formats apply regardless of sector."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech decision rationale memos should frame decisions in multi-stakeholder terms — how does this decision affect the buyer, the implementer, and the user — and reference efficacy implications."
    field_changes:
      - field: "Decision context"
        sector_label: "Decision Context (Multi-Stakeholder)"
        sector_guidance: "Frame the decision through all three stakeholder lenses: How does this affect institutional buyers (procurement, compliance, evidence)? How does this affect teachers/implementers (workflow, time, PD)? How does this affect learners (engagement, outcomes, experience)?"
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech exit scenarios involve acquirer categories specific to the sector: publishers (Pearson, McGraw-Hill, HMH), LMS platforms (Instructure, PowerSchool), assessment companies (ACT, ETS, NWEA), large EdTech platforms (Coursera, Chegg), and PE firms specializing in education (Vista Equity, Thoma Bravo). Valuation multiples differ from general SaaS due to lower growth rates and margin profiles."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "EdTech Valuation Multiples"
        sector_guidance: "EdTech companies are valued on revenue multiples modulated by growth, margins, and institutional retention. Public EdTech comps: Duolingo (premium consumer), Coursera (marketplace), Instructure (institutional platform), PowerSchool (K-12 SIS). Note: EdTech multiples are generally 20-40% lower than general SaaS due to lower growth rates and margin profiles."
      - field: "Potential acquirers"
        sector_label: "EdTech Acquirer Landscape"
        sector_guidance: "Categorize: (1) Publisher acquirers — Pearson, McGraw-Hill, HMH seeking technology capability. (2) Platform acquirers — Instructure, PowerSchool, Google Education seeking content or functionality. (3) Assessment company acquirers — ACT, ETS, NWEA seeking adaptive or content capability. (4) Large EdTech acquirers — Coursera, Chegg, Byju's seeking complementary products. (5) PE acquirers — Vista Equity, Thoma Bravo acquiring profitable EdTech businesses."
    sections_to_add:
      - section_name: "EdTech Valuation Benchmarks"
        placement: "after:EdTech Valuation Multiples"
        description: "Current market multiples for EdTech companies."
        fields:
          - "Public EdTech median revenue multiple (current)"
          - "Growth-adjusted multiples by sub-segment"
          - "Recent comparable EdTech M&A transactions with multiples"
          - "Premium/discount versus general SaaS multiples"
    sections_to_remove: []
    benchmark_references: ["gross-margin", "institutional-churn-rate", "learner-engagement-rate"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech board reviews should be structured around the academic calendar (not fiscal quarters) and include multi-stakeholder metrics, efficacy updates, and compliance status alongside financial performance."
    field_changes:
      - field: "Financial summary"
        sector_label: "EdTech Financial Dashboard"
        sector_guidance: "Present: Revenue by segment (institutional vs. consumer), Institutional ARR waterfall (opening + new + expansion - churn = closing), Consumer MRR trend, Gross margin by segment, Burn rate and runway. Compare to plan and to same period prior academic year (not prior quarter — EdTech is seasonal)."
      - field: "Strategic priorities"
        sector_label: "Academic-Year OKR Progress"
        sector_guidance: "Report against academic-year OKRs (not calendar-year). Flag off-track OKRs with root cause and corrective action. Present next semester's strategic priorities with measurable targets."
      - field: "Risks"
        sector_label: "Risk Dashboard"
        sector_guidance: "Categorize: Product risks (engagement decline, efficacy stagnation, AI displacement), GTM risks (procurement cycle misalignment, pipeline coverage, competitive losses), Compliance risks (FERPA, COPPA, accessibility), Financial risks (funding-source dependency, seasonal cash flow), and Policy risks (federal/state education funding changes, curriculum mandate shifts)."
    sections_to_add:
      - section_name: "Multi-Stakeholder Metrics"
        placement: "before:EdTech Financial Dashboard"
        description: "One-page stakeholder health dashboard."
        fields:
          - "Buyer metrics: institutional retention rate, ACV trend, time to sale"
          - "Implementer metrics: teacher adoption rate, teacher NPS, PD completion rate"
          - "User metrics: learner engagement rate, completion rate, learning outcomes improvement"
          - "NPS by segment (learner / teacher / admin)"
      - section_name: "Efficacy Update"
        placement: "after:EdTech Financial Dashboard"
        description: "Learning outcomes evidence update for the board."
        fields:
          - "Current efficacy evidence tier"
          - "Ongoing and planned efficacy studies"
          - "Key outcome metrics (effect sizes, assessment gains)"
          - "Efficacy-driven business impact (deals won citing evidence)"
      - section_name: "Compliance Status"
        placement: "after:Efficacy Update"
        description: "Regulatory and compliance status report."
        fields:
          - "FERPA/COPPA compliance status"
          - "Accessibility compliance status and audit results"
          - "State DPA participation status"
          - "Any compliance incidents or risks"
    sections_to_remove: []
    benchmark_references: ["institutional-churn-rate", "teacher-adoption-rate", "learner-engagement-rate", "nps-segmented", "efficacy-evidence-strength", "gross-margin"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech board meeting agendas should allocate time to efficacy evidence, multi-stakeholder metrics, compliance, and the academic-calendar-driven planning that shapes EdTech strategy."
    field_changes:
      - field: "Agenda items"
        sector_label: "EdTech Board Agenda"
        sector_guidance: "Standard EdTech board agenda: (1) Multi-stakeholder metrics review — 15 min (pre-read, discussion only; covers buyer, teacher, and learner metrics). (2) Efficacy and compliance update — 10 min (evidence progress, compliance status). (3) Strategic topic deep-dive — 30 min (one topic: AI strategy, segment expansion, teacher adoption, pricing, competitive). (4) Financial and runway — 10 min. (5) CEO asks — 10 min. (6) Executive session — 15 min. Total: 90 minutes. Align meeting cadence with academic year — September (start of year), January (mid-year), May (planning for next year), August (pre-launch review)."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech risk categories include sector-specific risks: regulatory compliance (FERPA, COPPA, state privacy laws), accessibility litigation, policy changes affecting funding, academic calendar revenue concentration, free content substitution, and AI disruption."
    field_changes:
      - field: "Risk categories"
        sector_label: "EdTech Risk Categories"
        sector_guidance: "Include EdTech-specific categories: (1) Compliance risk — FERPA/COPPA violation, accessibility lawsuit, state privacy law non-compliance. (2) Funding risk — dependency on time-limited government funding, policy changes affecting education budgets. (3) Adoption risk — teacher adoption failure, engagement collapse, efficacy evidence shortfall. (4) Competitive risk — free alternative improvement, AI commoditization, publisher expansion. (5) Seasonal risk — revenue concentration, cash flow gaps between procurement cycles."
    sections_to_add:
      - section_name: "Compliance Risk Detail"
        placement: "end"
        description: "Detailed assessment of education-specific regulatory risks."
        fields:
          - "FERPA/COPPA compliance exposure and mitigation status"
          - "Accessibility compliance exposure (ADA/Section 508 litigation risk)"
          - "State privacy law compliance (number of states with coverage)"
          - "Data breach preparedness and notification procedures"
      - section_name: "Policy and Funding Risk"
        placement: "after:Compliance Risk Detail"
        description: "Assessment of policy-driven revenue risk."
        fields:
          - "Revenue percentage dependent on specific government funding programs"
          - "Policy changes under consideration that could affect the market"
          - "Scenario analysis for funding reduction or redirection"
    sections_to_remove: []
    benchmark_references: ["ferpa-coppa-compliance-status", "accessibility-compliance-score", "institutional-churn-rate"]

  - template: "change-initiative-proposal"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech change initiatives must account for the academic calendar — changes that affect the product experience should be implemented at semester boundaries, and changes that affect institutional relationships should align with budget cycles."
    field_changes:
      - field: "Implementation timeline"
        sector_label: "Academic-Calendar-Aligned Implementation"
        sector_guidance: "Align implementation phases with the academic calendar. Product changes: ship during summer (July-August) or winter break (December-January). Pricing changes: implement before the spring budget approval season (March-May). Sales process changes: implement before the primary selling season. Never deploy major UX changes mid-semester."
