    field_changes:
      - field: "Compensation benchmarks"
        sector_label: "EdTech Compensation Benchmarks"
        sector_guidance: "Use EdTech-specific comp data: Pave, Carta (equity), and EdSurge/ISTE salary surveys (education roles). EdTech compensation typically runs 10-25% below equivalent SaaS roles — set expectations accordingly during hiring. Benchmark separately for technology roles (compete with SaaS), education roles (compete with schools and publishers), and hybrid roles (scarce, command premium)."
