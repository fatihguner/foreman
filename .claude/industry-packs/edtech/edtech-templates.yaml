  - template: "quarterly-business-review"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech QBRs (Quarterly Business Reviews, often Semester Reviews in education) are the primary institutional retention and expansion vehicle. The review must address all three stakeholders with data tailored to each: administrators care about ROI and compliance, teachers care about usage and classroom impact, and efficacy data connects both."
    field_changes:
      - field: "Performance summary"
        sector_label: "Learning Impact Delivered"
        sector_guidance: "Quantify the educational value delivered this period: learning outcomes improvement (assessment gains, skill proficiency advancement), content completion rates, learner engagement statistics, and comparison to institutional goals. Use the institution's own metrics and language — test scores, standards mastery levels, graduation rates — not product metrics."
      - field: "Account status"
        sector_label: "Adoption and Usage Metrics"
        sector_guidance: "Present: teacher activation rate, active learners vs. licensed learners, feature adoption by module, usage patterns by grade/department/team, and comparison to peer institutions in similar demographics."
      - field: "Next steps"
        sector_label: "Expansion and Deepening Opportunities"
        sector_guidance: "Identify expansion: additional grade levels, subjects, departments, or campuses. Deepening: additional modules, premium features, or deeper integration. Frame as educational outcomes, not product upsells: 'Based on success in 3rd grade math, 4th grade teachers have expressed interest in the same approach.'"
    sections_to_add:
      - section_name: "Efficacy Report"
        placement: "before:Learning Impact Delivered"
        description: "Learning outcomes evidence specific to this institution."
        fields:
          - "Pre/post assessment results (if available)"
          - "Learning outcomes improvement vs. institution's goals"
          - "Comparison to efficacy benchmarks from research"
          - "Teacher-reported impact on instruction"
      - section_name: "Teacher Adoption Report"
        placement: "after:Adoption and Usage Metrics"
        description: "Detailed teacher adoption and satisfaction data."
        fields:
          - "Teacher activation rate and trend"
          - "Teacher NPS"
          - "Professional development completion"
          - "Teacher support requests and resolution"
    sections_to_remove: []
    benchmark_references: ["teacher-adoption-rate", "learner-engagement-rate", "content-completion-rate", "learning-outcomes-improvement", "nps-segmented"]

  - template: "onboarding-welcome-packet"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech onboarding must address all three stakeholders separately: administrators need compliance documentation and reporting setup, teachers need PD and classroom integration guidance, and students need age-appropriate product orientation. Time to value is measured in academic terms: the product must be functional before the first class session."
    field_changes:
      - field: "Getting started steps"
        sector_label: "Multi-Stakeholder Onboarding Path"
        sector_guidance: "Structure onboarding in three parallel tracks: Administrator track: compliance documentation, data integration (SIS, LMS), reporting dashboard setup, success criteria definition — complete before school start. Teacher track: PD session, classroom setup wizard, first lesson plan creation, peer teacher community access — complete within first two weeks of school. Student track: age-appropriate account setup, first learning activity, accessibility accommodations configuration — complete within first class session."
      - field: "Resources"
        sector_label: "Stakeholder-Specific Resources"
        sector_guidance: "Segment resources by stakeholder: Administrators — compliance documentation, data integration guides, ROI measurement framework. Teachers — PD videos, lesson plan library, teacher community forum, classroom management guide. Students — age-appropriate tutorials, help resources, accessibility options."
    sections_to_add:
      - section_name: "Academic Calendar Milestones"
        placement: "end"
        description: "Implementation milestones tied to the academic calendar."
        fields:
          - "Pre-school-year: admin setup, data integration, teacher PD scheduling"
          - "Week 1-2: teacher activation, first student sessions"
          - "Month 1: baseline assessment data collection"
          - "Semester midpoint: first usage review, teacher feedback collection"
          - "Semester end: outcome data collection, renewal conversation"
    sections_to_remove: []
    benchmark_references: ["teacher-adoption-rate", "learner-engagement-rate"]

  - template: "proposal-outline"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech proposals must address institutional procurement requirements: alignment with standards, compliance documentation, efficacy evidence, implementation support, and pricing structured around institutional budget categories."
    field_changes:
      - field: "Pricing"
        sector_label: "Investment, Funding Alignment, and ROI"
        sector_guidance: "Present: pricing options (per-student, per-school, district-wide), alignment with common funding sources (Title I, Title IV-A, state grants — specify which line items the product fits under), implementation costs, PD costs, and a clear ROI model using education-specific metrics (cost per student outcome improvement, instructional time saved per teacher)."
      - field: "Scope"
        sector_label: "Implementation Scope and Academic Calendar Alignment"
        sector_guidance: "Define implementation phases aligned with the academic calendar: pre-year setup, teacher PD, student onboarding, mid-year check-in, year-end assessment. Specify the institution's time commitment by role (admin hours, teacher hours, IT hours). Set expectations for time to measurable outcomes (typically one full semester minimum)."
    sections_to_add:
      - section_name: "Efficacy Evidence"
        placement: "before:Investment, Funding Alignment, and ROI"
        description: "Learning outcomes evidence to support the purchasing decision."
        fields:
          - "Published efficacy research (studies, effect sizes, populations)"
          - "Similar institution case studies with quantified outcomes"
          - "Standards alignment documentation"
          - "Proposed pilot with built-in measurement"
      - section_name: "Compliance Documentation"
        placement: "after:Implementation Scope and Academic Calendar Alignment"
        description: "Compliance documentation that institutional buyers require."
        fields:
          - "FERPA compliance attestation"
          - "COPPA compliance (if applicable)"
          - "Data Privacy Agreement (aligned with SDPC template)"
          - "Accessibility documentation (VPAT)"
          - "Security documentation (SOC 2, penetration test results)"
    sections_to_remove: []
    benchmark_references: ["average-contract-value", "efficacy-evidence-strength", "ferpa-coppa-compliance-status"]

  - template: "service-level-agreement"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech SLAs must address education-specific requirements: platform availability during school hours (not 24/7 — school hours are more critical than overnight), data handling for student records, and support response times aligned with the instructional day."
    field_changes:
      - field: "Service levels"
        sector_label: "Education Service Commitments"
        sector_guidance: "EdTech-specific SLA components: (1) Uptime during school hours (99.9% Monday-Friday 7AM-5PM local time — more critical than overall uptime). (2) Assessment window protection (99.99% during state testing periods). (3) Support response times (P0 during school hours: 30 minutes; P1: 2 hours; P2: 1 business day). (4) Student data handling commitments (FERPA-compliant storage, retention, deletion). (5) Content accuracy commitment (curriculum-aligned, standards-current). (6) Accessibility maintenance (WCAG 2.1 AA ongoing compliance)."
      - field: "Remediation"
        sector_label: "Credit and Remediation Terms"
        sector_guidance: "Define: service credit structure for school-hours outages (higher credits for instructional time disruption), termination rights for sustained availability failures during assessment windows, and data portability upon contract termination (student data must be exportable and deletable per FERPA)."
    sections_to_add:
      - section_name: "Student Data Terms"
        placement: "end"
        description: "Student data handling commitments standard in EdTech contracts."
        fields:
          - "Data ownership (institution retains ownership of all student data)"
          - "Data use restrictions (FERPA-compliant, no advertising, no secondary use)"
          - "Data retention and deletion schedule"
          - "Data portability upon contract termination"
          - "Sub-processor disclosure and compliance"
          - "Breach notification procedure and timeline"
    sections_to_remove: []
    benchmark_references: ["ferpa-coppa-compliance-status"]

  - template: "project-status-update"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech implementation status updates should track progress toward the academic milestones that determine success — teacher activation before school starts, student engagement in the first weeks, and baseline assessment data collection."
    field_changes:
      - field: "Progress summary"
        sector_label: "Implementation Progress (Academic Calendar)"
        sector_guidance: "Track against academic-calendar-aligned milestones: Are teachers activated before classes start? Is student onboarding complete within the first week? Is baseline data being collected? Report teacher activation rate, student activation rate, and any blockers — especially institutional blockers (IT delays, schedule conflicts, PD session cancellations)."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["teacher-adoption-rate", "learner-engagement-rate"]

  - template: "analysis-report"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech analysis reports for institutional clients should present findings through the lens of educational outcomes and include multi-stakeholder data."
    field_changes:
      - field: "Findings"
        sector_label: "Findings (by Stakeholder)"
        sector_guidance: "Structure findings by stakeholder: What the data shows for institutional decision-makers (ROI, compliance, usage benchmarks), for teachers (classroom impact, time savings, PD effectiveness), and for learners (engagement, outcomes, experience). Include comparison to peer institutions and to efficacy research benchmarks."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["learning-outcomes-improvement", "learner-engagement-rate", "teacher-adoption-rate"]

  - template: "case-study-template"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "EdTech case studies must present quantified learning outcomes (not just business outcomes) and address all three stakeholders to be useful as sales tools for institutional procurement."
    field_changes:
      - field: "Results"
        sector_label: "Quantified Learning and Business Outcomes"
        sector_guidance: "Every EdTech case study must include: (1) Learning outcomes — assessment gains, skill proficiency improvement, completion rates (with sample sizes and methodology). (2) Teacher impact — time saved, satisfaction scores, adoption rates. (3) Institutional impact — cost per student outcome, ROI calculation, comparison to prior approach. Abstract outcomes are insufficient — buyers need numbers to build internal business cases."
      - field: "Challenge"
        sector_label: "Educational Challenge and Institutional Context"
        sector_guidance: "Include: the educational challenge (achievement gap, disengagement, skills gap), what the institution was doing before, what triggered the evaluation, the procurement process and decision factors, and the institution's demographic context (so prospects can determine if they are similar)."
    sections_to_add:
      - section_name: "Implementation Details"
        placement: "after:Quantified Learning and Business Outcomes"
        description: "Practical details about how the product was deployed."
        fields:
          - "Implementation timeline (from purchase to full deployment)"
          - "Teacher PD and onboarding approach"
          - "Student population served (demographics, grade levels, subjects)"
          - "Integration with existing technology stack (LMS, SIS)"
          - "Time to first measurable outcomes"
      - section_name: "Multi-Stakeholder Testimonials"
        placement: "after:Implementation Details"
        description: "Testimonials from each stakeholder group."
        fields:
          - "Administrator quote (focus on ROI, evidence, decision validation)"
          - "Teacher quote (focus on classroom impact, ease, time savings)"
          - "Student quote or outcome story (focus on engagement, learning, experience)"
    sections_to_remove: []
    benchmark_references: ["learning-outcomes-improvement", "teacher-adoption-rate", "content-completion-rate"]

