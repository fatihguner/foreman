        sector_guidance: "Identify the single most important thing for the week. In EdTech, this is often calendar-driven: during back-to-school, it is new customer onboarding; during mid-year, it is efficacy data collection; during spring, it is renewal conversations; during summer, it is product updates and PD preparation."
