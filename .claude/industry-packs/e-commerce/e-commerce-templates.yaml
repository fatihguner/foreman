# E-Commerce Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for e-commerce companies. The output agent loads these
# rules when generating documents with the e-commerce industry pack active.
#
# E-commerce template adaptations reflect the physical product reality:
# unit economics are per-order (not per-subscription), investor materials
# must distinguish GMV from revenue and show cohort repeat purchase data,
# operational templates must address inventory planning, fulfillment, and
# seasonal preparation. Returns, shipping costs, and COGS are first-class
# fields throughout.
#
# Adaptation types:
#   as-is    — The template works without modification for e-commerce.
#   modified — The template requires field changes, additional sections, or
#              reframing for e-commerce context.

pack_metadata:
  sector: "e-commerce"
  display_name: "E-Commerce"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce unit economics are fundamentally per-order, not per-subscription. The waterfall from gross revenue to contribution margin must include COGS, fulfillment, shipping, payment processing, and returns — each as explicit line items. Investors evaluate e-commerce unit economics as a variable-cost stack, not a recurring revenue model."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "Average Order Value (AOV)"
        sector_guidance: "Report AOV net of discounts. Show AOV trend (3-month, 6-month, 12-month). Segment AOV by channel (DTC, Amazon, wholesale) if applicable."
      - field: "Cost per unit"
        sector_label: "Per-Order Cost Waterfall"
        sector_guidance: "Present as a waterfall from AOV to contribution margin: AOV - COGS - Fulfillment Cost - Shipping Cost - Payment Processing Fee - Returns Cost = Contribution Margin. Show each component as both dollar amount and percentage of AOV."
      - field: "Margin per unit"
        sector_label: "Contribution Margin per Order"
        sector_guidance: "Report both dollar amount and percentage. This is the true per-order economics after all variable costs. Target: >20% for institutional investment."
      - field: "Lifetime value"
        sector_label: "Customer Lifetime Value (LTV)"
        sector_guidance: "Calculate as AOV x Gross Margin % x Purchase Frequency x Average Customer Lifespan. Alternatively: AOV x Gross Margin % / (1 - Repeat Purchase Rate). Disclose repeat rate assumption and observed customer lifespan."
      - field: "Acquisition cost"
        sector_label: "Customer Acquisition Cost (CAC)"
        sector_guidance: "Report fully loaded CAC (all marketing spend, creative, agency fees, and allocated team time). Break out by channel: paid social, paid search, email, organic, influencer. Report blended and marginal CAC."
      - field: "Unit economics ratio"
        sector_label: "LTV:CAC Ratio"
        sector_guidance: "Report the ratio and compare to the 3:1-5:1 benchmark for e-commerce. If below 3:1, explain the improvement trajectory (repeat rate increasing, COGS decreasing, or CAC declining)."
    sections_to_add:
      - section_name: "Per-Order Economics Waterfall"
        placement: "before:Average Order Value (AOV)"
        description: "Visual waterfall showing the contribution margin stack. This is the most important slide for e-commerce investors."
        fields:
          - "Gross Revenue per Order (AOV before discounts)"
          - "Discounts & Promotions (% and $)"
          - "Net Revenue per Order"
          - "COGS (% and $)"
          - "Gross Margin per Order"
          - "Fulfillment Cost per Order"
          - "Shipping Cost per Order"
          - "Payment Processing Fee per Order"
          - "Returns Cost per Order (return rate x handling cost)"
          - "Contribution Margin per Order ($ and %)"
      - section_name: "Repeat Purchase & Cohort Analysis"
        placement: "after:LTV:CAC Ratio"
        description: "E-commerce equivalent of SaaS cohort retention — measures repeat purchasing by acquisition cohort."
        fields:
          - "Repeat purchase rate by monthly cohort (3-month, 6-month, 12-month)"
          - "Purchase frequency by cohort vintage"
          - "LTV by cohort (are newer cohorts more or less valuable?)"
          - "Channel-level cohort quality (which acquisition channels produce highest-LTV customers?)"
      - section_name: "Channel Economics Comparison"
        placement: "end"
        description: "Per-order economics by sales channel — critical for omnichannel brands."
        fields:
          - "DTC website: AOV, COGS %, fulfillment %, shipping %, contribution margin %"
          - "Amazon: AOV, COGS %, FBA fees %, Amazon advertising %, contribution margin %"
          - "Wholesale: AOV, COGS %, trade discount %, co-op spend %, contribution margin %"
          - "Other channels: contribution margin comparison"
    sections_to_remove: []
    benchmark_references: ["aov", "cac", "ltv", "contribution-margin", "gross-margin", "fulfillment-cost-per-order", "shipping-cost-pct", "return-rate", "repeat-purchase-rate"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce investor updates must distinguish between GMV and net revenue, report contribution margin, and highlight repeat purchase trends — the metrics that e-commerce investors track monthly."
    field_changes:
      - field: "Financial highlights"
        sector_label: "E-Commerce KPIs"
        sector_guidance: "Report: Net Revenue (after returns and discounts), Contribution Margin %, Orders Shipped, AOV, Repeat Purchase Rate (trailing), LTV:CAC. Present as a table with current month, prior month, and trend."
      - field: "Key metrics"
        sector_label: "Operating Metrics"
        sector_guidance: "Report: New Customers, Returning Customers, Conversion Rate, Return Rate, Email Revenue %, Inventory Turnover. Choose 4-5 most relevant to current company focus."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include at least one quantified win: new product launch with sales data, repeat purchase rate improvement, contribution margin increase, or new channel launch results."
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Lead with challenges. E-commerce investors respect transparency about supply chain disruptions, rising costs, inventory issues, and channel dependency. Include root cause and response plan."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "Be specific: introductions to specific retail buyers, supply chain experts, potential brand partners, or operational advisors."
    sections_to_add:
      - section_name: "Inventory & Cash Position"
        placement: "after:E-Commerce KPIs"
        description: "E-commerce investors need to see cash efficiency alongside revenue."
        fields:
          - "Cash balance (end of month)"
          - "Inventory value on hand"
          - "Days of inventory"
          - "Monthly burn rate"
          - "Months of runway (cash minus inventory commitments)"
    sections_to_remove: []
    benchmark_references: ["revenue", "contribution-margin", "aov", "repeat-purchase-rate", "return-rate", "inventory-turnover"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce competitive analysis must address three distinct threat vectors: direct brand competitors, marketplace/private label threats (Amazon Basics), and channel competition (where customers can buy similar products). Pricing is transparently comparable."
    field_changes:
      - field: "Competitor overview"
        sector_label: "Competitive Map"
        sector_guidance: "Map competitors on a 2x2 matrix: X-axis = price positioning (value to premium), Y-axis = distribution breadth (DTC-only to omnichannel). Include Amazon private label, retailer private label, and direct DTC competitors."
      - field: "Competitive advantages"
        sector_label: "Brand Moat Analysis"
        sector_guidance: "Assess defensibility along e-commerce-specific dimensions: brand recognition, product IP (patents, proprietary formulations), customer relationship (email list, loyalty program), supplier exclusivity, and review accumulation."
      - field: "Competitive threats"
        sector_label: "Threat Vectors"
        sector_guidance: "Categorize: (1) Direct competitors — same category, similar positioning. (2) Amazon private label — Amazon entering the category with lower pricing. (3) Retailer private label — Target, Walmart launching store brands. (4) New DTC entrants — well-funded startups with aggressive CAC spending."
    sections_to_add:
      - section_name: "Price Comparison Matrix"
        placement: "after:Threat Vectors"
        description: "Transparent pricing comparison that acknowledges customer price visibility."
        fields:
          - "Price comparison by product category against top 5 competitors"
          - "Amazon pricing for equivalent products"
          - "Price-to-perceived-value analysis (justification for premium or value positioning)"
      - section_name: "Review & Rating Comparison"
        placement: "after:Price Comparison Matrix"
        description: "Social proof competitive analysis — critical in e-commerce."
        fields:
          - "Average product rating vs. competitors (on own site, Amazon, Google Shopping)"
          - "Review volume vs. competitors"
          - "Review velocity (monthly new reviews) vs. competitors"
          - "Sentiment analysis of competitor reviews (identifying competitor weaknesses)"
    sections_to_remove: []
    benchmark_references: ["nps", "cac", "organic-traffic-pct"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce pitch decks must demonstrate per-order profitability, repeat purchase dynamics, and channel strategy. Investors have seen too many DTC brands that grow revenue with negative unit economics. The deck must prove the business works at the order level."
    field_changes:
      - field: "Market opportunity"
        sector_label: "Market Opportunity"
        sector_guidance: "Present TAM/SAM/SOM for the product category. Include: category size (NRF, eMarketer data), online penetration rate and growth, and the specific niche the brand targets. Bottom-up sizing: (target customer count) x (annual spend per customer)."
      - field: "Business model"
        sector_label: "E-Commerce Business Model"
        sector_guidance: "Cover: channel mix (DTC, Amazon, wholesale), pricing strategy, gross margin, per-order contribution margin, and the repeat purchase engine. Show how the model improves with scale (declining fulfillment costs, improving repeat rate, brand-driven organic acquisition)."
      - field: "Traction"
        sector_label: "Traction & Growth Metrics"
        sector_guidance: "Dedicated slide with: Revenue trajectory (monthly, 12-month view), Order count trend, AOV trend, Repeat purchase rate by cohort, and Channel mix evolution. Distinguish GMV from net revenue explicitly."
    sections_to_add:
      - section_name: "Per-Order Unit Economics Slide"
        placement: "after:Traction & Growth Metrics"
        description: "The most scrutinized slide in any e-commerce pitch. Must prove per-order profitability."
        fields:
          - "Per-order contribution margin waterfall (visual)"
          - "LTV:CAC ratio with supporting data"
          - "CAC payback in orders and months"
          - "Gross margin % and trend"
      - section_name: "Repeat Purchase & Cohort Slide"
        placement: "after:Per-Order Unit Economics Slide"
        description: "Proves that customers come back — the critical e-commerce investment thesis."
        fields:
          - "Cohort repeat purchase curves (monthly cohorts, 12-month view)"
          - "Purchase frequency by cohort vintage"
          - "Revenue from repeat customers as % of total (trend)"
          - "Email and SMS list size and growth rate"
      - section_name: "Supply Chain & Operations Slide"
        placement: "after:Repeat Purchase & Cohort Slide"
        description: "Addresses the operational risk that e-commerce investors evaluate."
        fields:
          - "Supplier diversification (number of suppliers, geographic spread)"
          - "Fulfillment model (3PL, in-house, hybrid) and cost per order"
          - "Inventory turnover and days of inventory"
          - "Return rate and trend"
    sections_to_remove: []
    benchmark_references: ["revenue", "aov", "contribution-margin", "ltv", "cac", "repeat-purchase-rate", "gross-margin", "inventory-turnover", "return-rate"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "An e-commerce strategic one-pager must anchor analysis in physical product dynamics: channel strategy, inventory efficiency, margin structure, and repeat purchase economics."
    field_changes:
      - field: "Strategic position"
        sector_label: "E-Commerce Strategic Position"
        sector_guidance: "Frame position in e-commerce terms: category leadership, brand moat, channel diversification, and supply chain resilience. Include positioning on the DTC-to-omnichannel spectrum."
      - field: "Key metrics"
        sector_label: "E-Commerce Health Metrics"
        sector_guidance: "Core 6: Revenue + growth rate, Contribution Margin %, Repeat Purchase Rate, LTV:CAC, Inventory Turnover, Organic Traffic %. Compare each to category-specific benchmarks."
    sections_to_add:
      - section_name: "Revenue Lever Analysis"
        placement: "end"
        description: "Decomposition of the four e-commerce revenue levers with assessment of each."
        fields:
          - "Traffic: volume, trend, organic %, channel mix"
          - "Conversion Rate: current, trend, category benchmark comparison"
          - "AOV: current, trend, cross-sell/upsell effectiveness"
          - "Repeat Purchase Rate: current, cohort trend, lifecycle program maturity"
          - "Primary lever for next-stage growth"
    sections_to_remove: []
    benchmark_references: ["revenue", "contribution-margin", "repeat-purchase-rate", "ltv", "cac", "inventory-turnover", "organic-traffic-pct"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce market sizing must account for online vs. offline penetration, category-specific dynamics, and channel addressability. Unlike SaaS, e-commerce TAMs must be grounded in consumer spending data."
    field_changes:
      - field: "Total addressable market"
        sector_label: "TAM / SAM / SOM"
        sector_guidance: "Use category spending data from NRF, eMarketer, or Euromonitor. TAM = total category spend. SAM = online-addressable spend in target segments. SOM = realistic capture based on brand positioning, channel reach, and competitive intensity. Include online penetration growth as a TAM tailwind."
      - field: "Market dynamics"
        sector_label: "Category Dynamics"
        sector_guidance: "Address: online vs. offline migration rate, competitive density, Amazon's role in the category, price sensitivity, repurchase frequency, and seasonal patterns."
    sections_to_add:
      - section_name: "Channel Addressability"
        placement: "after:TAM / SAM / SOM"
        description: "Break down the market by channel to show where the opportunity lies."
        fields:
          - "DTC addressable market (consumers who buy directly from brands)"
          - "Amazon/marketplace addressable market"
          - "Wholesale/retail addressable market"
          - "Social commerce addressable market (emerging)"
      - section_name: "Consumer Trends"
        placement: "end"
        description: "Category-relevant consumer behavior trends."
        fields:
          - "Online penetration rate and growth trajectory"
          - "DTC adoption trends in the category"
          - "Sustainability and values-driven purchasing trends"
          - "Subscription/auto-replenishment adoption in the category"
    sections_to_remove: []
    benchmark_references: ["revenue", "aov"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce due diligence centers on inventory risk, supply chain reliability, unit economics verification, and return rate analysis — physical product risks that do not exist in SaaS."
    field_changes:
      - field: "Financial review"
        sector_label: "E-Commerce Financial Verification"
        sector_guidance: "Verify: net revenue calculation (after returns and discounts), COGS calculation (all product costs including packaging, duties, tariffs), contribution margin methodology, inventory valuation method, and channel-level profitability. Request access to Shopify/e-commerce platform data."
      - field: "Operational review"
        sector_label: "Supply Chain & Operations Review"
        sector_guidance: "Review: supplier list and concentration, manufacturing agreements, 3PL contracts and SLAs, carrier agreements, inventory management systems, and returns processing. Request inventory aging report, fulfillment accuracy data, and customer service metrics."
    sections_to_add:
      - section_name: "Inventory Due Diligence"
        placement: "after:Supply Chain & Operations Review"
        description: "E-commerce-specific inventory risk assessment."
        fields:
          - "Inventory aging report (% of inventory >90 days, >180 days)"
          - "Inventory valuation methodology and write-down history"
          - "Supplier concentration risk (% from single supplier)"
          - "Lead time reliability (actual vs. quoted lead times)"
          - "Seasonal inventory commitments and markdown history"
      - section_name: "Customer & Retention Due Diligence"
        placement: "after:Inventory Due Diligence"
        description: "Validation of repeat purchase and customer quality claims."
        fields:
          - "Cohort repeat purchase data (verify from platform data, not founder calculations)"
          - "Return rate by category with reason codes"
          - "Customer acquisition data by channel (verify from ad platform dashboards)"
          - "Email/SMS list audit (subscriber count, engagement rate, revenue attribution)"
    sections_to_remove: []
    benchmark_references: ["contribution-margin", "gross-margin", "return-rate", "inventory-turnover", "days-of-inventory", "repeat-purchase-rate"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Cap table structure is not e-commerce-specific. Standard venture capital cap table formats apply."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce decisions frequently involve inventory commitments, channel strategy, and pricing — all of which have irreversible components and physical-product-specific risk factors."
    field_changes:
      - field: "Decision context"
        sector_label: "Decision Context"
        sector_guidance: "For inventory decisions: include lead time, MOQ, capital commitment, and sell-through scenario analysis. For channel decisions: include per-order economics by channel. For pricing decisions: include contribution margin impact modeling."
    sections_to_add:
      - section_name: "Inventory & Cash Impact"
        placement: "end"
        description: "Physical product decisions have inventory and cash flow implications that must be explicitly modeled."
        fields:
          - "Inventory commitment required ($)"
          - "Cash flow timing (when is cash committed vs. when is revenue received)"
          - "Downside scenario: if demand is 50% of forecast, what is the financial impact?"
          - "Reversibility: can inventory be liquidated, returned, or repurposed if the decision fails?"
    sections_to_remove: []
    benchmark_references: ["contribution-margin", "inventory-turnover"]

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce exit scenarios are governed by revenue multiples (lower than SaaS), brand value, and operational transferability. Acquirer categories differ from SaaS: strategic acquirers are larger brands or conglomerates (P&G, Unilever), category consolidators (Thrasio model), or retail partners."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "E-Commerce Valuation"
        sector_guidance: "E-commerce brands are valued on revenue multiples (1-4x for most brands) or EBITDA multiples (8-15x for profitable brands). Report: revenue, EBITDA, growth rate, gross margin, and repeat purchase rate. Higher multiples are earned by brands with strong repeat purchase rates, brand moats, and IP."
      - field: "Potential acquirers"
        sector_label: "E-Commerce Acquirer Landscape"
        sector_guidance: "Categorize: (1) Strategic acquirers — CPG conglomerates (P&G, Unilever, L'Oreal) seeking DTC capability. (2) Category aggregators — Amazon FBA aggregators (though the market has contracted). (3) Retail acquirers — retailers adding exclusive brands. (4) PE acquirers — private equity firms acquiring profitable brands."
    sections_to_add:
      - section_name: "Brand Value Assessment"
        placement: "after:E-Commerce Acquirer Landscape"
        description: "Brand intangibles that drive e-commerce acquisition premiums."
        fields:
          - "Brand awareness and recognition metrics"
          - "Email/SMS list size and engagement (valued asset in e-commerce M&A)"
          - "Social media following and engagement rates"
          - "Product IP (patents, proprietary formulations, exclusive supplier agreements)"
          - "Customer data assets and segmentation sophistication"
    sections_to_remove: []
    benchmark_references: ["revenue", "gross-margin", "repeat-purchase-rate", "organic-traffic-pct"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce board reviews must cover the four revenue levers, inventory health, channel performance, and seasonal preparation — physical product concerns that do not appear in SaaS board packages."
    field_changes:
      - field: "Financial summary"
        sector_label: "E-Commerce Financial Dashboard"
        sector_guidance: "Present: Revenue (net of returns and discounts) vs. plan, Contribution Margin % vs. plan, Gross Margin trend, AOV trend, Inventory value and turnover, Cash position and runway. Compare each to plan and prior quarter."
      - field: "Strategic priorities"
        sector_label: "Quarterly Priorities & Progress"
        sector_guidance: "Report against quarterly priorities with measurable outcomes. Include product launch results, channel expansion status, and operational improvement metrics."
      - field: "Risks"
        sector_label: "Risk Dashboard"
        sector_guidance: "Categorize: Supply chain risks (supplier disruption, lead time delays, tariff changes), Channel risks (Amazon policy changes, ad cost increases, platform dependency), Inventory risks (overstocking, stockouts, obsolescence), and Margin risks (COGS increases, shipping cost inflation)."
    sections_to_add:
      - section_name: "E-Commerce Metrics Summary"
        placement: "before:E-Commerce Financial Dashboard"
        description: "One-page e-commerce metrics dashboard for board review."
        fields:
          - "Revenue and growth rate (QoQ and YoY)"
          - "Contribution Margin % (trend)"
          - "Repeat Purchase Rate (trailing 12-month)"
          - "AOV (trend)"
          - "Conversion Rate"
          - "Return Rate"
          - "Inventory Turnover and Days of Inventory"
          - "LTV:CAC ratio"
      - section_name: "Channel Performance"
        placement: "after:E-Commerce Financial Dashboard"
        description: "Revenue and profitability by sales channel."
        fields:
          - "Channel revenue breakdown (DTC, Amazon, wholesale, other)"
          - "Contribution margin by channel"
          - "Channel growth rates"
          - "Customer acquisition cost by channel"
      - section_name: "Inventory & Supply Chain Health"
        placement: "after:Channel Performance"
        description: "Physical product operational health indicators."
        fields:
          - "Inventory aging (% of inventory >90 days)"
          - "Stockout frequency on top 20 SKUs"
          - "Supplier on-time delivery rate"
          - "Fulfillment accuracy and speed"
      - section_name: "Seasonal Preparation"
        placement: "end"
        description: "Forward-looking seasonal readiness assessment (particularly important in Q2-Q3 for holiday preparation)."
        fields:
          - "Inventory committed for upcoming peak season"
          - "Fulfillment capacity plan vs. projected peak volume"
          - "Marketing calendar and budget for seasonal campaigns"
          - "Identified risks for the upcoming season"
    sections_to_remove: []
    benchmark_references: ["revenue", "contribution-margin", "repeat-purchase-rate", "aov", "conversion-rate", "return-rate", "inventory-turnover", "days-of-inventory", "cac"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce board meetings should allocate time for supply chain and inventory health alongside commercial performance — topics that SaaS boards do not cover."
    field_changes:
      - field: "Agenda items"
        sector_label: "E-Commerce Board Agenda"
        sector_guidance: "Standard e-commerce board agenda: (1) Metrics review — 15 min (pre-read, discussion only). (2) Channel strategy or product line deep-dive — 25 min (rotate topic each meeting). (3) Supply chain and inventory health — 15 min. (4) Seasonal planning review — 10 min (adjust by quarter). (5) CEO asks — 10 min. (6) Executive session — 15 min. Total: 90 minutes."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce risk categories include physical product risks absent in software: supply chain disruption, inventory obsolescence, tariff/trade policy, seasonal concentration, and fulfillment failure."
    field_changes:
      - field: "Risk categories"
        sector_label: "E-Commerce Risk Categories"
        sector_guidance: "Include e-commerce-specific categories: (1) Supply chain risk — supplier concentration, manufacturing disruption, tariffs, lead time reliability. (2) Inventory risk — obsolescence, overstocking, seasonal markdown exposure. (3) Channel risk — Amazon dependency, platform policy changes, ad cost volatility. (4) Fulfillment risk — 3PL reliability, peak season capacity, shipping cost inflation. (5) Product risk — quality issues, recall exposure, return rate trends."
    sections_to_add:
      - section_name: "Supplier Concentration Analysis"
        placement: "end"
        description: "Supply chain risk assessment."
        fields:
          - "Percentage of COGS from top 1, 3, and 5 suppliers"
          - "Geographic concentration of manufacturing"
          - "Alternate supplier readiness for each critical component"
          - "Lead time vulnerability (maximum production lead time for hero products)"
    sections_to_remove: []
    benchmark_references: ["gross-margin", "inventory-turnover", "days-of-inventory"]

  - template: "change-initiative-proposal"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce change initiatives often involve physical transitions — new fulfillment partner, new manufacturing source, new channel entry — that have longer timelines and higher operational risk than software changes."
    field_changes:
      - field: "Implementation plan"
        sector_label: "Implementation Plan"
        sector_guidance: "For operational changes (3PL transition, supplier change), include: parallel operation period, cutover plan with rollback options, inventory transition logistics, and customer communication plan. Physical transitions cannot be deployed and reverted like software."
    sections_to_add:
      - section_name: "Operational Transition Risk"
        placement: "end"
        description: "Assessment of physical-world transition risks."
        fields:
          - "Parallel operation period required"
          - "Inventory in transit during transition"
          - "Customer impact during transition (expected shipping delays, errors)"
          - "Rollback plan if transition fails"
    sections_to_remove: []
    benchmark_references: ["fulfillment-cost-per-order"]

  - template: "compensation-review-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "E-commerce compensation must address the operational/creative split — warehouse and fulfillment roles alongside brand, marketing, and product roles."
    field_changes:
      - field: "Compensation benchmarks"
        sector_label: "E-Commerce Compensation Benchmarks"
        sector_guidance: "Benchmark by function: Marketing (performance marketing, brand, CRM), Operations (supply chain, fulfillment, logistics), Product (product development, merchandising), and Technology (e-commerce platform, data engineering). Use industry-specific comp data from DTC-focused recruiters and industry surveys."
    sections_to_add:
      - section_name: "Operations Compensation"
        placement: "end"
        description: "E-commerce-specific operational role compensation."
        fields:
          - "Warehouse/fulfillment staff compensation vs. local market"
          - "Supply chain management compensation benchmarks"
          - "Seasonal staffing plan and temporary labor costs"
    sections_to_remove: []
    benchmark_references: []

  - template: "regulatory-compliance-update"
    audience: "board"
    sector_adaptation: "modified"
