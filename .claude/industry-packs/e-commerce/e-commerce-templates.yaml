  - template: "weekly-ceo-review"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "An e-commerce founder's weekly review must include operational metrics that SaaS founders do not track: inventory health, fulfillment performance, and supply chain status."
    field_changes:
      - field: "This week's metrics"
        sector_label: "Weekly E-Commerce Dashboard"
        sector_guidance: "Weekly metrics: Revenue (vs. plan), Orders shipped, Conversion rate, AOV, Return rate, Fulfillment accuracy, Customer service response time, Inventory status (stockouts, approaching-stockout SKUs). Compare each to prior week and trailing 4-week average."
      - field: "Key decisions this week"
        sector_label: "Key Decisions This Week"
        sector_guidance: "Flag decisions with inventory or supply chain implications separately — these have longer lead times and higher irreversibility than marketing or product decisions."
    sections_to_add:
      - section_name: "Supply Chain Status"
        placement: "after:Weekly E-Commerce Dashboard"
        description: "Weekly supply chain health check."
        fields:
          - "Inbound shipments status (on time / delayed)"
          - "SKUs approaching stockout (within 2 weeks of safety stock)"
          - "Supplier issues or communications"
          - "Inventory reorder decisions needed this week"
    sections_to_remove: []
    benchmark_references: ["revenue", "conversion-rate", "aov", "return-rate", "fulfillment-cost-per-order"]

  - template: "decision-journal"
