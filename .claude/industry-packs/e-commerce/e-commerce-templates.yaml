    field_changes:
      - field: "Decision type"
        sector_label: "Decision Type"
        sector_guidance: "Categorize: Inventory decision, Channel decision, Pricing decision, Product decision, Supplier decision, Marketing decision, Operational decision. Inventory and supplier decisions deserve extra documentation because of their irreversibility."
