# E-Commerce Industry Pack — Skill Overlays
#
# For 35 of the 158 Foreman skills, this file provides e-commerce-specific
# context that the skill executor agent applies as additional framing. These
# overlays do not replace the base skill content — they add a physical product
# commerce lens.
#
# Every overlay reflects genuine e-commerce dynamics: inventory risk, COGS,
# fulfillment, returns, seasonality, product assortment, channel mix, and
# margin-driven decision-making. These are not SaaS frameworks relabeled with
# "e-commerce" vocabulary. Physical product businesses carry inventory, ship
# goods, process returns, and manage seasonal demand patterns — and that
# reality must be visible in every overlay.
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct e-commerce application (strategy, pricing, marketing, ops)
#   - Decision and thinking skills (used constantly in inventory, channel, and margin contexts)
#   - Game theory skills applicable to supplier negotiation and competitive dynamics
#   - Leadership skills most affected by e-commerce organizational structures
#   - Negotiation skills relevant to supplier, channel, and fulfillment partner relationships
#
# Relevance tiers:
#   critical — The e-commerce overlay materially changes how the skill is applied.
#              The skill executor should always surface e-commerce context.
#   high     — E-commerce context adds significant value. Surface when relevant.
#   moderate — Useful e-commerce framing but the base skill works well as-is.

