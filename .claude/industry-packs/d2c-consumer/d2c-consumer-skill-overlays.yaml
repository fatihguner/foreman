# D2C Consumer Industry Pack — Skill Overlays
#
# For 35 of the 158 Foreman skills, this file provides D2C-specific context
# that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add a brand-first, direct-to-
# consumer lens.
#
# BRAND AS MOAT is the organizing principle. D2C is not a technology business
# disguised as a commerce business — it is a BRAND business disguised as a
# commerce business. Every overlay must surface how the framework applies
# through the lens of brand affinity, community, storytelling, and identity
# signaling. A D2C brand's competitive advantage is not its product features
# (easily copied), its supply chain (commoditized), or its technology (Shopify
# levels the field). The moat is the emotional connection between the brand
# and the customer — the reason someone pays more to buy from you when an
# identical product exists on Amazon for less.
#
# Key D2C dynamics reflected in every overlay:
#   - Buyer power is extreme: infinite alternatives one click away
#   - Barriers to entry are near zero: Shopify + Meta ads = instant competitor
#   - The product IS the experience: packaging, unboxing, storytelling, identity
#   - Promotion = content + community + influencer (not traditional advertising)
#   - Price = perceived value and identity signal, not cost-plus margin
#   - Place = own site vs Amazon vs retail, each with different brand implications
#   - iOS privacy changes have fundamentally altered attribution and targeting
#   - Community is the most durable competitive advantage in D2C
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct D2C application (brand strategy, marketing, pricing)
#   - Storytelling and creative skills (CRITICAL — D2C brands live or die by narrative)
#   - People and influence skills (community building, customer connection)
#   - Decision and thinking skills (applied to channel, pricing, and brand decisions)
#   - Game theory skills applicable to competitive and channel dynamics
#
# Relevance tiers:
#   critical — The D2C overlay materially changes how the skill is applied.
#              The skill executor should always surface D2C context.
#   high     — D2C context adds significant value. Surface when relevant.
#   moderate — Useful D2C framing but the base skill works well as-is.

