# Agency/Consulting Industry Pack — Skill Overlays
#
# For 37 of the 158 Foreman skills, this file provides agency/consulting-specific
# context that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add a professional services lens.
#
# The fundamental reality of agency/consulting businesses:
#   - The "product" is people's time and expertise. There is no inventory except hours.
#   - Revenue = People x Utilization x Rate. Every framework must connect to this equation.
#   - Scaling is linear (more people = more revenue), not exponential — unless services
#     are productized.
#   - The moat is relationships, reputation, and specialized expertise — not technology.
#   - The founder IS the product initially. Transitioning from doing to managing to
#     selling is the critical growth journey.
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct application to people-as-product businesses
#   - Strategy skills that reframe when the "product" is expertise
#   - Pricing and negotiation skills (the two highest-leverage activities in agencies)
#   - Leadership and delegation skills (critical for founder transition)
#   - Organizational models directly applicable to agency structure
#
# Relevance tiers:
#   critical — The overlay materially changes how the skill is applied in agencies.
#              The skill executor should always surface agency context.
#   high     — Agency context adds significant value. Surface when relevant.
#   moderate — Useful agency framing but the base skill works well as-is.

