# Agency/Consulting Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for agency and consulting businesses. The output agent
# loads these rules when generating documents with the agency/consulting
# industry pack active.
#
# Key adaptations across the template set:
#   - Unit economics reframed as per-employee economics, not per-unit
#   - Investor materials reframed for bank loans, revenue-based financing,
#     and partnership buyouts — not VC fundraising
#   - Operational templates emphasize resource allocation, utilization tracking,
#     and capacity planning
#   - Client templates emphasize proposal structure, SOW design, QBR for
#     retainer clients, and project scope documentation
#   - Self templates include founder capacity audit and the transition from
#     practitioner to business leader
#
# Adaptation types:
#   as-is    — The template works without modification for agencies.
#   modified — The template requires field changes, additional sections, or
#              reframing of existing sections for agency context.

pack_metadata:
  sector: "agency-consulting"
  display_name: "Agency / Consulting"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # Reframed: most agencies do not raise VC.
  # "Investor" = bank, revenue-based lender, partner
  # buy-in/buyout, or strategic acquirer.
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency unit economics are per-employee, not per-unit. The fundamental equation is Revenue = People x Utilization x Rate. The snapshot must present the economics of a billable person — what they cost, what they generate, and what margin they produce — because this is the atomic unit of agency value creation."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "Revenue per Billable Employee"
        sector_guidance: "Calculate: average billable rate x average annual billable hours per person. Report blended across the firm and segmented by seniority level (junior, mid, senior, principal). Target: $150K-$250K per billable employee."
      - field: "Cost per unit"
        sector_label: "Fully Loaded Cost per Employee"
        sector_guidance: "Include: salary, benefits, payroll taxes, training, tools/software, and allocated overhead (rent, admin, management). Report total cost and the cost-to-revenue ratio. Target: cost should be 40-55% of revenue per employee."
      - field: "Margin per unit"
        sector_label: "Margin per Employee"
        sector_guidance: "Revenue per employee minus fully loaded cost per employee. This is the contribution margin each person generates. Target: $50K-$100K per billable employee. Partners/principals should generate $100K+ in margin."
      - field: "Lifetime value"
        sector_label: "Lifetime Value per Client"
        sector_guidance: "Calculate: average revenue per client per year x average client tenure in years. Segment by engagement type (project vs. retainer). Retainer clients should have significantly higher LTV."
      - field: "Acquisition cost"
        sector_label: "Client Acquisition Cost"
        sector_guidance: "Total business development and marketing spend divided by new clients acquired. Include the opportunity cost of senior staff time on BD. Most agencies undercount CAC because they do not value the partner's BD time."
      - field: "Unit economics ratio"
        sector_label: "Revenue Multiplier per Employee"
        sector_guidance: "Revenue per employee divided by average compensation per employee. Target: 2.5x-3.5x multiplier. Below 2x indicates the firm cannot sustain itself. Above 4x indicates either exceptional pricing or underpaid staff."
    sections_to_add:
      - section_name: "Agency Economics Dashboard"
        placement: "before:Revenue per Billable Employee"
        description: "Core agency metrics that define the economic health of the firm."
        fields:
          - "Total revenue (trailing 12 months)"
          - "Revenue per employee (FTE)"
          - "Billable utilization rate (firm-wide)"
          - "Average billable rate (blended)"
          - "Effective billable rate (after write-offs and scope creep)"
          - "Gross margin %"
          - "EBITDA margin %"
          - "Revenue per partner/principal"
      - section_name: "Leverage and Efficiency Analysis"
        placement: "after:Revenue Multiplier per Employee"
        description: "The staffing model that drives agency margin."
        fields:
          - "Leverage ratio (junior:senior)"
          - "Overhead ratio (non-delivery costs as % of revenue)"
          - "Bench time (% of billable staff unassigned)"
          - "Freelancer/subcontractor spend as % of revenue"
    sections_to_remove: []
    benchmark_references: ["revenue-per-employee", "utilization-rate", "average-billable-rate", "effective-billable-rate", "gross-margin", "ebitda-margin", "leverage-ratio", "overhead-ratio"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agencies rarely send investor updates in the VC sense. This template is reframed as a lender or partner update — a periodic report to a bank holding a line of credit, a revenue-based financing partner, or an incoming partner being bought in."
    field_changes:
      - field: "Financial highlights"
        sector_label: "Financial Summary"
        sector_guidance: "Report: revenue (month and trailing 12-month), gross margin, EBITDA, utilization rate, AR days, and cash position. For lenders, emphasize debt service coverage ratio and cash flow stability."
      - field: "Key metrics"
        sector_label: "Operating Metrics"
        sector_guidance: "Report: utilization rate, billable utilization rate, client count, pipeline coverage ratio, employee retention. Choose 3-4 metrics most relevant to the capital relationship."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include: major clients won, retainer renewals, notable deliverables, employee milestones. Quantify where possible (new client worth $X annual revenue)."
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Lead with challenges. For lenders, flag any risks to revenue stability or cash flow. Be transparent about client concentration, pipeline gaps, or key person dependencies."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "Be specific. For lenders: 'We plan to draw $X from the line of credit in Q2 to fund two hires against confirmed pipeline.' For partners: 'We need your input on the Q3 pricing strategy.'"
    sections_to_add:
      - section_name: "Cash Position and Forecast"
        placement: "after:Financial Summary"
        description: "Cash flow visibility for capital partners."
        fields:
          - "Cash balance"
          - "AR outstanding and aging"
          - "Monthly cash burn / cash generation"
          - "Months of runway (if applicable)"
    sections_to_remove: []
    benchmark_references: ["revenue", "ebitda-margin", "ar-days", "utilization-rate"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency competitive landscapes include four threat categories: competing agencies, freelancers/contractors, in-house teams, and AI tools. The brief should map all four, not just direct agency competitors."
    field_changes:
      - field: "Competitor overview"
        sector_label: "Competitive Landscape Map"
        sector_guidance: "Map competitors on two dimensions: (1) Direct agencies — firms offering similar services to similar clients. (2) Indirect substitutes — freelancer collectives, in-house teams, offshore firms, AI tools. Position each by price point and service depth."
      - field: "Competitive advantages"
        sector_label: "Defensibility Analysis"
        sector_guidance: "Assess defensibility along agency-specific dimensions: client relationships (depth and breadth of contacts), domain expertise (vertical specialization), methodology (proprietary frameworks), team (specialized talent), and brand/reputation (referral strength, thought leadership, awards)."
      - field: "Competitive threats"
        sector_label: "Threat Vectors"
        sector_guidance: "Categorize: (1) Competing agencies — winning shared prospects or poaching clients. (2) Freelancer substitution — clients moving work to freelancers for cost savings. (3) In-housing — clients building internal teams. (4) AI displacement — tools performing tasks the agency bills for."
    sections_to_add:
      - section_name: "Client Switching Analysis"
        placement: "after:Threat Vectors"
        description: "Understanding how and why clients switch providers."
        fields:
          - "Reasons clients leave (from exit interviews and lost-business analysis)"
          - "Switching costs the firm creates (institutional knowledge, relationship depth, process integration)"
          - "Win/loss analysis by competitor type"
    sections_to_remove: []
    benchmark_references: ["win-rate", "client-retention-rate", "average-billable-rate"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Most agencies do not create fundraising decks for VC. This template is reframed as a financing deck — used for bank loan applications, revenue-based financing proposals, partnership buy-in presentations, or strategic acquisition discussions."
    field_changes:
      - field: "Market opportunity"
        sector_label: "Market Position and Growth Potential"
        sector_guidance: "Present: the firm's market niche, addressable client base, competitive differentiation, and realistic growth trajectory. For bank lenders, emphasize market stability and recurring revenue. For strategic acquirers, emphasize unique capabilities and client relationships."
      - field: "Business model"
        sector_label: "Agency Business Model"
        sector_guidance: "Cover: service offerings, pricing model (hourly/project/retainer/value-based mix), client segmentation, delivery model (core team + freelancer network), and the economic leverage of the staffing model."
      - field: "Traction"
        sector_label: "Financial Track Record"
        sector_guidance: "Present: 3-year revenue history, margin trajectory, client retention rate, utilization trend, and pipeline coverage. For lenders, emphasize stability and predictability. For acquirers, emphasize growth and scalability."
    sections_to_add:
      - section_name: "Capital Use and Return"
        placement: "after:Financial Track Record"
        description: "Clear plan for how capital will be deployed and the expected return."
        fields:
          - "Capital amount requested and structure (loan, line of credit, equity)"
          - "Use of proceeds (specific: hire X people, fund Y initiative)"
          - "Revenue and margin impact of the investment"
          - "Payback timeline"
      - section_name: "Client and Revenue Stability"
        placement: "after:Capital Use and Return"
        description: "Evidence of revenue durability for lender confidence."
        fields:
          - "Client retention rate (3-year trend)"
          - "Recurring revenue percentage (retainers and ongoing contracts)"
          - "Client concentration analysis (top 1, 5, 10 clients as % of revenue)"
          - "Contract backlog (signed but undelivered revenue)"
    sections_to_remove: []
    benchmark_references: ["revenue", "ebitda-margin", "client-retention-rate", "client-concentration"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "An agency strategic one-pager must frame the firm's position in terms relevant to professional services — specialization, client relationships, team quality, and pricing power — rather than generic strategic frameworks."
    field_changes:
      - field: "Strategic position"
        sector_label: "Agency Strategic Position"
        sector_guidance: "Frame: the firm's specialization (what and for whom), competitive differentiation (why clients choose this firm), pricing power (can the firm charge premium rates), and growth model (organic client acquisition, vertical expansion, geographic expansion, or productization)."
      - field: "Key metrics"
        sector_label: "Agency Health Metrics"
        sector_guidance: "Core 5: Revenue per employee, utilization rate, gross margin, client retention rate, employee retention rate. Compare each to benchmarks for the firm's size and discipline."
    sections_to_add:
      - section_name: "People and Capacity Assessment"
        placement: "end"
        description: "Assessment of the firm's production capacity and talent quality."
        fields:
          - "Current team size and leverage model"
          - "Key person dependencies"
          - "Capacity utilization (current vs. maximum)"
          - "Talent pipeline strength (ease of hiring for critical roles)"
    sections_to_remove: []
    benchmark_references: ["revenue-per-employee", "utilization-rate", "gross-margin", "client-retention-rate", "employee-retention-rate"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency market opportunity is not TAM/SAM/SOM in the traditional sense. It is about: the size of the addressable client base, the firm's share of wallet within existing clients, and the expansion potential into adjacent services or verticals."
    field_changes:
      - field: "Total addressable market"
        sector_label: "Addressable Client Base"
        sector_guidance: "Size the market bottom-up: (number of organizations that match the firm's ideal client profile) x (average annual spend on the services the firm provides). For agencies, the relevant market is the intersection of client type, geography, and service need."
      - field: "Market dynamics"
        sector_label: "Professional Services Market Dynamics"
        sector_guidance: "Address: client budget trends (growing, stable, declining for the firm's services), competitive density (number and quality of competing firms), substitution pressure (in-housing, freelancers, AI), and regulatory environment (industry-specific compliance that creates demand)."
    sections_to_add:
      - section_name: "Share of Wallet Expansion"
        placement: "end"
        description: "Growth potential within existing clients — often the most capital-efficient growth source for agencies."
        fields:
          - "Average share of wallet in existing clients (estimated)"
          - "Adjacent services that existing clients buy from other providers"
          - "Cross-sell and upsell potential"
    sections_to_remove: []
    benchmark_references: ["revenue-per-client", "client-retention-rate"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency due diligence focuses on areas unique to people-businesses: client relationship durability, key person risk, revenue concentration, employee retention, and the contractual basis of revenue."
    field_changes:
      - field: "Financial review"
        sector_label: "Agency Financial Verification"
        sector_guidance: "Verify: revenue by client (concentration analysis), revenue by type (project vs. retainer vs. hourly), utilization data, effective rate realization, gross margin methodology, and EBITDA normalization (owner compensation adjustments). Request aged AR report and historical write-off data."
      - field: "Operational review"
        sector_label: "Client and Talent Review"
        sector_guidance: "Review: top 10 client relationships (tenure, revenue trend, contract terms, key contacts), employee retention data by seniority, non-compete and non-solicit agreements, freelancer agreements, and any pending or historical legal disputes."
    sections_to_add:
      - section_name: "Key Person and Client Risk Assessment"
        placement: "end"
        description: "Agency-specific risk factors that determine business durability."
        fields:
          - "Key person identification (people whose departure would directly impact revenue)"
          - "Client relationship mapping (which clients are relationship-dependent vs. institutionally loyal)"
          - "Non-compete/non-solicit coverage and enforceability"
          - "Contractual revenue base (signed contracts and retainers vs. at-will engagement)"
          - "Backlog analysis (contracted but undelivered revenue)"
    sections_to_remove: []
    benchmark_references: ["client-concentration", "employee-retention-rate", "revenue-per-client", "ar-days"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agencies are typically structured as partnerships, LLCs, or S-corps rather than C-corps with VC equity. The cap table equivalent is the partnership agreement — ownership percentages, profit-sharing arrangements, buy-sell provisions, and vesting of partner equity."
    field_changes:
      - field: "Ownership structure"
        sector_label: "Partnership/Ownership Structure"
        sector_guidance: "Present: current ownership percentages, voting rights, profit distribution methodology (equal split, contribution-based, formula-based), buy-sell agreement terms (valuation methodology, payment terms, trigger events), and any phantom equity or profit-sharing arrangements for non-owner employees."
    sections_to_add:
      - section_name: "Partnership Economics"
        placement: "end"
        description: "How partnership compensation and profit distribution work."
        fields:
          - "Partner compensation structure (salary + profit distribution)"
          - "Profit distribution methodology and timing"
          - "Capital contribution requirements"
          - "Exit/buyout valuation methodology (revenue multiple, EBITDA multiple, book value)"
    sections_to_remove: []
    benchmark_references: ["ebitda-margin", "revenue-per-partner"]

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Decision rationale documentation follows a standard format across sectors. Agency context is naturally incorporated through the specific decision being documented."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency exit scenarios include acquisition by a larger agency or holding company, management buyout, partner buyout, employee stock ownership plan (ESOP), or simply running the business for cash flow indefinitely. VC-style exits (IPO, unicorn acquisition) are extremely rare."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "Agency Valuation Methods"
        sector_guidance: "Agencies are typically valued on EBITDA multiples (3-8x depending on size, growth, and client quality), revenue multiples (0.5-1.5x for most agencies), or discounted cash flow. Key valuation drivers: recurring revenue percentage, client concentration, key person dependency, and growth trajectory. Premium multiples for: strong vertical specialization, productized service components, and low client concentration."
      - field: "Potential acquirers"
        sector_label: "Exit Pathways"
        sector_guidance: "Categorize: (1) Holding companies (WPP, Omnicom, IPG for large agencies; smaller rollup firms for mid-size agencies). (2) Larger agencies seeking capabilities or client access. (3) Management/employee buyout (funded by SBA loan, seller financing, or earnout). (4) Partner buyout (new partner buying in, existing partner buying out). (5) ESOP (employee ownership transition). (6) Lifestyle operation (run for cash flow indefinitely)."
    sections_to_add:
      - section_name: "Agency Valuation Drivers"
        placement: "after:Agency Valuation Methods"
        description: "Factors that increase or decrease agency valuation."
        fields:
          - "Recurring revenue percentage (higher = higher multiple)"
          - "Client concentration (lower = higher multiple)"
          - "Key person dependency (lower = higher multiple)"
          - "Employee retention and culture strength"
          - "Proprietary methodology or productized services"
          - "Growth trajectory and pipeline strength"
    sections_to_remove: []
    benchmark_references: ["ebitda-margin", "client-concentration", "client-retention-rate", "revenue"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # Reframed: most agencies do not have formal
  # boards. "Board" = advisory board, partner
  # meeting, or leadership team review.
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency quarterly reviews — whether for partners, advisory boards, or leadership teams — should center on the three pillars of agency health: clients (retention, satisfaction, concentration), people (utilization, retention, development), and finances (revenue, margins, cash flow)."
    field_changes:
      - field: "Financial summary"
        sector_label: "Agency Financial Dashboard"
        sector_guidance: "Present: revenue (quarter and trailing 12-month), revenue by client (top 10), gross margin, EBITDA, utilization rate, effective billable rate, AR days, and cash position. Compare each to plan and to prior quarter."
      - field: "Strategic priorities"
        sector_label: "Strategic Priorities and Progress"
        sector_guidance: "Report against quarterly priorities. For agencies, typical strategic priorities include: client acquisition (pipeline and wins), client retention (NPS and at-risk accounts), team development (hiring and retention), operational improvement (utilization, scope management), and positioning (specialization, thought leadership)."
      - field: "Risks"
        sector_label: "Risk Dashboard"
        sector_guidance: "Categorize: Client risks (concentration, at-risk accounts, contract expirations), People risks (key person dependency, attrition, burnout), Financial risks (cash flow, AR aging, margin compression), and Market risks (competitive threats, in-housing trends, AI displacement)."
    sections_to_add:
      - section_name: "Client Health Summary"
        placement: "before:Agency Financial Dashboard"
        description: "Overview of the client portfolio health."
        fields:
          - "Client count (active)"
          - "Client retention rate (trailing 12-month)"
          - "Client NPS (most recent)"
          - "Top client concentration (largest as % of revenue)"
          - "At-risk accounts (identified and action plan status)"
          - "New clients won (quarter)"
      - section_name: "People Health Summary"
        placement: "after:Agency Financial Dashboard"
        description: "Team health metrics — the most important asset in an agency."
        fields:
          - "Headcount (FTE)"
          - "Billable utilization rate"
          - "Bench time (%)"
          - "Employee retention rate (trailing 12-month)"
          - "eNPS (most recent)"
          - "Open positions and hiring pipeline"
      - section_name: "Pipeline and Forecast"
        placement: "after:People Health Summary"
        description: "Forward-looking revenue visibility."
        fields:
          - "Pipeline coverage ratio"
          - "Weighted pipeline value"
          - "Revenue forecast (next quarter)"
          - "Contracted backlog"
    sections_to_remove: []
    benchmark_references: ["revenue", "utilization-rate", "gross-margin", "ebitda-margin", "client-concentration", "client-retention-rate", "employee-retention-rate", "pipeline-coverage-ratio", "ar-days"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency partner meetings or advisory board sessions should balance the three agency pillars — clients, people, finances — and include time for strategic discussion beyond operational review."
    field_changes:
      - field: "Agenda items"
        sector_label: "Agency Leadership Meeting Agenda"
        sector_guidance: "Recommended structure: (1) Client review — 15 min (at-risk accounts, major wins, retention actions). (2) People review — 10 min (utilization, retention, key hiring). (3) Financial review — 10 min (revenue, margins, cash flow — pre-read). (4) Strategic topic deep-dive — 30 min (one topic per meeting: positioning, pricing, new service line, vertical expansion). (5) Action items and decisions — 10 min. Total: 75 minutes maximum."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency risk categories center on client concentration, key person dependency, and revenue predictability — risks unique to people-as-product businesses."
    field_changes:
      - field: "Risk categories"
        sector_label: "Agency Risk Categories"
        sector_guidance: "Include agency-specific categories: (1) Client concentration risk — revenue dependency on top clients. (2) Key person risk — employees whose departure would directly impact revenue. (3) Revenue predictability risk — percentage of revenue that is project-based vs. recurring. (4) Talent risk — ability to recruit and retain the right people. (5) Pricing risk — competitive pressure on rates. (6) Scope management risk — systematic underscoping or scope creep. (7) AI disruption risk — services vulnerable to automation."
    sections_to_add:
      - section_name: "Key Person Risk Matrix"
        placement: "end"
        description: "Assessment of business impact if specific individuals were to depart."
        fields:
          - "Key person identification (name, role, client relationships managed)"
          - "Revenue at risk if each key person departs"
          - "Mitigation actions (relationship distribution, non-competes, retention incentives)"
          - "Succession readiness for each key role"
    sections_to_remove: []
    benchmark_references: ["client-concentration", "employee-retention-rate"]

  - template: "change-initiative-proposal"
    audience: "board"
    sector_adaptation: "as-is"
    adaptation_rationale: "Change initiative proposals follow a standard format. Agency context is naturally incorporated through the specific initiative — whether pricing restructure, vertical specialization, or service model change."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "compensation-review-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency compensation is distinct: lower base salaries than tech but potentially higher total compensation through profit sharing, bonuses, and ownership. The compensation structure directly affects retention — the most critical operational metric."
    field_changes:
      - field: "Compensation benchmarks"
        sector_label: "Agency Compensation Benchmarks"
        sector_guidance: "Benchmark using agency-specific data: SPI Research compensation studies, Bureau of Labor Statistics professional services data, Glassdoor agency-specific roles, and local market surveys. Compare total compensation (base + bonus + profit sharing) rather than base alone."
    sections_to_add:
      - section_name: "Revenue Multiplier Analysis"
        placement: "end"
        description: "The relationship between compensation and revenue generation."
        fields:
          - "Revenue multiplier by role (revenue generated / total compensation)"
          - "Target multiplier by seniority (junior: 3x, mid: 2.5x, senior: 2.5x, partner: 3-5x)"
          - "Profit-sharing or bonus structure and its effect on retention"
          - "Path-to-ownership economics (if applicable)"
    sections_to_remove: []
    benchmark_references: ["revenue-per-employee", "employee-retention-rate"]

  - template: "regulatory-compliance-update"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency compliance concerns include: data handling (GDPR, CCPA for client data), advertising regulations (FTC, industry-specific rules), employment law (contractor classification, non-competes), and industry-specific compliance (healthcare for HIPAA, finance for FINRA, if serving regulated industries)."
    field_changes:
      - field: "Regulatory landscape"
        sector_label: "Agency Compliance Landscape"
        sector_guidance: "Cover: data privacy (GDPR, CCPA — agencies handling client customer data), employment law (contractor classification, non-compete enforceability in relevant jurisdictions), advertising regulations (FTC disclosure requirements, industry-specific ad rules), and insurance (professional liability/E&O coverage adequacy)."
    sections_to_add:
      - section_name: "Contractor Classification Risk"
        placement: "end"
        description: "Agencies using freelancers face classification risk — a critical compliance area."
        fields:
          - "Number of regular freelancers/contractors"
          - "Classification methodology (independent contractor criteria met?)"
          - "Jurisdictional risk assessment (states/countries with strict classification rules)"
          - "Insurance and indemnification coverage"
    sections_to_remove: []
    benchmark_references: []

  - template: "ceo-succession-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency succession is the most consequential transition in the business — the founder is often the firm's primary relationship holder, rainmaker, and quality standard. Succession planning must address client relationship transfer, not just management transfer."
    field_changes:
      - field: "Succession candidates"
        sector_label: "Succession Readiness Assessment"
        sector_guidance: "Assess candidates on three agency-specific dimensions: (1) Client relationships — do key clients trust and respect the successor? (2) Business development — can the successor win new business, not just manage existing accounts? (3) Team leadership — can the successor inspire and retain the team that defines the firm's delivery quality?"
    sections_to_add:
      - section_name: "Client Transition Plan"
        placement: "end"
        description: "How key client relationships will transfer during leadership transition."
        fields:
          - "Key client relationships currently owned by departing leader"
          - "Transition timeline for each relationship (gradual introduction over 6-12 months)"
          - "Risk assessment for each relationship during transition"
          - "Communication plan for clients"
    sections_to_remove: []
    benchmark_references: ["client-retention-rate", "revenue-per-partner"]

  # ─────────────────────────────────────────────
  # TEAM TEMPLATES (13)
  # ─────────────────────────────────────────────

  - template: "action-plan"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency action plans should connect to the dual objectives of client delivery and firm building, with explicit consideration of utilization and capacity impact."
    field_changes:
      - field: "Success metrics"
        sector_label: "Agency KPI Targets"
        sector_guidance: "Define success using agency metrics: utilization impact, client retention effect, revenue per client change, pipeline coverage improvement, or employee retention. Every action item should connect to a measurable agency KPI. Explicitly note the capacity cost — how many billable hours this initiative consumes."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["utilization-rate", "client-retention-rate"]

  - template: "new-initiative-brief"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency initiatives must be evaluated for their impact on the firm's most constrained resource: billable people's time. Every initiative that consumes billable hours has a direct opportunity cost measured in lost revenue."
    field_changes:
      - field: "Expected outcomes"
        sector_label: "Expected Agency Impact"
        sector_guidance: "Quantify impact on agency economics: revenue contribution, margin improvement, client retention improvement, utilization effect, or positioning benefit. Include the timeline to measurable impact."
      - field: "Resource requirements"
        sector_label: "Resource Requirements and Billable Opportunity Cost"
        sector_guidance: "Quantify the hours required from billable staff and the revenue those hours would have generated if billed to clients. This opportunity cost calculation forces honest prioritization."
    sections_to_add:
      - section_name: "Billable Impact Analysis"
        placement: "after:Expected Agency Impact"
        description: "The effect on utilization and billable capacity."
        fields:
          - "Billable hours consumed by this initiative"
          - "Revenue opportunity cost (hours x effective rate)"
          - "Expected revenue return (when and how much)"
          - "Breakeven timeline"
    sections_to_remove: []
    benchmark_references: ["utilization-rate", "revenue-per-employee"]

  - template: "project-kickoff-document"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency project kickoffs should define scope boundaries with surgical precision — scope creep prevention begins at kickoff, not when overruns are already underway."
    field_changes:
      - field: "Success criteria"
        sector_label: "Deliverables, Scope Boundaries, and Success Metrics"
        sector_guidance: "Define three things explicitly: (1) What is IN scope — specific deliverables with acceptance criteria. (2) What is OUT of scope — explicit exclusions to prevent assumption-based creep. (3) Change-order process — how scope additions are requested, approved, and billed. Include budget hours and the process for flagging when 80% of budget is consumed."
    sections_to_add:
      - section_name: "Resource Allocation and Timeline"
        placement: "after:Deliverables, Scope Boundaries, and Success Metrics"
        description: "Who is assigned, for how many hours, and on what timeline."
        fields:
          - "Team members assigned (name, role, allocated hours)"
          - "Key milestones and delivery dates"
          - "Client responsibilities and dependencies"
          - "Escalation path for scope or timeline issues"
    sections_to_remove: []
    benchmark_references: ["scope-creep-rate", "effective-billable-rate"]

  - template: "hiring-scorecard"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency hiring scorecards must assess both craft skills (can they do the work?) and client-service skills (can they manage relationships, communicate professionally, and represent the firm?)."
    field_changes:
      - field: "Required competencies"
        sector_label: "Agency-Specific Competencies"
        sector_guidance: "For delivery roles: craft quality, time management, client communication, and ability to work within scope constraints. For account roles: relationship building, business development aptitude, negotiation skill, and commercial awareness. For all roles: assess fit with the firm's culture, willingness to track time, and comfort with the billable-hours reality of agency life."
    sections_to_add:
      - section_name: "Client-Readiness Assessment"
        placement: "end"
        description: "Assessment of the candidate's readiness for client-facing work."
        fields:
          - "Communication quality (written and verbal)"
          - "Presentation confidence"
          - "Ability to manage ambiguity and client feedback"
          - "Professional polish and reliability"
          - "Estimated time to full client-facing deployment"
    sections_to_remove: []
    benchmark_references: []

  - template: "incident-postmortem"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency incidents are primarily client-facing: missed deadlines, quality failures, scope disputes, or relationship breakdowns. The postmortem must address both the operational failure and the client relationship impact."
    field_changes:
      - field: "Impact assessment"
        sector_label: "Client and Business Impact"
        sector_guidance: "Quantify: which client(s) affected, relationship impact assessment (at-risk? frustrated? understanding?), financial impact (write-offs, penalties, lost future revenue risk), and team impact (morale, overtime, burnout). Include the client communication log."
    sections_to_add:
      - section_name: "Client Relationship Recovery"
        placement: "after:Client and Business Impact"
        description: "Plan for restoring client confidence after the incident."
        fields:
          - "Client communication (what was communicated, when, by whom)"
          - "Client sentiment after communication"
          - "Recovery actions (additional deliverables, discounts, senior attention)"
          - "Relationship health check (scheduled follow-up)"
    sections_to_remove: []
    benchmark_references: ["nps-client", "client-retention-rate"]

  - template: "retrospective-template"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency retrospectives should evaluate project profitability and client satisfaction alongside team process — the economic outcome matters as much as the process quality."
    field_changes:
      - field: "What went well"
        sector_label: "What Went Well (Delivery and Client)"
        sector_guidance: "Include both internal process successes and client-facing successes. Did the project deliver on time and on budget? Was the client satisfied? Did the work generate a referral or case study opportunity?"
    sections_to_add:
      - section_name: "Project Economics Review"
        placement: "end"
        description: "Financial review of project performance."
        fields:
          - "Budgeted hours vs. actual hours"
          - "Effective rate achieved vs. target"
          - "Scope changes and their financial impact"
          - "Lessons for future scoping and pricing"
    sections_to_remove: []
    benchmark_references: ["effective-billable-rate", "scope-creep-rate"]

  - template: "meeting-notes-template"
    audience: "team"
    sector_adaptation: "as-is"
    adaptation_rationale: "Meeting notes structure is not sector-specific."
    field_changes: []
    sections_to_add: []
