  - template: "feedback-360-template"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency 360 feedback should include client feedback as a dimension — how the person is perceived by the clients they serve is as important as how they are perceived by colleagues."
    field_changes:
      - field: "Feedback sources"
        sector_label: "Agency 360 Feedback Sources"
        sector_guidance: "Include four feedback dimensions: (1) Manager assessment. (2) Peer assessment. (3) Direct report assessment (if applicable). (4) Client assessment — request feedback from 2-3 client contacts on the person's communication, reliability, and impact. Client feedback is a unique and invaluable data source in agency settings."
