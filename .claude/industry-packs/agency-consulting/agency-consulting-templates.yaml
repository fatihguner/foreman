  - template: "team-health-check"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency team health must include utilization balance, client-service stress levels, and the sell-deliver alignment that defines agency operational health."
    field_changes:
      - field: "Health indicators"
        sector_label: "Agency Team Health Indicators"
        sector_guidance: "Include agency-specific indicators: utilization balance (overworked vs. underutilized), client satisfaction with team members, sell-deliver alignment (are commitments realistic?), overtime frequency, work variety (are people stuck on repetitive accounts?), and professional development progress."
    sections_to_add:
      - section_name: "Utilization and Workload Balance"
        placement: "end"
        description: "Assessment of whether the team's workload is sustainable and well-distributed."
        fields:
          - "Utilization distribution (who is over/under-utilized)"
          - "Overtime hours (last month)"
          - "Staff working on a single client for more than 6 months (risk of monotony and client dependency)"
          - "Bench time distribution"
    sections_to_remove: []
