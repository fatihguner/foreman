    benchmark_references: []

  # ─────────────────────────────────────────────
  # CLIENT TEMPLATES (8)
  # These are among the most important templates
  # for agencies — client-facing documents are
  # the primary expression of the firm's quality.
  # ─────────────────────────────────────────────

  - template: "quarterly-business-review"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency QBRs are the primary retention and expansion vehicle for retainer clients. The QBR must demonstrate the value delivered (connecting agency work to client business outcomes), review the relationship health, and identify opportunities for expanded engagement. A strong QBR is the single best defense against client churn."
    field_changes:
      - field: "Performance summary"
        sector_label: "Value Delivered"
        sector_guidance: "Quantify the value the agency delivered this quarter: campaigns launched, deliverables completed, business outcomes influenced (traffic, leads, revenue, brand awareness, operational efficiency). Use the client's own metrics and language. Present the work in context — not 'we wrote 12 blog posts' but 'the 12 content pieces generated 1,400 qualified leads against a target of 1,000.'"
      - field: "Account status"
        sector_label: "Engagement Summary"
        sector_guidance: "Present: hours consumed vs. retainer allocation, deliverables completed vs. planned, scope changes (if any) and their impact, and team members engaged on the account."
      - field: "Next steps"
        sector_label: "Recommended Next Steps and Expansion Opportunities"
        sector_guidance: "Identify opportunities for expanded engagement: new services, increased scope, additional deliverables, or strategic projects. Frame as business outcomes ('based on Q2 results, we recommend testing a paid acquisition strategy that could generate an additional 500 leads/month') rather than service pitches."
    sections_to_add:
      - section_name: "Relationship Health Assessment"
        placement: "before:Value Delivered"
        description: "Proactive assessment of the working relationship."
        fields:
          - "Overall satisfaction (ask directly during the QBR)"
          - "Communication effectiveness"
          - "Team fit and responsiveness"
          - "Areas for improvement (agency-side)"
      - section_name: "Strategic Recommendations"
        placement: "after:Recommended Next Steps and Expansion Opportunities"
        description: "Proactive strategic counsel that positions the agency as a trusted advisor."
        fields:
          - "Market trends or competitive changes the client should be aware of"
          - "Opportunities the agency sees based on its industry perspective"
          - "Recommended strategic priorities for next quarter"
    sections_to_remove: []
    benchmark_references: ["nps-client", "revenue-per-client", "client-retention-rate"]

  - template: "onboarding-welcome-packet"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency client onboarding sets the tone for the entire relationship. The welcome packet should establish clear expectations, introduce the team, define communication norms, and demonstrate professionalism from the first interaction."
    field_changes:
      - field: "Getting started steps"
        sector_label: "Engagement Kickoff Path"
        sector_guidance: "Structure as: (1) Discovery and briefing — what the agency needs from the client (brand assets, access, background documents). (2) Team introduction — who will work on the account, their roles, and their contact information. (3) Communication norms — meeting cadence, preferred communication channels, response time expectations, escalation path. (4) First milestone — what will be delivered and when, creating early momentum."
      - field: "Resources"
        sector_label: "Working with Us"
        sector_guidance: "Include: the agency's working methodology (how projects progress from brief to delivery), feedback and revision process (how many rounds, how to provide feedback effectively), approval workflows, and a glossary of agency terminology the client may encounter."
    sections_to_add:
      - section_name: "Scope and Boundary Document"
        placement: "end"
        description: "Clear statement of what is included and what requires additional agreement."
        fields:
          - "Scope summary (what is included in the engagement)"
          - "Out-of-scope items (explicit exclusions)"
          - "Change-order process (how to request additional work)"
          - "Key dates and milestones"
    sections_to_remove: []
    benchmark_references: ["scope-creep-rate", "nps-client"]

  - template: "proposal-outline"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency proposals are the primary sales vehicle. The proposal must sell the firm's understanding of the problem (not its capabilities), present a credible approach, and justify the investment through expected outcomes. The proposal itself is a demonstration of the firm's thinking quality."
    field_changes:
      - field: "Pricing"
        sector_label: "Investment and Expected Value"
        sector_guidance: "Present pricing in the context of expected value. Structure options: (1) Investment amount (project fee, retainer, or phased pricing). (2) What is included (deliverables, meetings, revisions). (3) What is not included (explicit exclusions to prevent scope assumption). (4) Expected return (how the investment will pay for itself in client business terms). Where possible, offer 2-3 pricing tiers to anchor the client's decision."
      - field: "Scope"
        sector_label: "Approach and Scope of Work"
        sector_guidance: "Lead with the agency's understanding of the client's problem (demonstrate listening), then present the approach (methodology, phases, deliverables), then detail the scope (what, when, who). The scope section should be precise enough to serve as the SOW foundation — reducing the gap between proposal acceptance and contract signature."
    sections_to_add:
      - section_name: "Why Us"
        placement: "end"
        description: "Concise case for why this agency is the right partner — not a generic capabilities list."
        fields:
          - "Relevant experience (2-3 case studies directly applicable to this engagement)"
          - "Team assigned (specific people, not generic role titles)"
          - "What makes our approach different (methodology, perspective, or commitment)"
    sections_to_remove: []
    benchmark_references: ["win-rate", "average-project-value"]

  - template: "service-level-agreement"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency SLAs define the operational commitments that underpin client trust — response times, deliverable quality standards, communication cadence, and escalation procedures."
    field_changes:
      - field: "Service levels"
        sector_label: "Agency Service Commitments"
        sector_guidance: "Standard agency SLA components: (1) Response time — email within X hours, urgent matters within Y hours. (2) Deliverable timeline — first draft within X days of brief approval. (3) Revision process — X rounds of revisions included; additional rounds billed at Z rate. (4) Communication cadence — weekly status call, monthly report, quarterly QBR. (5) Team continuity — commitment to maintain named team members for duration of engagement."
      - field: "Remediation"
        sector_label: "Issue Resolution Process"
        sector_guidance: "Define: escalation ladder (project manager > account director > partner), timeline for issue resolution, and the commitment to proactive communication when problems arise. Include a satisfaction guarantee or scope-credit mechanism if appropriate."
    sections_to_add:
      - section_name: "Scope Management Terms"
        placement: "end"
        description: "Clear terms for how scope changes are handled — the primary source of agency-client friction."
        fields:
          - "Change-order process and approval requirements"
          - "Rate for out-of-scope work"
          - "Impact of scope changes on timeline"
          - "Monthly scope utilization report"
    sections_to_remove: []
    benchmark_references: ["scope-creep-rate", "effective-billable-rate"]

  - template: "project-status-update"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency project status updates should provide complete transparency on progress, budget consumption, and any risks — building the trust that sustains long-term relationships."
    field_changes:
      - field: "Progress summary"
        sector_label: "Delivery Progress and Budget Status"
        sector_guidance: "Present: (1) Deliverables completed since last update. (2) Work in progress and expected completion. (3) Budget consumption (hours or dollars used vs. total). (4) Timeline status (on track, ahead, or behind — with explanation if behind). (5) Client action items (decisions needed, feedback required, access to be provided). Transparency on budget consumption builds trust and prevents end-of-project surprises."
    sections_to_add:
      - section_name: "Risk and Change Log"
        placement: "after:Delivery Progress and Budget Status"
        description: "Proactive identification of risks and tracking of scope changes."
        fields:
          - "Risks identified (what could delay or impact the project)"
          - "Scope changes since last update (requested, approved, pending)"
          - "Budget impact of changes (if any)"
    sections_to_remove: []
    benchmark_references: ["scope-creep-rate"]

  - template: "analysis-report"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency analysis reports are the deliverables that demonstrate the firm's intellectual value. The report structure should showcase the agency's thinking quality and provide actionable recommendations, not just data presentation."
    field_changes:
      - field: "Findings"
        sector_label: "Key Findings and Implications"
        sector_guidance: "Structure findings as insight-implication pairs: each finding should be followed by 'this means...' (the business implication for the client). Do not present data without interpretation. The agency's value is the interpretation, not the data gathering."
    sections_to_add:
      - section_name: "Prioritized Recommendations"
        placement: "end"
        description: "Actionable recommendations ranked by impact and feasibility."
        fields:
          - "Recommendations ranked by expected business impact"
          - "Feasibility assessment for each recommendation (effort, timeline, dependencies)"
          - "Recommended next steps (what the agency proposes to do next)"
          - "Quick wins (immediate actions with disproportionate impact)"
    sections_to_remove: []
    benchmark_references: []

  - template: "case-study-template"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency case studies are the primary sales tool — they demonstrate capability through evidence rather than claims. Every case study should be structured as a story with quantified outcomes that enable prospects to envision similar results for their own business."
    field_changes:
      - field: "Results"
        sector_label: "Quantified Outcomes"
        sector_guidance: "Every agency case study must include at least 2-3 quantified outcomes: revenue impact, cost reduction, performance improvement, time saved, or efficiency gained. Include the timeframe over which results were achieved. Abstract outcomes ('improved brand perception') are insufficient unless supported by measurable proxies (NPS increase, survey data, engagement metrics)."
      - field: "Challenge"
        sector_label: "Client Challenge and Context"
        sector_guidance: "Describe the business challenge (not the agency brief). Help the reader see themselves: what was the client struggling with, what had they tried before, what was at stake? Include enough context that a similar prospect would recognize their own situation."
    sections_to_add:
      - section_name: "Approach and Methodology"
        placement: "after:Client Challenge and Context"
        description: "How the agency approached the problem — demonstrating thinking quality."
        fields:
          - "Diagnostic process (how the agency understood the real problem)"
          - "Strategy development (what approach was chosen and why)"
          - "Execution highlights (what was distinctive about the delivery)"
          - "Timeline and team composition"
      - section_name: "Client Testimonial"
        placement: "after:Quantified Outcomes"
        description: "Direct client voice validates the agency's claims."
        fields:
          - "Client quote on the experience and results"
          - "Client name and title (with permission)"
    sections_to_remove: []
    benchmark_references: ["nps-client", "win-rate"]

  - template: "partnership-memo"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency partnership memos should address the mutual benefit structure, referral economics, and quality assurance terms that govern inter-firm collaboration."
    field_changes:
      - field: "Partnership structure"
        sector_label: "Agency Partnership Structure"
        sector_guidance: "Define: (1) Partnership type — referral (sending clients), delivery (subcontracting), or strategic (co-pitching). (2) Economic terms — referral fees, subcontracting rates, revenue sharing on joint engagements. (3) Quality standards — how each firm ensures the other's work meets standards when client-facing. (4) Client ownership — who owns the client relationship in different scenarios."
    sections_to_add:
      - section_name: "Referral and Collaboration Terms"
        placement: "end"
        description: "Operational terms for how the partnership works in practice."
        fields:
          - "Referral process and tracking methodology"
          - "Referral fee structure and payment timing"
          - "Joint pitch process (who leads, how costs are shared)"
          - "Non-compete/non-solicit terms between the partner firms"
          - "Review cadence (how often the partnership is evaluated)"
    sections_to_remove: []
    benchmark_references: ["win-rate", "cost-per-lead"]
