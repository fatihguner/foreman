  # ─────────────────────────────────────────────
  # SELF TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "weekly-ceo-review"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "An agency founder's weekly review must balance the practitioner role (am I delivering quality work?) with the business-builder role (am I developing the firm?). The most important weekly metric is the split between billable and non-billable time."
    field_changes:
      - field: "Weekly metrics"
        sector_label: "Weekly Agency Dashboard"
        sector_guidance: "Review weekly: personal billable hours (target vs. actual), firm utilization rate, pipeline changes, cash position, AR aging, active client count. Monthly metrics (retention, NPS, margins) should be reviewed monthly, not weekly."
      - field: "Priorities"
        sector_label: "This Week's Priorities"
        sector_guidance: "Categorize into the four quadrants: (1) Client delivery — which projects need my attention? (2) Business development — which prospects am I advancing? (3) Team management — which people issues need resolution? (4) Firm building — what system, process, or strategy am I advancing? Ruthlessly limit to 3-5 items total."
    sections_to_add:
      - section_name: "Founder Capacity Audit"
        placement: "after:Weekly Agency Dashboard"
        description: "Weekly tracking of how the founder's time is allocated — the most revealing agency metric."
        fields:
          - "Hours on billable client work"
          - "Hours on business development (proposals, networking, pitches)"
          - "Hours on team management (meetings, reviews, mentoring)"
          - "Hours on firm building (strategy, operations, finance)"
          - "Hours on administrative tasks (email, scheduling, invoicing)"
          - "Total hours worked"
          - "Trend assessment: am I shifting toward or away from the right allocation?"
    sections_to_remove: []
    benchmark_references: ["utilization-rate", "pipeline-coverage-ratio"]

  - template: "decision-journal"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency decision journals should explicitly capture the dual dimensions of agency decisions — financial impact and relationship impact — and the specific agency metrics that informed the decision."
    field_changes:
      - field: "Decision context"
        sector_label: "Decision Context and Data"
        sector_guidance: "Record: the agency metrics that informed this decision (utilization data, client concentration, pipeline status), the relationship dimension (how does this affect key client or employee relationships?), the alternatives considered, and the specific metric and relationship outcomes that will confirm the decision was correct."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "annual-review-and-planning"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency annual reviews should assess the firm across clients, people, and finances — and honestly evaluate whether the founder's personal role is evolving appropriately."
    field_changes:
      - field: "Year in review"
        sector_label: "Agency Year in Review"
        sector_guidance: "Assess across the three pillars: Clients (retention rate, NPS, concentration change, major wins and losses), People (retention rate, eNPS, key hires and departures, bench time), Finances (revenue growth, margin trajectory, utilization trend, cash flow). Honestly assess: am I still doing the same role I was doing a year ago, or have I evolved as a leader?"
      - field: "Next year goals"
        sector_label: "Next Year Agency Targets"
        sector_guidance: "Set targets across all dimensions: revenue target, margin target, client retention target, employee retention target, utilization target, and personal development goal. Each target should reference the benchmark tier being pursued. Include a personal role-evolution goal: what will I delegate this year that I currently do myself?"
    sections_to_add:
      - section_name: "Founder Role Evolution"
        placement: "end"
        description: "Honest assessment of the founder's personal transition from practitioner to business leader."
        fields:
          - "Percentage of time on billable work (current vs. target)"
          - "Percentage of time on business development (current vs. target)"
          - "Percentage of time on management and leadership (current vs. target)"
          - "What did I delegate this year that I used to do myself?"
          - "What should I delegate next year?"
          - "What do I need to learn to be effective at my evolving role?"
    sections_to_remove: []
    benchmark_references: ["revenue", "ebitda-margin", "client-retention-rate", "employee-retention-rate", "utilization-rate"]

  - template: "stakeholder-map"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency stakeholder maps should center on the relationship web that defines agency success — client contacts, referral partners, talent sources, and industry influencers."
    field_changes:
      - field: "Stakeholder categories"
        sector_label: "Agency Stakeholder Ecosystem"
        sector_guidance: "Include: Clients (primary contacts, champions, economic buyers, internal sponsors), Referral Partners (complementary firms, former colleagues, industry connections), Talent Sources (recruiters, universities, professional networks, freelancer community), Industry (conference organizers, publication editors, community leaders, trade association contacts), and Financial (banker, accountant, lawyer, insurance broker)."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "negotiation-prep-sheet"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency negotiation prep should address the specific negotiation types and leverage dynamics unique to professional services."
    field_changes:
      - field: "Negotiation type"
        sector_label: "Agency Negotiation Context"
        sector_guidance: "Classify: scope negotiation (additional work within existing budget), rate negotiation (client pushing for lower rates), contract terms (SOW, liability, IP ownership), retainer renewal (scope and rate restructuring), new business pitch (competitive proposal), talent negotiation (compensation, role definition), or partner negotiation (equity, profit sharing, role boundaries)."
      - field: "BATNA"
        sector_label: "BATNA and Agency Leverage"
        sector_guidance: "Agency-specific leverage points: for client negotiations — institutional knowledge, relationship depth, switching costs, portfolio of work, competitive alternatives. For rate negotiations — value documentation, outcome metrics, competitive rate benchmarks. For talent negotiations — culture, work quality, growth opportunity, flexibility, ownership path."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["average-billable-rate", "client-retention-rate"]

  - template: "career-strategy-canvas"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "For agency founders, career strategy is inseparable from firm strategy. The canvas should address the founder's intended trajectory: remain as practitioner-owner, transition to managing director, build toward exit, or evolve to a portfolio of interests."
    field_changes:
      - field: "Career vision"
        sector_label: "Founder-Firm Vision Alignment"
        sector_guidance: "Address: (1) What do I want the firm to look like in 5 years? (2) What role do I want to play in that firm? (3) Are these compatible? A founder who wants a 50-person agency but also wants to personally do strategy work has a contradiction that must be resolved. (4) What is my exit or endgame — sell, transition to partners, scale, or sustain as lifestyle?"
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "founder-mental-health-check"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency founder mental health is affected by agency-specific stressors: the personal nature of client rejection, the isolation of carrying client relationships alone, the guilt of being unable to shield the team from demanding clients, and the identity fusion between personal reputation and firm performance."
    field_changes:
      - field: "Stress indicators"
        sector_label: "Agency-Specific Stress Indicators"
        sector_guidance: "Include: inability to stop working on client projects (checking email at midnight for client responses), avoidance of difficult client conversations (absorbing scope creep rather than confronting it), identity fusion with client satisfaction (personal mood tracking with client feedback), isolation (not discussing business challenges with peers or advisors), and decision fatigue (avoiding hiring, pricing, or strategic decisions because they feel overwhelming)."
    sections_to_add:
      - section_name: "Boundary Assessment"
        placement: "end"
        description: "Assessment of work-life boundaries — particularly challenging for agency founders."
        fields:
          - "Hours worked per week (honest count)"
          - "Days without checking client email/Slack"
          - "Vacations taken without working (truly disconnected)"
          - "Client emergencies that could have been handled by someone else"
          - "Scope creep absorbed rather than addressed (this week)"
    sections_to_remove: []
    benchmark_references: []

  - template: "leadership-reflection"
    audience: "self"
    sector_adaptation: "as-is"
    adaptation_rationale: "Leadership reflection is not sector-specific. The reflections naturally address agency-specific challenges."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "learning-plan"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency founders should include agency-specific learning areas alongside general leadership development."
    field_changes:
      - field: "Learning areas"
        sector_label: "Agency Learning Priorities"
        sector_guidance: "Consider agency-specific learning areas: agency pricing strategy (value-based, productized), business development and sales for services, account management and client retention, financial management for services firms, talent management and culture building, AI integration for agency services, and personal transition from practitioner to business leader."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "personal-board-tracker"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "An agency founder's personal advisory network should include people who have navigated the specific challenges of building a services business."
    field_changes:
      - field: "Advisor categories"
        sector_label: "Agency Advisory Needs"
        sector_guidance: "Map advisors to agency-specific needs: Agency operator (someone who has built and scaled an agency to $5M+), Financial (accountant experienced with services firms, banker for credit facilities), Legal (employment law, client contracts, partnership agreements), Talent (recruiter or HR advisor for agency-specific roles), Industry (domain expert in the firm's target vertical), Peer (other agency founders at a similar stage for honest exchange)."
