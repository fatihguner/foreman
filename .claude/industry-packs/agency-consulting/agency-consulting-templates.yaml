  - template: "role-description-template"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency role descriptions must specify the utilization expectation, client-facing responsibilities, and the balance between billable delivery and non-billable activities for each role."
    field_changes:
      - field: "Key responsibilities"
        sector_label: "Key Responsibilities and Utilization Expectation"
        sector_guidance: "For each role, specify: (1) Primary responsibilities (delivery, client management, business development, or operations). (2) Utilization target (billable hours as % of available hours). (3) Client-facing expectations (direct client contact? presentations? relationship management?). Typical utilization targets: junior delivery 70-80%, senior delivery 60-70%, account manager 50-60%, partner 30-50%, operations 0%."
      - field: "Required experience"
        sector_label: "Agency Experience Requirements"
        sector_guidance: "Specify: agency or professional services experience expected, client-service orientation, comfort with time tracking, and the specific discipline expertise required. Distinguish between 'must have agency experience' roles and 'can learn agency dynamics' roles."
