  - template: "one-on-one-template"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "Agency one-on-ones should explicitly address the dual dimensions of work that affect agency professionals: project satisfaction (are they doing interesting, challenging work?) and utilization reality (are they billing enough, are they overwhelmed, do they need more or different work?)."
    field_changes:
      - field: "Discussion topics"
        sector_label: "Agency-Specific Discussion Topics"
        sector_guidance: "Include agency-specific check-ins: (1) Current project satisfaction — is the work engaging and developmental? (2) Client relationship health — any concerns about client interactions? (3) Utilization and workload — too much, too little, or the right amount? (4) Career development — what skills do they want to develop? (5) Work environment — any cultural or team concerns?"
    sections_to_add: []
    sections_to_remove: []
