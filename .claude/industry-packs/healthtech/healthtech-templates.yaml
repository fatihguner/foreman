    adaptation_rationale: "Healthtech QBRs with health system customers must present clinical outcomes data, provider adoption metrics, and patient engagement alongside standard account health metrics. The QBR is the primary vehicle for demonstrating clinical value — which drives renewal."
    field_changes:
      - field: "Performance summary"
        sector_label: "Clinical Value Delivered"
        sector_guidance: "Lead with clinical outcomes: patient health improvements attributable to the product, comparison to pre-deployment baseline, and comparison to published benchmarks. Quantify using the customer's own quality metrics (CMS quality measures, internal KPIs). Revenue impact comes second — clinical value justifies the financial investment."
      - field: "Account status"
        sector_label: "Adoption & Engagement Metrics"
        sector_guidance: "Present: provider adoption rate (active providers / licensed providers), patient enrollment and engagement, clinical workflow integration status, and usage trends. Segment by department or clinical unit within the health system."
      - field: "Next steps"
        sector_label: "Clinical Expansion Opportunities"
        sector_guidance: "Identify expansion opportunities: additional clinical departments, additional patient populations, additional clinical use cases (if evidence-supported), and deeper EHR integration. Frame as clinical value expansion, not commercial upsell."
    sections_to_add:
      - section_name: "Clinical Outcomes Summary"
        placement: "before:Clinical Value Delivered"
        description: "Clinical outcomes data for the health system customer — the most important section of the QBR."
        fields:
          - "Primary clinical outcome metric (pre-deployment vs. current)"
          - "Secondary outcomes and quality metrics"
          - "Patient safety summary (adverse events, if any)"
          - "Comparison to published clinical benchmarks"
      - section_name: "Provider Feedback Summary"
