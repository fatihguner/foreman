    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech onboarding at health systems determines provider adoption and clinical workflow integration — the most critical success factors for retention. The welcome packet must address both technical implementation and clinical change management."
    field_changes:
      - field: "Getting started steps"
        sector_label: "Clinical Implementation Path"
        sector_guidance: "Define the implementation path across both technical and clinical tracks: (1) Technical: EHR integration, data validation, security review (week 1-2). (2) Clinical: provider training, clinical workflow design, clinical champion identification (week 2-4). (3) Pilot: limited deployment with clinical champions, outcome measurement (week 4-8). (4) Expansion: broader deployment with provider peer training (week 8-12). Each step includes estimated time and a 'go/no-go' clinical criterion."
      - field: "Resources"
        sector_label: "Clinical & Technical Resources"
        sector_guidance: "Include: clinical evidence summary (for clinical review committee), EHR integration documentation, provider training materials (accredited CME if available), patient enrollment resources, clinical protocol documentation, and HIPAA BAA template."
    sections_to_add:
      - section_name: "Clinical Champion Engagement Plan"
