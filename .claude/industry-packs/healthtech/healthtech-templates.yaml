  - template: "proposal-outline"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech proposals to health systems must include clinical evidence, regulatory status, HIPAA compliance documentation, and clinical outcome commitments alongside standard commercial terms."
    field_changes:
      - field: "Solution overview"
        sector_label: "Clinical Solution Overview"
        sector_guidance: "Lead with the clinical problem and outcome — not the technology. Structure: clinical problem statement (with data from the health system's own metrics if available), clinical evidence supporting the solution (published studies, outcome data), and how the solution integrates into the health system's clinical workflow."
