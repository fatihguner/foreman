# Healthtech Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for healthtech companies. The output agent loads these rules
# when generating documents with the healthtech industry pack active.
#
# PATIENT SAFETY PRINCIPLE: All materials — investor, board, team, self, and
# client — must incorporate patient safety as a first-class dimension. Risk
# sections include patient safety risk alongside business risk. Clinical metrics
# appear alongside financial metrics. Regulatory and reimbursement status are
# reported as standard elements, not appendices.
#
# TRIPLE STAKEHOLDER PRINCIPLE: Investor and board materials must address the
# triple-aim value proposition (patient outcomes, provider experience, cost
# reduction) because healthtech viability depends on all three. Unit economics
# include clinical validation cost amortization. Board materials distinguish
# clinical advisory board governance from corporate board governance.
#
# Adaptation types:
#   as-is    — The template works without modification for healthtech companies.
#   modified — The template requires field changes, additional sections, or
#              reframing of existing sections for healthtech context.

pack_metadata:
  sector: "healthtech"
  display_name: "Healthtech"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech unit economics are per-patient, not per-account, and include clinical validation cost amortization, regulatory pathway investment, and reimbursement-dependent revenue. The snapshot must show investors that the per-patient economics are sustainable after accounting for clinical evidence investment and regulatory costs — expenses unique to healthtech that do not exist in standard SaaS."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "Revenue per Patient per Month (by Source)"
        sector_guidance: "Decompose revenue per patient by source: payer reimbursement (specify CPT/HCPCS codes and rates), health system SaaS allocation per patient, employer direct-pay allocation per covered life, and patient self-pay. Report each separately because regulatory exposure, durability, and margin profiles differ."
      - field: "Cost per unit"
        sector_label: "CAC per Health System + Patient Acquisition Cost"
        sector_guidance: "Report two CAC figures: (1) CAC per health system customer (fully loaded including pilot costs, clinical evaluation support, integration implementation, and sales effort). (2) Patient acquisition cost within deployed health systems (enrollment, onboarding, clinician training per patient). In healthtech, the health system is acquired first, then patients within the system are enrolled."
      - field: "Margin per unit"
        sector_label: "Gross Margin per Patient"
        sector_guidance: "Calculate per-patient gross margin including: clinical support staff cost per patient (if applicable), technology cost per patient, and regulatory compliance cost allocation per patient. Distinguish technology-only margin from blended margin including clinical services."
      - field: "Lifetime value"
        sector_label: "Patient LTV (Clinically Adjusted)"
        sector_guidance: "Calculate LTV incorporating: revenue per patient per month, patient retention rate, clinical program duration (some interventions are time-limited), and gross margin. Disclose whether the clinical protocol has a defined endpoint (e.g., 12-week DTx program) or is ongoing (e.g., chronic disease monitoring). Clinical validation cost should be amortized across projected lifetime patient volume."
      - field: "Acquisition cost"
        sector_label: "CAC Payback Period (Blended)"
        sector_guidance: "Report payback in months, calculated on the blended CAC (health system acquisition cost amortized across expected patient volume plus per-patient enrollment cost). Note: healthtech payback periods are typically longer than SaaS because health system sales cycles extend the time to first revenue."
      - field: "Unit economics ratio"
        sector_label: "Patient LTV:CAC Ratio"
        sector_guidance: "Report the blended ratio and compare to the 3x-5x benchmark. Because healthtech CAC includes clinical validation costs (study execution, regulatory pathway), the ratio may appear lower than SaaS — explain this distinction for investors comparing across sectors."
    sections_to_add:
      - section_name: "Healthtech Metrics Dashboard"
        placement: "before:Revenue per Patient per Month (by Source)"
        description: "Core healthtech metrics in a format health-focused investors expect."
        fields:
          - "Monthly Active Patients and growth rate"
          - "Revenue per Patient per Month"
          - "Payer Reimbursement Rate (%)"
          - "Provider Adoption Rate (%)"
          - "Patient Engagement Rate (weekly)"
          - "Clinical Outcome Improvement (primary endpoint)"
          - "Gross Margin (technology-only and blended)"
          - "Clinical Evidence Stage"
          - "Regulatory Status"
      - section_name: "Clinical Validation Cost Amortization"
        placement: "after:Patient LTV:CAC Ratio"
        description: "Clinical evidence investment and its amortization across the patient base."
        fields:
          - "Total clinical validation investment to date (studies, regulatory, medical writing)"
          - "Projected total clinical validation investment"
          - "Clinical validation cost per patient (amortized across projected patient volume)"
          - "Regulatory pathway cost incurred and remaining"
      - section_name: "Reimbursement Structure"
        placement: "after:Clinical Validation Cost Amortization"
        description: "How the product generates revenue through the healthcare payment system."
        fields:
          - "Applicable CPT/HCPCS codes and reimbursement rates"
          - "Payer coverage status (Medicare, top 10 commercial payers)"
          - "Revenue per patient under full reimbursement vs. current reimbursement"
          - "Path to broader payer coverage (timeline and milestones)"
    sections_to_remove: []
    benchmark_references: ["revenue-per-patient-per-month", "cac-health-system", "gross-margin", "payer-reimbursement-rate", "clinical-validation-stage", "regulatory-approval-status", "patient-engagement-rate", "monthly-active-patients"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech investor updates must include clinical milestones and regulatory status alongside financial metrics. Health-focused investors expect proactive disclosure of clinical evidence progress, regulatory interactions, and reimbursement developments. Clinical milestones (study enrollment, data analysis, publication, regulatory submission) are as important as commercial milestones."
    field_changes:
      - field: "Financial highlights"
        sector_label: "Healthtech KPIs"
        sector_guidance: "Report: Monthly Active Patients, Revenue (total and per-patient), Payer Reimbursement Rate (% of revenue), Provider Adoption Rate, Patient Engagement Rate, and Gross Margin. Present as a small table with current month, prior month, and trend arrow."
      - field: "Key metrics"
        sector_label: "Clinical & Regulatory Milestones"
        sector_guidance: "Report: clinical study enrollment/completion status, regulatory submission status, payer coverage decisions, clinical evidence publications, and adverse event summary (if applicable). These milestones are as consequential as revenue metrics for healthtech investors."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include at least one clinical win: a patient outcome improvement demonstrated, a health system deployment completed, a clinical publication accepted, or a regulatory milestone achieved. Financial wins should be reported alongside clinical wins, not instead of them."
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Lead with challenges. In healthtech, challenges often have regulatory or clinical dimensions: regulatory feedback requiring additional data, payer coverage denial, provider adoption below target, or patient engagement declining. Investors respect transparency about clinical challenges."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "Be specific. Healthtech-specific asks: introduction to a health system CIO or CMIO for pilot discussion, connection to a payer medical director for coverage discussion, introduction to clinical key opinion leaders for advisory engagement."
    sections_to_add:
      - section_name: "Regulatory & Clinical Status"
        placement: "after:Healthtech KPIs"
        description: "Standing regulatory and clinical evidence status that investors can track month-over-month."
        fields:
          - "FDA regulatory status (current stage and next milestone)"
          - "Clinical study status (enrollment, data collection, analysis, publication)"
          - "Payer coverage status (applications pending, decisions received)"
          - "Patient safety summary (adverse events, if any)"
      - section_name: "Cash Position"
        placement: "after:Regulatory & Clinical Status"
        description: "Cash and runway with regulatory milestone overlay."
        fields:
          - "Cash balance (end of month)"
          - "Monthly burn rate (trailing 3-month average)"
          - "Months of runway"
          - "Runway relative to next regulatory milestone"
    sections_to_remove: []
    benchmark_references: ["monthly-active-patients", "revenue-per-patient-per-month", "payer-reimbursement-rate", "regulatory-approval-status", "clinical-validation-stage"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech competitive analysis must include clinical evidence comparison, regulatory status comparison, and reimbursement status — dimensions that do not exist in standard competitive briefs. The most important competitive axis in healthtech is clinical evidence strength, not product features or pricing."
    field_changes:
      - field: "Competitor overview"
        sector_label: "Clinical Competitive Map"
        sector_guidance: "Map competitors on a 2x2 matrix: X-axis = clinical evidence strength (pilot data to published RCTs), Y-axis = regulatory/reimbursement status (pre-clearance to broadly reimbursed). Position your product and each competitor. Include EHR vendor native capabilities as competitors."
      - field: "Competitive advantages"
        sector_label: "Clinical Defensibility Analysis"
        sector_guidance: "Assess defensibility along healthtech-specific dimensions: clinical evidence moat (published outcomes superior to competitors), regulatory moat (clearance timeline advantage), reimbursement moat (payer coverage secured before competitors), workflow integration moat (deep EHR integration), and clinical relationship moat (health system champions and advisory board)."
      - field: "Competitive threats"
        sector_label: "Threat Vectors"
        sector_guidance: "Categorize threats: (1) Peer healthtech — same clinical area, similar product. (2) EHR vendor — native functionality replacing standalone product. (3) Pharmaceutical company — pharma-funded digital companion with massive clinical trial budget. (4) Academic medical center — research institution commercializing internally developed tool. (5) Big tech — Google, Amazon, Apple entering the clinical space."
    sections_to_add:
      - section_name: "Clinical Evidence Comparison"
        placement: "after:Clinical Competitive Map"
        description: "Head-to-head clinical evidence comparison with competitors."
        fields:
          - "Evidence level comparison by competitor (Oxford CEBM level)"
          - "Published outcomes data by competitor"
          - "Regulatory status by competitor"
          - "Payer coverage status by competitor"
      - section_name: "EHR Platform Threat Assessment"
        placement: "after:Threat Vectors"
        description: "Assessment of EHR vendor native functionality as competitive threat."
        fields:
          - "Epic native capabilities that overlap with the product"
          - "Oracle Health (Cerner) native capabilities that overlap"
          - "EHR vendor roadmap announcements relevant to the product"
          - "Defensibility against EHR vendor encroachment"
    sections_to_remove: []
    benchmark_references: ["clinical-evidence-strength", "regulatory-approval-status", "payer-reimbursement-rate", "clinical-workflow-integration-score"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech pitch decks require clinical evidence, regulatory pathway, and reimbursement strategy slides that do not exist in standard pitch templates. Health-focused investors evaluate these dimensions with the same rigor as financial metrics. The deck must demonstrate clinical credibility alongside commercial viability."
    field_changes:
      - field: "Market opportunity"
        sector_label: "Clinical Market Opportunity"
        sector_guidance: "Present the clinical problem first: prevalence, burden of disease, cost to the healthcare system, and inadequacy of current solutions. Then size the market bottom-up: (patient population) x (reimbursement rate per patient) = addressable market. Include the payer perspective: what are payers currently spending on this condition, and how does the product reduce that spend?"
      - field: "Business model"
        sector_label: "Healthtech Business Model"
        sector_guidance: "Cover: revenue model (reimbursement-based, SaaS, hybrid), triple-stakeholder value proposition (patient outcomes, provider experience, cost reduction), reimbursement pathway (CPT codes, payer engagement), and the clinical evidence that supports each value claim."
      - field: "Traction"
        sector_label: "Clinical & Commercial Traction"
        sector_guidance: "Dual-axis traction slide: commercial metrics (Monthly Active Patients, revenue, health system customers) alongside clinical metrics (clinical evidence stage, patient outcomes improvement, regulatory milestones). Both dimensions must show progress."
    sections_to_add:
      - section_name: "Clinical Evidence Slide"
        placement: "after:Clinical & Commercial Traction"
        description: "Dedicated slide summarizing the clinical evidence base — the most scrutinized slide in a healthtech pitch."
        fields:
          - "Clinical study design, patient population, and primary endpoint"
          - "Key outcome results with statistical significance"
          - "Publication status (journal, conference presentations)"
          - "Ongoing and planned studies"
      - section_name: "Regulatory Pathway Slide"
        placement: "after:Clinical Evidence Slide"
        description: "Regulatory strategy and timeline — a gating factor for healthtech investors."
        fields:
          - "Regulatory classification and pathway (510(k), De Novo, PMA, exempt)"
          - "Current regulatory status"
          - "Timeline to clearance/approval"
          - "Regulatory cost budget and spend to date"
      - section_name: "Reimbursement Strategy Slide"
        placement: "after:Regulatory Pathway Slide"
        description: "How the product generates revenue through the healthcare payment system."
        fields:
          - "Applicable billing codes (CPT, HCPCS)"
          - "Current payer coverage (Medicare, top commercial payers)"
          - "Reimbursement rate per patient per month"
          - "Path to broader payer coverage"
      - section_name: "Per-Patient Unit Economics Slide"
        placement: "after:Reimbursement Strategy Slide"
        description: "Per-patient economics including clinical validation cost amortization."
        fields:
          - "Revenue per patient per month (by source)"
          - "Cost per patient per month (technology + clinical support)"
          - "Patient LTV:CAC ratio"
          - "Clinical validation cost amortized per patient"
    sections_to_remove: []
    benchmark_references: ["clinical-validation-stage", "regulatory-approval-status", "payer-reimbursement-rate", "revenue-per-patient-per-month", "patient-outcomes-improvement", "monthly-active-patients"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "A healthtech strategic one-pager must anchor analysis in clinical evidence strength, regulatory position, and reimbursement viability alongside standard commercial metrics."
    field_changes:
      - field: "Strategic position"
        sector_label: "Healthtech Strategic Position"
        sector_guidance: "Frame position across four dimensions: clinical evidence strength relative to competitors, regulatory status and timeline, reimbursement position and payer coverage, and health system adoption and provider satisfaction."
      - field: "Key metrics"
        sector_label: "Healthtech Health Metrics"
        sector_guidance: "Core 5: Monthly Active Patients + growth rate, Patient Outcomes Improvement, Payer Reimbursement Rate, Provider Adoption Rate, Gross Margin. Compare each to stage-appropriate benchmarks."
    sections_to_add:
      - section_name: "Triple-Aim Assessment"
        placement: "end"
        description: "Assessment of the company's position on the healthcare triple aim."
        fields:
          - "Better outcomes: clinical evidence summary and outcome improvement metrics"
          - "Better experience: patient satisfaction and provider NPS"
          - "Lower cost: health economic analysis and cost avoidance data"
          - "Triple-aim alignment: which dimensions are strong, which need improvement"
    sections_to_remove: []
    benchmark_references: ["monthly-active-patients", "patient-outcomes-improvement", "payer-reimbursement-rate", "provider-adoption-rate", "gross-margin"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech market sizing must be grounded in clinical epidemiology and reimbursement economics, not generic TAM calculations."
    field_changes:
      - field: "Total addressable market"
        sector_label: "Clinical TAM / SAM / SOM"
        sector_guidance: "Bottom-up sizing using clinical data: (patient prevalence in target population) x (reimbursement rate per patient per year) = SAM. Cross-reference with payer spending data in the therapeutic area. Do not use top-down healthcare market size estimates."
      - field: "Market dynamics"
        sector_label: "Clinical Market Dynamics"
        sector_guidance: "Address: clinical guideline evolution (is the clinical standard of care shifting toward digital interventions?), reimbursement trends (are payers expanding or contracting digital health coverage?), provider adoption trends (are clinicians increasingly willing to prescribe digital interventions?), and regulatory trends (is FDA facilitating or constraining the market?)."
    sections_to_add:
      - section_name: "Reimbursement Landscape"
        placement: "end"
        description: "Current and projected reimbursement environment for the clinical area."
        fields:
          - "Current reimbursement codes applicable to the product"
          - "Recent CMS coverage decisions in the therapeutic area"
          - "Commercial payer coverage trends"
          - "Projected reimbursement expansion timeline"
    sections_to_remove: []
    benchmark_references: ["payer-reimbursement-rate", "monthly-active-patients"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech due diligence requires clinical evidence verification, regulatory pathway assessment, HIPAA compliance audit, and reimbursement strategy evaluation — dimensions that do not exist in standard technology due diligence."
    field_changes:
      - field: "Financial review"
        sector_label: "Financial & Revenue Model Verification"
        sector_guidance: "Verify: revenue decomposition by source (reimbursement vs. SaaS vs. self-pay), per-patient economics, clinical validation cost accounting, and regulatory cost budget versus actuals. Request access to billing data and payer contracts."
      - field: "Operational review"
        sector_label: "Clinical Operations & Compliance Review"
        sector_guidance: "Review: HIPAA compliance documentation, clinical governance structure, adverse event reporting procedures, clinical study protocols and results, regulatory submission history, and payer coverage decisions."
    sections_to_add:
      - section_name: "Clinical Evidence Due Diligence"
        placement: "after:Financial & Revenue Model Verification"
        description: "Clinical evidence verification — the healthtech equivalent of financial audit."
        fields:
          - "Clinical study protocols, IRB approvals, and results"
          - "Statistical analysis plans and primary endpoint definitions"
          - "Publication history and journal quality"
          - "Clinical advisory board composition and engagement level"
          - "Adverse event history and reporting procedures"
      - section_name: "Regulatory & Compliance Due Diligence"
        placement: "after:Clinical Evidence Due Diligence"
        description: "Regulatory pathway and compliance assessment."
        fields:
          - "FDA regulatory classification and pathway"
          - "Regulatory submission history and FDA feedback"
          - "HIPAA compliance assessment (HITRUST, SOC 2, or equivalent)"
          - "State licensing requirements and compliance"
          - "Data security incident history"
      - section_name: "Reimbursement Due Diligence"
        placement: "after:Regulatory & Compliance Due Diligence"
        description: "Reimbursement pathway viability assessment."
        fields:
          - "Applicable CPT/HCPCS codes and reimbursement rates"
          - "Payer coverage status across Medicare and top commercial payers"
          - "Health economic analysis (cost-effectiveness data)"
          - "Reimbursement risk assessment (pending coverage decisions, code sunset risk)"
    sections_to_remove: []
    benchmark_references: ["clinical-validation-stage", "regulatory-approval-status", "hipaa-compliance-score", "payer-reimbursement-rate"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Cap table structure is not healthtech-specific. Standard venture capital cap table formats apply regardless of sector."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech decision rationale memos must include clinical impact assessment for decisions that affect patient care, regulatory status, or clinical evidence strategy."
    field_changes:
      - field: "Decision context"
        sector_label: "Decision Context (Clinical & Commercial)"
        sector_guidance: "For decisions with clinical implications, document the clinical context alongside the commercial context: what patient population is affected, what clinical outcomes could change, and what regulatory or compliance implications exist."
    sections_to_add:
      - section_name: "Patient Safety Impact Assessment"
        placement: "end"
        description: "Assessment of the decision's potential impact on patient safety — required for any decision affecting clinical product behavior."
        fields:
          - "Patient population affected"
          - "Potential positive clinical impact"
          - "Potential negative clinical impact (worst plausible scenario)"
          - "Mitigation measures"
    sections_to_remove: []
    benchmark_references: []

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech exit scenarios are governed by clinical evidence strength, regulatory clearances, and payer coverage — these are the primary value drivers in healthtech M&A. Acquirer categories include health system spin-outs, pharma companies, medtech companies, and health IT platforms."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "Healthtech Valuation Drivers"
        sector_guidance: "Healthtech valuation is driven by: clinical evidence strength (published outcomes data), regulatory status (clearances held), reimbursement position (payer coverage secured), and commercial traction (revenue, patients, health systems). Revenue multiples for healthtech vary by sub-sector: pure software (8-15x ARR), clinical services-included (3-8x ARR), pre-revenue with clearance (milestone-based)."
      - field: "Potential acquirers"
        sector_label: "Healthtech Acquirer Landscape"
        sector_guidance: "Categorize: (1) Health IT platforms — EHR vendors, population health companies (acquire for product expansion). (2) Pharma/biotech — therapeutic companies (acquire for digital companion or real-world evidence). (3) Medtech — device companies (acquire for digital extension of physical devices). (4) Health systems — integrated delivery networks (acquire for internal capability). (5) Private equity — health services PE firms (acquire for portfolio company integration)."
    sections_to_add:
      - section_name: "Clinical Asset Valuation"
        placement: "after:Healthtech Valuation Drivers"
        description: "Valuation of clinical assets that are unique to healthtech M&A."
        fields:
          - "Clinical evidence portfolio value (cost to replicate)"
          - "Regulatory clearance value (time and cost for acquirer to obtain independently)"
          - "Payer coverage value (contracts and covered lives)"
          - "Clinical relationship value (health system customers, KOL network, advisory board)"
    sections_to_remove: []
    benchmark_references: ["clinical-validation-stage", "regulatory-approval-status", "payer-reimbursement-rate", "monthly-active-patients"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech board reviews must integrate clinical metrics alongside commercial metrics, report regulatory milestone progress, and distinguish clinical advisory board governance from corporate board governance. Board members must see clinical outcomes data alongside financial data — in healthtech, clinical performance leads financial performance."
    field_changes:
      - field: "Financial summary"
        sector_label: "Clinical & Financial Dashboard"
        sector_guidance: "Present dual dashboards: Clinical (patient outcomes improvement, patient engagement rate, provider adoption rate, clinical evidence milestones, adverse event summary) and Financial (revenue, per-patient economics, gross margin, burn rate, runway). Clinical metrics appear first because they are leading indicators of financial performance."
      - field: "Strategic priorities"
        sector_label: "Clinical & Commercial Priorities"
        sector_guidance: "Report against quarterly priorities across both clinical (study milestones, regulatory milestones, reimbursement milestones) and commercial (health system deals, revenue targets, operational metrics) dimensions. Flag any clinical milestone that is off-track with root cause and corrective action."
      - field: "Risks"
        sector_label: "Risk Dashboard"
        sector_guidance: "Categorize: (1) Patient safety risk — adverse events, product reliability, clinical protocol deviations. (2) Regulatory risk — clearance timeline, FDA feedback, compliance gaps. (3) Reimbursement risk — payer coverage decisions, code changes, rate adjustments. (4) Commercial risk — pipeline, churn, competitive threats. (5) Operational risk — security, uptime, HIPAA compliance. Patient safety risk appears first."
    sections_to_add:
      - section_name: "Regulatory & Evidence Milestone Tracker"
        placement: "before:Clinical & Financial Dashboard"
        description: "Quarter-by-quarter tracking of regulatory and clinical evidence milestones."
        fields:
          - "FDA regulatory milestones (status and next step)"
          - "Clinical study milestones (enrollment, data collection, analysis, publication)"
          - "Payer coverage milestones (applications, decisions)"
          - "Milestone timeline vs. plan (ahead/on-track/behind)"
      - section_name: "Clinical Advisory Board Report"
        placement: "after:Risk Dashboard"
        description: "Summary of clinical advisory board activity and recommendations — distinct from corporate board governance."
        fields:
          - "Clinical advisory board meeting summary (recommendations, concerns raised)"
          - "Advisory board composition and any changes"
          - "Clinical governance decisions made and rationale"
          - "Patient safety review summary"
    sections_to_remove: []
    benchmark_references: ["patient-outcomes-improvement", "provider-adoption-rate", "patient-engagement-rate", "regulatory-approval-status", "payer-reimbursement-rate", "gross-margin"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech board meeting agendas must allocate time for clinical governance, regulatory updates, and patient safety review alongside standard business topics."
    field_changes:
      - field: "Agenda items"
        sector_label: "Healthtech Board Agenda"
        sector_guidance: "Standard healthtech board agenda: (1) Patient safety and clinical governance report — 10 min (any adverse events, clinical protocol changes, advisory board recommendations). (2) Regulatory and clinical evidence update — 10 min (milestone progress, FDA interactions, publication pipeline). (3) Financial and commercial metrics review — 15 min (pre-read, discussion only). (4) Strategic topic deep-dive — 30 min (one topic: clinical evidence strategy, reimbursement pathway, health system expansion, competitive response). (5) CEO asks — 10 min. (6) Executive session — 15 min. Total: 90 minutes. Patient safety review is first, non-negotiable."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Healthtech risk assessment must place patient safety risk as the first category, above commercial and operational risk. Regulatory risk, reimbursement risk, and clinical evidence risk are sector-specific categories that do not exist in standard risk frameworks."
    field_changes:
      - field: "Risk categories"
        sector_label: "Healthtech Risk Categories"
        sector_guidance: "Include in this order: (1) Patient safety risk — adverse events, product errors, clinical protocol deviations, the risk that the product causes harm. (2) Regulatory risk — clearance delays, FDA warning letters, compliance gaps, post-market surveillance findings. (3) Reimbursement risk — payer coverage denials, code changes, rate reductions. (4) Clinical evidence risk — study failures, null results, competitor evidence leapfrog. (5) Commercial risk — pipeline, churn, competitive threats, health system concentration. (6) Operational risk — security, HIPAA compliance, system reliability. Patient safety risk is first because it is the most consequential and the most irreversible."
    sections_to_add:
      - section_name: "Patient Safety Incident Log"
        placement: "before:Healthtech Risk Categories"
        description: "Summary of any patient safety-related events since the last board meeting."
        fields:
          - "Adverse events reported (count, severity, resolution status)"
          - "Product reliability incidents affecting clinical operations"
          - "Clinical protocol deviations identified"
          - "Corrective actions taken and their effectiveness"
      - section_name: "Regulatory Risk Heat Map"
        placement: "after:Healthtech Risk Categories"
        description: "Visual assessment of regulatory risks across dimensions."
        fields:
          - "FDA regulatory status and risk level (green/yellow/red)"
          - "HIPAA compliance posture and risk level"
          - "State licensing and compliance risk"
          - "Upcoming regulatory changes that could affect the business"
    sections_to_remove: []
