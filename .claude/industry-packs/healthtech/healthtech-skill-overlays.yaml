# Healthtech Industry Pack — Skill Overlays
#
# For 35 of the 158 Foreman skills, this file provides healthtech-specific context
# that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add a healthtech lens.
#
# PATIENT SAFETY PRINCIPLE: Every overlay addresses how patient safety shapes the
# framework's application. Healthtech is uniquely constrained by the clinical
# obligation to "first, do no harm." Unlike fintech (where the worst outcome is
# financial loss) or SaaS (where the worst outcome is business failure), healthtech
# errors can harm or kill patients. This obligation pervades every strategic
# decision — from pricing to competitive positioning to go-to-market.
#
# TRIPLE STAKEHOLDER PRINCIPLE: Healthtech must satisfy three stakeholders
# simultaneously — patients (who receive care), providers (who deliver care),
# and payers (who fund care). The "triple aim" of better outcomes, better
# experience, and lower cost must be addressed in every framework application.
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct healthtech application (strategy, pricing, trust, growth)
#   - Game theory skills (regulatory strategy, payer negotiation, provider adoption)
#   - Decision and thinking skills (clinical risk-weighted decision-making)
#   - Negotiation skills (health system deals, payer contracts, regulatory engagement)
#   - Leadership skills most affected by clinical culture and safety obligations
#   - AI/data skills (clinical AI, algorithmic fairness, FDA AI/ML guidance)
#
# Relevance tiers:
#   critical — The healthtech overlay materially changes how the skill is applied.
#              The skill executor should always surface healthtech context.
#   high     — Healthtech context adds significant value. Surface when relevant.
#   moderate — Useful healthtech framing but the base skill works well as-is.

