# AI-ML Industry Pack — Skill Overlays
#
# For 35 of the 158 Foreman skills, this file provides AI-ML-specific context
# that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add an AI-ML lens for companies
# whose core product IS an AI/ML system.
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct AI-ML application (strategy, model economics, competitive dynamics)
#   - AI-leadership skills (highly relevant — bridge from leading with AI to building AI products)
#   - Decision and thinking skills (applied to model vs. product vs. data investment decisions)
#   - Negotiation skills (fundraising with AI narrative, compute contracts, data partnerships)
#   - Game theory skills (open-source vs. proprietary, compute supplier dynamics)
#
# The MODEL-CENTRIC lens applies throughout:
#   - Data is the moat
#   - Accuracy is the product
#   - Inference cost is COGS
#   - Compute providers are suppliers (Porter's)
#   - Open-source models are substitutes
#   - The value proposition IS the model
#
# Relevance tiers:
#   critical — The AI-ML overlay materially changes how the skill is applied.
#              The skill executor should always surface AI-ML context.
#   high     — AI-ML context adds significant value. Surface when relevant.
#   moderate — Useful AI-ML framing but the base skill works well as-is.

