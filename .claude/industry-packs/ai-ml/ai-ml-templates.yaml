# AI-ML Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for AI-ML companies — companies whose core product IS
# an AI/ML system. The output agent loads these rules when generating
# documents with the AI-ML industry pack active.
#
# Key adaptation themes:
#   - Unit economics: per-inference economics (compute + data + infrastructure = cost per prediction)
#   - Investor materials: model differentiation, data moat, responsible AI, compute strategy
#   - Technical templates: model performance dashboard, A/B test results, data pipeline health
#   - Customer materials: accuracy reporting, model transparency, responsible AI commitments
#
# Adaptation types:
#   as-is    — The template works without modification for AI-ML companies.
#   modified — The template requires field changes, additional sections, or
#              reframing of existing sections for AI-ML context.

pack_metadata:
  sector: "ai-ml"
  display_name: "AI-ML"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML unit economics differ fundamentally from SaaS. The cost per unit of value delivered includes inference compute, training cost amortization, data pipeline costs, and GPU infrastructure — all of which scale with usage rather than being near-zero marginal cost."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "Revenue per Prediction / API Call"
        sector_guidance: "Report revenue per inference request (or per 1K tokens for LLM products). Decompose by model tier (standard, premium, enterprise) and by use case if pricing varies. Include the volume trend — are customers making more calls per account over time?"
      - field: "Cost per unit"
        sector_label: "Fully Loaded Cost per Prediction"
        sector_guidance: "Include all variable costs: inference compute (GPU cost per request), data processing (feature computation), third-party API costs (if calling external models), allocated infrastructure (serving, monitoring, logging), and allocated support. This is AI COGS — treat it as such."
      - field: "Margin per unit"
        sector_label: "Per-Prediction Gross Margin"
        sector_guidance: "Revenue per prediction minus cost per prediction. AI-ML companies typically achieve 50-70% gross margin per prediction — lower than SaaS (70-85%) due to compute COGS. Show the trajectory: is margin improving with scale and optimization?"
      - field: "Lifetime value"
        sector_label: "Customer LTV (Usage-Adjusted)"
        sector_guidance: "Calculate as Average Monthly Revenue per Customer x Gross Margin x Average Customer Lifetime (months). For usage-based AI products, account for usage growth within accounts — expanding customers have higher LTV than the initial run-rate suggests."
      - field: "Acquisition cost"
        sector_label: "CAC and Integration Cost"
        sector_guidance: "Include both traditional CAC (sales and marketing cost per acquired customer) and the integration cost (technical onboarding, API integration support, initial fine-tuning). AI products often have higher onboarding costs than SaaS due to model customization requirements."
      - field: "Unit economics ratio"
        sector_label: "LTV:CAC Ratio (Usage-Adjusted)"
        sector_guidance: "Report the ratio with explicit disclosure of the LTV calculation methodology. For AI products with growing per-customer usage, the standard LTV formula may understate actual lifetime value. Show both static and expanding-usage LTV:CAC."
    sections_to_add:
      - section_name: "AI-ML Cost Structure"
        placement: "before:Revenue per Prediction / API Call"
        description: "Decomposition of the AI-specific cost structure that investors evaluate."
        fields:
          - "Inference compute cost (percentage of COGS)"
          - "Training cost (amortized per period — R&D or COGS classification)"
          - "Data acquisition and labeling cost (per period)"
          - "GPU infrastructure cost (reserved, on-demand, spot breakdown)"
          - "Third-party API costs (if using external foundation models)"
          - "Gross margin trajectory (12-month chart)"
      - section_name: "Per-Prediction Economics"
        placement: "after:Per-Prediction Gross Margin"
        description: "The granular economics of each model invocation."
        fields:
          - "Revenue per prediction by model tier"
          - "Cost per prediction by model tier"
          - "Margin per prediction by model tier"
          - "Volume by model tier (monthly)"
          - "Cost optimization trajectory (cost per prediction over time)"
      - section_name: "Data Flywheel Economics"
        placement: "end"
        description: "The economics of the data moat — how product usage reduces data cost and improves model quality over time."
        fields:
          - "Data acquisition cost trend (declining? through product usage?)"
          - "Model quality improvement from product-generated data (measured)"
          - "Estimated replication cost for a competitor to build an equivalent dataset"
    sections_to_remove: []
    benchmark_references: ["inference-cost-per-request", "cost-per-prediction", "revenue-per-api-call", "gross-margin-compute-adjusted", "data-acquisition-cost"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML investor updates must report both business metrics and model metrics. Investors want to see model quality alongside revenue, inference cost alongside growth, and data moat progression alongside customer acquisition."
    field_changes:
      - field: "Financial highlights"
        sector_label: "AI Business Metrics"
        sector_guidance: "Report: Monthly Revenue, Revenue Growth (MoM), API Call Volume (and growth), Gross Margin (compute-adjusted), Burn Rate, Runway. Present as a compact table with current month, prior month, and trend direction."
      - field: "Key metrics"
        sector_label: "Model and Product Metrics"
        sector_guidance: "Report: Model accuracy (F1 or domain-appropriate metric), Hallucination rate (if generative), Inference latency (p50/p95), Customer accuracy satisfaction, Active API users. Choose the 3-5 metrics most relevant to current priorities."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include at least one model improvement win and one business win. Model: 'Reduced hallucination rate from 5% to 3% through RAG implementation.' Business: 'Closed [Customer] at $X ACV for [use case].'"
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Be transparent about AI-specific challenges: model quality limitations, inference cost pressure, competitive model releases, or regulatory developments. Investors expect AI-specific risks to be called out honestly."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "AI-specific asks: introductions to potential data partners, enterprise customers in target verticals, ML infrastructure advisors, or responsible AI experts. Be concrete — specify the domain and the reason."
    sections_to_add:
      - section_name: "Model Progress"
        placement: "after:Model and Product Metrics"
        description: "Brief model improvement summary that demonstrates the data flywheel and research velocity."
        fields:
          - "Key model improvement this month (metric and method)"
          - "Data flywheel status (new data volume from product usage)"
          - "Competitive position (how the model compares to alternatives)"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "hallucination-rate", "inference-cost-per-request", "gross-margin-compute-adjusted"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML competitive landscape includes five distinct threat vectors that do not exist in traditional software: direct competitors, foundation model providers, open-source models, cloud providers, and in-house ML teams. The brief must address all five."
    field_changes:
      - field: "Competitor overview"
        sector_label: "AI Competitive Map"
        sector_guidance: "Map all five competitor types on a 2x2 matrix: X-axis = general-purpose to domain-specific, Y-axis = open-source to proprietary. Position your product, direct competitors, foundation model providers (OpenAI, Anthropic, Google), relevant open-source models (Llama, Mistral, Stable Diffusion), and cloud AI services. Include model accuracy comparison where available."
      - field: "Competitive advantages"
        sector_label: "AI Defensibility Analysis"
        sector_guidance: "Assess defensibility along AI-specific dimensions: data moat (proprietary training data), model quality (accuracy gap over alternatives), distribution moat (API ecosystem, integration depth), regulatory moat (compliance certifications), and trust moat (responsible AI posture, brand credibility)."
      - field: "Competitive threats"
        sector_label: "Five Threat Vectors"
        sector_guidance: "Categorize: (1) Direct AI competitors — same domain, same approach. (2) Foundation model providers — OpenAI/Anthropic/Google adding your capability natively. (3) Open-source models — free alternatives reaching comparable quality. (4) Cloud providers — AWS/GCP/Azure offering competing managed AI services. (5) In-house build — customers building with open-source rather than buying."
    sections_to_add:
      - section_name: "Model Quality Comparison"
        placement: "after:Five Threat Vectors"
        description: "Objective accuracy comparison against alternatives."
        fields:
          - "Accuracy comparison table (your model vs. competitors vs. open-source vs. foundation models on relevant benchmarks)"
          - "Domain-specific evaluation results (on customer-representative data, not just public benchmarks)"
          - "Accuracy trend (is the gap widening or narrowing?)"
      - section_name: "Open-Source Threat Assessment"
        placement: "after:Model Quality Comparison"
        description: "Specific assessment of open-source model alternatives and the defensibility against free substitutes."
        fields:
          - "Best open-source model accuracy on your core task"
          - "Accuracy gap between your model and best open-source alternative"
          - "Gap trajectory (closing, stable, or widening)"
          - "Value-add beyond model quality (enterprise features, support, compliance, SLA) that justifies pricing premium over open-source"
      - section_name: "Foundation Model Risk"
        placement: "end"
        description: "Assessment of the risk that OpenAI, Anthropic, Google, or Meta ships your core capability as a feature."
        fields:
          - "Overlap between your core capability and foundation model roadmaps"
          - "Domain depth required (does your use case need specialization beyond general models?)"
          - "Integration and workflow depth (are you embedded in customer workflows beyond what an API switch could replace?)"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "data-moat-index", "inference-cost-per-request"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML fundraising decks must address AI-specific investor questions: What is the moat? How durable is the data advantage? Can you achieve SaaS-like margins? What is the responsible AI posture? How do you compete with open-source? The deck must balance technical credibility with business storytelling."
    field_changes:
      - field: "Market opportunity"
        sector_label: "AI Market Opportunity"
        sector_guidance: "Present the market through an AI lens: current spend on the problem being solved (manual processes, legacy software), the AI-addressable portion, and the adoption curve. Include the specific accuracy threshold that makes AI viable for this market and evidence that your model crosses it."
      - field: "Business model"
        sector_label: "AI Business Model"
        sector_guidance: "Cover: pricing model (per-API-call, per-token, per-outcome, seat-based, hybrid), cost structure (inference COGS, training amortization, data pipeline), the margin improvement trajectory, and the data flywheel mechanism. Show how per-customer revenue grows with usage."
      - field: "Traction"
        sector_label: "AI Traction Metrics"
        sector_guidance: "Dedicated slide with: Revenue trajectory, API call volume growth, customer count, model accuracy improvement over time, customer-reported accuracy satisfaction, and retention rate. The model quality improvement chart is uniquely important — it demonstrates the data flywheel in action."
    sections_to_add:
      - section_name: "Model Differentiation Slide"
        placement: "after:AI Market Opportunity"
        description: "The 'why us' slide — why this AI product wins against all five competitive alternatives."
        fields:
          - "Model accuracy comparison (vs. competitors, vs. open-source, vs. foundation models)"
          - "Data moat description (proprietary data, generation mechanism, replication cost)"
          - "Technical approach (architecture choice, training methodology, unique innovation)"
      - section_name: "Data Moat Slide"
        placement: "after:Model Differentiation Slide"
        description: "The most scrutinized slide in an AI fundraising deck — how the data advantage is built and defended."
        fields:
          - "Data flywheel diagram (product usage > data > model improvement > more users)"
          - "Current dataset size and growth rate"
          - "Estimated competitor replication cost and timeline"
          - "Data partnership and proprietary source overview"
      - section_name: "Responsible AI Slide"
        placement: "after:AI Traction Metrics"
        description: "Increasingly required by institutional investors and essential for enterprise AI companies."
        fields:
          - "Responsible AI framework and governance"
          - "Bias testing results and fairness metrics"
          - "Regulatory compliance posture (EU AI Act, sector-specific regulations)"
          - "Explainability and transparency mechanisms"
      - section_name: "Compute Strategy Slide"
        placement: "after:AI Business Model"
        description: "How the company manages the compute supply chain and optimizes inference economics."
        fields:
          - "Current compute infrastructure (provider, GPU types, allocation)"
          - "Inference cost optimization roadmap"
          - "Multi-provider strategy (or single-provider risk acknowledgment)"
          - "Gross margin improvement trajectory from compute optimization"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "data-moat-index", "gross-margin-compute-adjusted", "inference-cost-per-request", "responsible-ai-score"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "An AI-ML strategic one-pager must anchor analysis in model-centric strategy: data moat strength, model quality trajectory, competitive position against all five threat vectors, and the unit economics of AI delivery."
    field_changes:
      - field: "Strategic position"
        sector_label: "AI Strategic Position"
        sector_guidance: "Frame position in AI terms: model quality vs. alternatives (proprietary and open-source), data moat depth and durability, compute efficiency relative to competitors, and responsible AI posture relative to regulatory trajectory."
      - field: "Key metrics"
        sector_label: "AI Health Metrics"
        sector_guidance: "Core 5: Revenue + growth rate, Model accuracy (F1 or domain-equivalent), Gross margin (compute-adjusted), Customer retention (AI-specific), Data moat index. Compare each to AI-ML benchmarks."
    sections_to_add:
      - section_name: "Model Moat Assessment"
        placement: "end"
        description: "Assessment of the durability of the company's AI competitive advantage."
        fields:
          - "Data moat: proprietary data volume, generation rate, replication cost"
          - "Model moat: accuracy gap over alternatives, improvement trajectory"
          - "Distribution moat: API integrations, workflow embedding depth"
          - "Trust moat: responsible AI posture, enterprise compliance certifications"
          - "Moat vulnerability: open-source convergence rate, foundation model encroachment risk"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "data-moat-index", "gross-margin-compute-adjusted", "customer-retention-ai"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI market sizing must account for the AI-specific dynamics: the adoption curve (enterprise AI adoption is still early), the accuracy threshold (the market exists only above a certain accuracy level), and the disruption of legacy approaches (AI replacing manual processes or legacy software)."
    field_changes:
      - field: "Total addressable market"
        sector_label: "AI-Addressable Market"
        sector_guidance: "Use AI-specific sizing: (number of target organizations) x (number of relevant decisions/tasks per year) x (price per AI-assisted decision). Cross-reference with current spend on manual processes or legacy software being replaced. Include the accuracy-gated market — what portion is only addressable above a certain accuracy threshold."
      - field: "Market dynamics"
        sector_label: "AI Adoption Dynamics"
        sector_guidance: "Address: enterprise AI adoption maturity (early, growth, mainstream), regulatory trajectory (enabling or constraining), open-source adoption impact on pricing, and the accuracy improvement curve that unlocks new market segments."
    sections_to_add:
      - section_name: "Accuracy-Gated Market Expansion"
        placement: "end"
        description: "How model accuracy improvements unlock additional market segments."
        fields:
          - "Current accuracy level and the market it addresses"
          - "Accuracy milestones and the additional market each unlocks"
          - "Projected timeline to reach each accuracy milestone"
          - "Total market at current accuracy vs. target accuracy"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "data-moat-index"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML due diligence includes AI-specific areas: model evaluation (independent accuracy testing), data audit (training data provenance, bias, and legal compliance), responsible AI assessment, compute cost verification, and IP review (model ownership, training data rights)."
    field_changes:
      - field: "Financial review"
        sector_label: "AI Financial Verification"
        sector_guidance: "Verify: revenue calculation (especially usage-based), COGS classification (inference compute, training amortization — is this COGS or R&D?), gross margin methodology, customer concentration, and revenue quality (recurring vs. one-time integration fees)."
      - field: "Operational review"
        sector_label: "AI Operations and Model Review"
        sector_guidance: "Review: model accuracy on independent evaluation sets (not just the company's benchmarks), hallucination rate testing, data pipeline reliability, model drift monitoring, and MLOps maturity. Request access to evaluation results and model cards."
    sections_to_add:
      - section_name: "Model and Data Audit"
        placement: "after:AI Operations and Model Review"
        description: "AI-specific technical due diligence that does not exist in traditional software."
        fields:
          - "Independent model evaluation on held-out data (accuracy, latency, reliability)"
          - "Training data provenance and legal compliance review"
          - "Bias and fairness audit results"
          - "Model drift monitoring and retraining pipeline review"
          - "Hallucination rate assessment (for generative models)"
      - section_name: "Responsible AI Assessment"
        placement: "after:Model and Data Audit"
        description: "Increasingly standard in AI investment due diligence."
        fields:
          - "Responsible AI framework and governance structure"
          - "Regulatory compliance status (EU AI Act, sector-specific regulations)"
          - "Third-party audit results (if any)"
          - "Incident response plan for model failures"
      - section_name: "Compute and Infrastructure Review"
        placement: "end"
        description: "AI-specific infrastructure assessment."
        fields:
          - "GPU infrastructure (type, quantity, provider, cost)"
          - "Multi-provider strategy and migration capability"
          - "Inference optimization roadmap"
          - "Training cost trajectory and scalability"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "hallucination-rate", "responsible-ai-score", "gross-margin-compute-adjusted", "inference-cost-per-request"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Cap table structure is not AI-ML-specific. Standard venture capital cap table formats apply regardless of sector."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML decision rationale memos should explicitly address the model-centric dimensions of the decision: impact on model quality, data moat, compute cost, and responsible AI posture."
    field_changes:
      - field: "Decision context"
        sector_label: "AI Decision Context"
        sector_guidance: "Include the AI-specific context: how does this decision affect model quality, data strategy, compute cost, competitive position against alternatives (including open-source), and responsible AI posture? AI decisions often involve trade-offs between accuracy, cost, and speed that should be explicit."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML exit scenarios are shaped by AI-specific acquirer categories and valuation methodologies. Strategic acquirers include big tech companies seeking AI talent and capabilities (acqui-hires are common), vertical industry players acquiring AI to embed in their products, and AI platform companies consolidating capabilities."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "AI Valuation Multiples"
        sector_guidance: "AI companies are valued on a combination of revenue multiples (similar to SaaS), research asset value (team, IP, data), and strategic premium (data moat, model capabilities). Report: revenue multiple, research team valuation (common in acqui-hires), and data asset valuation. Note that AI valuations are more volatile than SaaS due to hype cycle effects."
      - field: "Potential acquirers"
        sector_label: "AI Acquirer Landscape"
        sector_guidance: "Categorize: (1) Big tech AI acquirers (Google, Microsoft, Meta, Apple, Amazon — acquiring for talent, models, and data). (2) Vertical industry acquirers (healthcare, legal, financial companies acquiring AI capabilities for their domain). (3) AI platform consolidators (AI companies acquiring complementary capabilities). (4) PE acquirers (private equity acquiring profitable AI businesses)."
    sections_to_add:
      - section_name: "AI Asset Valuation"
        placement: "after:AI Valuation Multiples"
        description: "Valuation of AI-specific assets beyond revenue."
        fields:
          - "Data asset valuation (estimated replication cost of proprietary dataset)"
          - "Research team valuation (team size, publications, skill rarity)"
          - "Model IP valuation (patents, trade secrets, unique architecture)"
          - "Customer data flywheel valuation (value of the ongoing data generation from product usage)"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "data-moat-index", "gross-margin-compute-adjusted"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML board reviews must cover both business performance and model performance. Board members need to understand model quality trajectory, competitive position against open-source, compute cost management, and responsible AI governance alongside traditional financial metrics."
    field_changes:
      - field: "Financial summary"
        sector_label: "AI Financial Dashboard"
        sector_guidance: "Present: Revenue trend (12 months), Gross margin trend (compute-adjusted), Inference cost trend (per-request), Burn rate, Runway. Compare gross margin to the AI industry benchmark (55-65%) and show the improvement trajectory."
      - field: "Strategic priorities"
        sector_label: "AI Strategic Priorities and Model Progress"
        sector_guidance: "Report against quarterly OKRs that span both model and business: accuracy improvement, cost reduction, customer acquisition, and responsible AI milestones. Flag any model quality degradation with root cause."
      - field: "Risks"
        sector_label: "AI Risk Dashboard"
        sector_guidance: "Categorize: Model risks (accuracy plateau, drift, hallucination liability), Competitive risks (open-source convergence, foundation model encroachment), Compute risks (GPU availability, cost volatility), Regulatory risks (EU AI Act compliance, sector regulation), and Financial risks (margin pressure, runway)."
    sections_to_add:
      - section_name: "Model Performance Dashboard"
        placement: "before:AI Financial Dashboard"
        description: "One-page model metrics summary for board review."
        fields:
          - "Model accuracy (F1 or domain metric) — current and trend"
          - "Hallucination rate (if generative) — current and trend"
          - "Inference latency (p50/p95) — current and trend"
          - "A/B test win rate (model improvement velocity)"
          - "Customer-reported accuracy satisfaction"
          - "Data pipeline reliability"
      - section_name: "Competitive Position Update"
        placement: "after:AI Financial Dashboard"
        description: "Where the model stands relative to alternatives."
        fields:
          - "Accuracy gap vs. best open-source alternative (trend)"
          - "Accuracy gap vs. foundation models on core task (trend)"
          - "Win rate in competitive evaluations (trend)"
      - section_name: "Responsible AI Update"
        placement: "after:AI Risk Dashboard"
        description: "Responsible AI governance update for the board."
        fields:
          - "Bias/fairness metrics (current and trend)"
          - "Regulatory compliance status"
          - "Incident report (any model failures with customer impact)"
          - "Responsible AI roadmap progress"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "hallucination-rate", "inference-cost-per-request", "gross-margin-compute-adjusted", "responsible-ai-score", "data-moat-index"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML board agendas should allocate time to model performance, competitive dynamics (especially open-source), compute strategy, and responsible AI governance — topics that do not appear in traditional board meetings."
    field_changes:
      - field: "Agenda items"
        sector_label: "AI Board Agenda"
        sector_guidance: "Standard AI board agenda: (1) Model and business metrics review — 15 min (pre-read, discussion only). (2) Strategic topic deep-dive — 30 min (rotate: model quality trajectory, competitive position, compute strategy, responsible AI, pricing/monetization). (3) Compute and infrastructure — 10 min (cost, availability, multi-provider strategy). (4) Fundraising/runway — 10 min. (5) CEO asks — 10 min. (6) Executive session — 15 min. Total: 90 minutes."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML risk categories include AI-specific risks that do not exist in traditional software: model accuracy risk, hallucination liability, regulatory risk (AI-specific regulation), compute dependency, data risk (training data legal compliance), and responsible AI risk (bias, fairness)."
    field_changes:
      - field: "Risk categories"
        sector_label: "AI Risk Categories"
        sector_guidance: "Include AI-specific categories: (1) Model risk — accuracy degradation, hallucination liability, adversarial attacks, model theft. (2) Data risk — training data legal compliance, data partnership stability, data moat erosion. (3) Compute risk — GPU availability, single-provider dependency, cost volatility. (4) Regulatory risk — EU AI Act compliance, sector-specific AI regulation, responsible AI requirements. (5) Competitive risk — open-source convergence, foundation model encroachment. (6) Ethical risk — bias, fairness failures, unintended model uses."
    sections_to_add:
      - section_name: "AI-Specific Risk Matrix"
        placement: "end"
        description: "Probability-impact matrix for AI-specific risks."
        fields:
          - "Model accuracy degradation (probability, impact, mitigation)"
          - "Hallucination liability event (probability, impact, mitigation)"
          - "Open-source model reaching parity (probability, impact, mitigation)"
          - "Foundation model provider shipping competing feature (probability, impact, mitigation)"
          - "Regulatory compliance failure (probability, impact, mitigation)"
          - "GPU supply disruption (probability, impact, mitigation)"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "hallucination-rate", "responsible-ai-score", "data-moat-index"]

  - template: "change-initiative-proposal"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML change initiatives often involve model architecture transitions, compute infrastructure migrations, or responsible AI framework implementations — changes with unique risk profiles and timelines."
    field_changes:
      - field: "Proposed change"
        sector_label: "AI Change Initiative"
        sector_guidance: "For AI-specific changes (model architecture transition, compute migration, responsible AI implementation), include: the model quality impact (expected accuracy change), the cost impact (compute cost change), the timeline to production deployment, and the rollback plan if the change degrades performance."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "compensation-review-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML compensation includes significant premiums for ML talent. ML researchers, ML engineers, and data scientists command 20-40% premiums over equivalent software engineering roles. The board should understand the competitive dynamics of AI talent compensation."
    field_changes:
