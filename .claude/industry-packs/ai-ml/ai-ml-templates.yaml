          - "Model limitations: known failure modes, edge cases, domains where accuracy is lower"
          - "Recommended use cases: where to deploy the model for maximum value"
          - "Not recommended: use cases where the model should not be the sole decision-maker"
      - section_name: "Accuracy Expectations and Improvement Path"
        placement: "end"
        description: "Setting realistic accuracy expectations and explaining the improvement trajectory."
        fields:
