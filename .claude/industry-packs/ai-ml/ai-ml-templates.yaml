        sector_label: "Time-to-First-Prediction Path"
        sector_guidance: "Define the shortest path to the first successful model prediction. Organize steps as: (1) API key setup and first prediction (first 30 minutes). (2) Integration with the customer's data pipeline (first day). (3) Evaluation on customer-specific data (first week). (4) Production deployment with monitoring (first month). Include accuracy expectations at each stage and the improvement trajectory with more data."
      - field: "Resources"
        sector_label: "Technical Resources"
        sector_guidance: "Include: API documentation, SDK libraries, code examples, evaluation methodology guide, model cards (capabilities and limitations), and data format specifications. For AI products, documentation quality directly correlates with developer adoption speed."
