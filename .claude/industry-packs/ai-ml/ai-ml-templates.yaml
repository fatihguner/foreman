  - template: "service-level-agreement"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML SLAs must address model-specific performance commitments: accuracy guarantees (or ranges), hallucination rate caps, latency commitments, and uptime — all of which are AI-specific contractual obligations."
    field_changes:
      - field: "Service levels"
        sector_label: "AI Service Levels"
        sector_guidance: "Define AI-specific SLAs: (1) Availability (API uptime — standard 99.5-99.9%). (2) Latency (p50, p95, p99 response time commitments). (3) Accuracy (measured on a mutually agreed evaluation set, reported quarterly — not guaranteed at a specific number, but measured and reported transparently). (4) Hallucination rate (for generative products — measured and reported with reduction commitments). (5) Model update frequency (commitment to model improvement cadence). Include clear measurement methodology and remediation process for SLA violations."
    sections_to_add:
      - section_name: "AI-Specific SLA Definitions"
        placement: "end"
        description: "Definitions for AI-specific service level metrics."
        fields:
          - "Accuracy measurement methodology (evaluation set, measurement frequency, reporting format)"
          - "Hallucination measurement methodology (if applicable)"
          - "Model update and improvement commitments"
          - "Data handling SLA (how customer data is processed, stored, and deleted)"
          - "Incident classification for model failures (severity levels and response times)"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "hallucination-rate", "inference-latency"]

  - template: "analysis-report"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "AI-ML analysis reports delivered to clients should include model methodology transparency, accuracy metrics, confidence levels, and limitations — enabling the client to evaluate the reliability of AI-generated analysis."
    field_changes:
      - field: "Analysis methodology"
        sector_label: "AI Analysis Methodology"
        sector_guidance: "Disclose the model used, the data processed, the confidence calibration, and the limitations of the analysis. For AI-generated analysis, methodology transparency is a trust requirement. Include: model version, evaluation accuracy on similar tasks, and known failure modes relevant to this analysis."
      - field: "Key findings"
        sector_label: "AI-Derived Findings with Confidence Scores"
        sector_guidance: "Present findings with calibrated confidence scores. Distinguish between high-confidence findings (model is highly reliable for this type of analysis) and exploratory findings (model accuracy is moderate, human review recommended). This transparency builds trust and prevents over-reliance on AI output."
    sections_to_add:
      - section_name: "Model Confidence and Limitations"
        placement: "end"
        description: "Transparent communication about the AI analysis reliability."
        fields:
          - "Overall model confidence for this analysis type"
          - "Known limitations relevant to this specific analysis"
          - "Recommendations for human review (which findings warrant additional verification)"
    sections_to_remove: []
    benchmark_references: ["model-accuracy-f1", "customer-accuracy-satisfaction"]
