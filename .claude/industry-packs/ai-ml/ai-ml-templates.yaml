      - field: "Partnership terms"
        sector_label: "AI Partnership Terms"
        sector_guidance: "Address AI-specific terms: data sharing scope and protections, model integration architecture (API, embedded, on-premise), IP ownership (who owns fine-tuned models?), accuracy commitments (SLAs for model quality), responsible AI obligations (bias testing, explainability, incident notification), and competitive restrictions (does the partner data train models that serve their competitors?)."
