# Fintech Industry Pack — Skill Overlays
#
# For 35 of the 158 Foreman skills, this file provides fintech-specific context
# that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add a fintech lens.
#
# REGULATORY PRINCIPLE: Every overlay addresses how regulation changes the
# framework's application. Fintech is uniquely constrained by regulation —
# compliance is not optional, trust is existential, and the cost of failure
# includes legal liability, license revocation, and criminal penalties.
# PSD2, SOX, GDPR, PCI-DSS, BSA/AML, UDAP/UDAAP, state licensing, and
# sector-specific regulations (TILA, ECOA, FCRA, GLBA) shape every strategic
# decision.
#
# Selection criteria for the 35 skills:
#   - Frameworks with direct fintech application (strategy, pricing, risk, trust)
#   - Game theory skills (regulatory game, competitive dynamics, cooperation)
#   - Decision and thinking skills (risk-weighted decision-making in regulated environments)
#   - Negotiation skills (banking partnerships, regulatory relationships, enterprise deals)
#   - Leadership skills most affected by compliance culture and trust dynamics
#   - AI/data skills (algorithmic fairness, model risk, explainability requirements)
#
# Relevance tiers:
#   critical — The fintech overlay materially changes how the skill is applied.
#              The skill executor should always surface fintech context.
#   high     — Fintech context adds significant value. Surface when relevant.
#   moderate — Useful fintech framing but the base skill works well as-is.

