skill_overlays:

  # ─────────────────────────────────────────────
  # FRAMEWORKS (18 skills)
  # ─────────────────────────────────────────────

  - skill: "porters-five-forces"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Regulation rewrites Porter's Five Forces in fintech. Barriers to entry are overwhelmingly regulatory — licensing requirements (state money transmitter licenses, bank charters, SEC/FINRA registration), capital requirements (Basel III, state net worth minimums), and compliance infrastructure create moats that cost $1M-$50M+ to cross. Threat of new entrants must include both startups AND big tech (Apple Pay, Google Wallet, Amazon Lending) who can amortize compliance costs across massive user bases. Buyer power is amplified by regulatory mandates — PSD2 Open Banking in Europe and Section 1033 in the US force data portability, structurally increasing buyer switching power. Supplier power concentrates in banking-as-a-service providers (Synapse, Column, Cross River) and card network duopoly (Visa/Mastercard)."
    fintech_anti_patterns:
      - "Assuming regulatory barriers protect you permanently. Regulatory frameworks evolve — PSD2 demolished barriers in European payments; Section 1033 will do the same in the US. Incumbents who rely on licensing moats without building product moats face disruption when regulations change."
      - "Ignoring the big tech threat vector. Apple, Google, and Amazon can enter any fintech vertical with enormous distribution advantages, pre-existing customer trust, and the ability to operate regulated services as loss leaders within their ecosystem."
      - "Treating the card networks (Visa, Mastercard) as neutral infrastructure. They are powerful suppliers who set interchange rates, impose compliance requirements, and can revoke processing privileges. Their expansion into fintech infrastructure (Visa Direct, Mastercard Send) makes them potential competitors."
    fintech_example: "A payments fintech applies Porter's Five Forces and discovers that its apparent competitive moat — money transmitter licenses in 48 states — is actually shared with 15 competitors. The real competitive force is supplier power: their single banking partner (BaaS provider) processes all transactions, and a regulatory enforcement action against that partner would halt their business overnight. This analysis shifts strategy from product differentiation to banking partner diversification and eventually a direct bank charter application."
    benchmark_references: ["take-rate", "regulatory-compliance-cost", "tpv"]

  - skill: "blue-ocean-strategy"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Blue ocean creation in fintech is uniquely constrained — you cannot create an uncontested market space by ignoring regulations. The most successful fintech blue oceans are created by serving populations that incumbent banks find unprofitable to serve (Nubank in Brazil, M-Pesa in Kenya), by making compliance itself a product (Alloy, Chainalysis), or by embedding financial services where they were previously absent (Shopify Capital, Toast payments). The strategy canvas must include a regulatory axis — the compliance burden of existing solutions versus the compliance innovation of the new offering."
    fintech_anti_patterns:
      - "Pursuing a blue ocean that exists because it is illegal. Many apparent market gaps in financial services exist because regulatory constraints prohibit the activity. 'Move fast and break things' in fintech means fines, enforcement actions, and prison."
      - "Ignoring that regulatory arbitrage creates temporary blue oceans. Operating without a required license is not a strategy — it is a ticking clock. The regulatory gap will close, and enforcement will follow."
      - "Assuming financial inclusion is automatically a blue ocean. Serving underbanked populations requires understanding why banks exited those markets — credit risk, fraud risk, and compliance costs are real, not arbitrary barriers."
    fintech_example: "Nubank created a blue ocean in Brazilian financial services by eliminating what incumbents considered essential — branches, relationship managers, paper statements, and complex fee schedules. The strategy canvas revealed that Brazilian banks over-served high-net-worth customers with premium services while punishing mass-market customers with opaque fees. Nubank's blue ocean was 'transparent, digital-only, zero-fee banking for the mass market' — a space incumbents could not enter without cannibalizing their fee-dependent business models. Critically, Nubank obtained a full banking license, ensuring the blue ocean was regulatory-compliant."
    benchmark_references: ["cac", "monthly-active-users", "cost-to-income-ratio"]

  - skill: "business-model-canvas"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "The Business Model Canvas for fintech requires a regulatory layer across nearly every block. Key Partners must include banking partners, card networks, identity verification providers, and regulators themselves — the regulatory relationship is a partnership that enables the business. Key Activities must include compliance operations (KYC, AML, transaction monitoring, regulatory reporting) as a core activity, not an overhead function. Revenue Streams must distinguish between regulated revenue (interchange, interest income, advisory fees subject to regulatory caps) and unregulated revenue (SaaS fees, data products). Cost Structure must separate compliance costs because they are non-discretionary — you cannot cut compliance spending to extend runway."
    fintech_anti_patterns:
      - "Omitting the regulatory infrastructure from Key Resources. Licenses, compliance systems, banking relationships, and regulatory goodwill are among the most valuable and hardest-to-replicate resources in fintech."
      - "Treating compliance as a Cost Structure line item rather than a Key Activity. In fintech, compliance is not overhead — it is the activity that enables every other activity on the canvas."
      - "Designing the Customer Relationship block without considering regulatory constraints on customer communication. Financial services advertising, account disclosures, and marketing are regulated by UDAP/UDAAP, TILA, Reg Z, and state-specific rules."
    fintech_example: "A BNPL fintech maps its Business Model Canvas and discovers that its Key Partners block reveals existential concentration risk: one BaaS provider, one card network processor, and one identity verification vendor. A failure at any partner halts the business. The Key Activities analysis reveals that 40% of engineering time is spent on compliance-related features (regulatory reporting, transaction monitoring alerts, customer disclosure requirements) — far more than anticipated. This canvas analysis triggers a strategic shift: diversify banking partners, build redundant identity verification, and restructure engineering to treat compliance features as first-class product features rather than afterthoughts."
    benchmark_references: ["regulatory-compliance-cost", "gross-margin", "cac", "kyc-cost-per-customer"]

  - skill: "four-ps-marketing"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "The Four Ps require regulatory awareness at every level in fintech. Product is subject to regulatory approval — new financial products may require regulatory filing, disclosure documents, or license amendments. Price in fintech faces regulatory caps: interchange caps under Durbin Amendment and PSD2 IFR, interest rate caps under state usury laws, fee restrictions under UDAP/UDAAP. Place (distribution) is constrained by licensing — you can only distribute financial products in jurisdictions where you hold appropriate licenses. Promotion is heavily regulated by UDAP/UDAAP, TILA advertising requirements, SEC advertising rules for investment products, and state-specific marketing restrictions. A marketing claim that would be merely aggressive in SaaS could be a regulatory violation in fintech."
    fintech_anti_patterns:
      - "Setting prices without understanding regulatory caps. Durbin Amendment caps debit interchange for large issuers. State usury laws cap interest rates. UDAP/UDAAP prohibits unfair fees. Price is not a free variable in fintech."
      - "Running 'growth hack' marketing without regulatory review. APR disclosures, fee transparency, and truthful advertising are legal requirements, not suggestions. Misleading financial advertising triggers CFPB enforcement."
      - "Distributing financial products across state lines without appropriate licensing. Each state has its own licensing requirements for lending, money transmission, and insurance. Unlicensed activity is a criminal offense in many jurisdictions."
    fintech_example: "A neobank applies the Four Ps and discovers that its planned 'no-fee overdraft' marketing campaign violates UDAP/UDAAP because the overdraft product has conditions that effectively charge customers through a different mechanism. The Promotion analysis reveals that 30% of planned marketing messages require regulatory rewording. The Place analysis identifies 12 states where the company lacks lending licenses, constraining geographic expansion. The Four Ps exercise transforms from a marketing planning tool into a regulatory compliance mapping exercise — the correct application for financial services."
    benchmark_references: ["cac", "arpu", "kyc-conversion-rate"]

  - skill: "net-promoter-score"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "NPS in fintech carries existential weight because financial services are trust-dependent. A security breach, a wrongful account freeze, or a compliance-driven account closure can transform a promoter into a vocal detractor who warns others away from the platform — and in fintech, those warnings spread faster and hit harder than in other industries because money is involved. NPS surveys in fintech must be triggered by financial milestones (first direct deposit, first loan approval, first claim resolution), not arbitrary time intervals. The qualitative feedback is especially valuable for identifying compliance friction points — KYC frustrations, false-positive fraud blocks, and unexplained transaction declines that damage trust."
    fintech_anti_patterns:
      - "Surveying NPS after account opening but not after the first regulatory friction event (KYC delay, fraud block, transaction decline). The true NPS is measured after the customer has experienced the compliance-driven friction that defines fintech UX."
      - "Ignoring the detractor signal from account closures. In fintech, forced account closures (due to compliance triggers, risk reviews, or fraud suspicion) generate extreme detractors who can cause reputational damage disproportionate to their numbers."
      - "Optimizing NPS by reducing compliance friction in ways that create regulatory risk. The goal is to minimize unnecessary friction while maintaining full compliance — not to eliminate compliance steps that customers find annoying."
    fintech_example: "A neobank segments NPS by customer journey stage and discovers that NPS is 72 after account opening but drops to 18 after the first account freeze triggered by their automated fraud detection system. Investigation reveals that 85% of fraud-flagged accounts are false positives, and the resolution process requires 48 hours — during which customers cannot access their money. The NPS data drives a product investment in real-time fraud review and instant account unfreezing for confirmed false positives, restoring NPS to 55 after fraud events while maintaining BSA/AML compliance."
    benchmark_references: ["kyc-conversion-rate", "monthly-active-users", "net-revenue-retention"]

  - skill: "product-life-cycle"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "Product lifecycle in fintech is uniquely shaped by regulatory evolution. Introduction phase includes regulatory approval — a lending product cannot launch until state licenses are obtained, disclosures are approved, and compliance infrastructure is operational. Growth phase may be accelerated or constrained by regulatory decisions: PSD2 opened European payments markets; conversely, crypto regulation in 2022-2024 constrained growth for entire sub-sectors. Maturity arrives when the regulatory framework stabilizes and compliance becomes a commodity rather than a differentiator. Decline can be triggered by regulatory change — a new regulation can obsolete an entire business model overnight (as happened with payday lending regulations in multiple states)."
    fintech_anti_patterns:
      - "Assuming product lifecycle is determined solely by market dynamics. In fintech, a regulation can move a product from Growth to Decline in a single legislative session. Monitor regulatory pipelines as closely as competitive dynamics."
      - "Investing in Growth-phase tactics for a product whose regulatory environment is entering Maturity. When compliance becomes commoditized (as happened with basic KYC), the competitive advantage shifts from 'we are compliant' to 'we are compliant AND differentiated.'"
      - "Sunsetting a product without understanding regulatory obligations for data retention, customer notification, and account closure. Financial product wind-down has regulatory requirements that non-financial products do not."
    fintech_example: "BNPL products followed a textbook product lifecycle compressed by regulatory intervention. Introduction (2018-2020): novel product, light regulation, rapid adoption. Growth (2020-2022): mainstream adoption, high-profile IPOs. Regulatory trigger (2022-2024): CFPB classifies BNPL as credit subject to TILA, multiple states introduce BNPL-specific regulation. The product is now transitioning from Growth to Maturity faster than market dynamics alone would dictate — regulatory intervention accelerated the lifecycle by 3-5 years."
    benchmark_references: ["monthly-active-users", "regulatory-compliance-cost", "gross-margin"]

  - skill: "disruptive-innovation"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Disruptive innovation in fintech follows the classic pattern with a regulatory twist: the incumbent is protected not just by product complexity but by regulatory moats. Disruption occurs when a fintech finds a regulatory pathway that incumbents overlooked or dismissed. Stripe disrupted payment processing by acting as a payment facilitator (payfac) rather than requiring each merchant to obtain its own merchant account — a regulatory interpretation that incumbents had not exploited. Nubank disrupted Brazilian banking by obtaining a digital banking license rather than building branches. The disruption framework must account for regulatory pathways as a strategic variable — the choice of charter, license, or regulatory framework IS the innovation."
    fintech_anti_patterns:
      - "Trying to disrupt from outside the regulatory perimeter. Unlike tech disruption where you can 'beg forgiveness,' operating without required financial licenses is a federal crime. The regulatory pathway must be established before or concurrent with the disruption."
      - "Assuming incumbents are permanently constrained by legacy regulation. Banks are actively lobbying for regulatory relief and building digital subsidiaries. The window for regulatory-arbitrage disruption closes."
      - "Confusing regulatory non-compliance with innovation. Uber's 'ignore existing regulations' playbook does not transfer to financial services — financial regulators have enforcement power that transportation regulators lacked."
    fintech_example: "Square disrupted the merchant acquiring industry by using the payment facilitator (payfac) model, which allowed it to aggregate small merchants under its own master merchant account rather than requiring each business to undergo individual underwriting. The incumbent acquirers dismissed this approach as impractical and risky. Square's innovation was not primarily technological (the card reader was simple) but regulatory and operational — it found a compliant pathway that incumbents had not exploited, then built technology to manage the fraud and compliance risk at scale."
    benchmark_references: ["tpv", "cac", "cost-per-transaction"]

  - skill: "balanced-scorecard"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "The Balanced Scorecard in fintech requires a fifth perspective beyond the traditional four: Regulatory Compliance. Financial Perspective: net revenue, NIM, gross margin, cost-to-income ratio — but constrained by regulatory capital requirements and fee caps. Customer Perspective: NPS, MAU, transactions per user, KYC conversion rate — the regulatory friction in customer experience is a measurable variable. Internal Process Perspective: fraud detection accuracy, false positive rate, AML alert disposition time, regulatory reporting accuracy. Learning & Growth Perspective: compliance training completion, audit finding remediation velocity, regulatory change management speed. Regulatory Perspective (added): license status, examination findings, enforcement action risk, regulatory capital surplus/deficit."
    fintech_anti_patterns:
      - "Tracking financial metrics without a regulatory compliance perspective. A fintech with excellent growth metrics and deteriorating compliance standing is heading toward an enforcement action that will erase the financial performance."
      - "Measuring Internal Process efficiency without including compliance process metrics. AML alert disposition time, SAR filing timeliness, and regulatory reporting accuracy are operational metrics with legal consequences."
      - "Ignoring the Learning & Growth investment in compliance talent. Compliance officers, BSA officers, and legal counsel are not overhead — they are the human infrastructure that enables the business."
    fintech_example: "A lending fintech implements a balanced scorecard with five perspectives: Financial (loan origination volume, NIM, default rate, gross margin), Customer (application completion rate, NPS, repeat borrower rate), Internal Process (underwriting decision time, SAR filing timeliness, fair lending audit results), Learning & Growth (compliance training completion rate, new regulation integration speed, audit finding closure rate), Regulatory (state license renewal status, examination finding severity, regulatory capital adequacy). The scorecard reveals that accelerating origination volume (Financial) is creating SAR filing backlogs (Internal Process) and triggering fair lending pattern concerns (Regulatory) — the scorecard prevents a growth strategy from causing a compliance crisis."
    benchmark_references: ["regulatory-compliance-cost", "default-rate", "kyc-conversion-rate", "gross-margin", "net-interest-margin"]

  - skill: "trust-equation"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Trust is EXISTENTIAL in fintech — one security breach, one data leak, or one regulatory enforcement action can be fatal. The Trust Equation (Credibility + Reliability + Intimacy / Self-Orientation) maps to fintech as follows: Credibility = regulatory licenses, SOC 2 Type II certification, PCI-DSS compliance, FDIC insurance, published security practices. Reliability = 99.99% uptime, consistent transaction processing, predictable fee schedules, accurate account balances. Intimacy = understanding the customer's financial situation, personalized financial guidance, empathetic handling of financial distress. Self-Orientation = the denominator that destroys trust — hidden fees, opaque pricing, dark patterns that prevent account closure, selling customer data to third parties, and any behavior that prioritizes revenue extraction over customer financial wellbeing. UDAP/UDAAP enforcement is essentially a legal codification of the Self-Orientation problem."
    fintech_anti_patterns:
      - "Building credibility through marketing while neglecting reliability. A fintech that advertises '100% secure' but has never undergone a penetration test is building trust on a foundation that will collapse catastrophically."
      - "Using dark patterns to increase retention. Hiding account closure options, requiring phone calls to cancel, or imposing unexpected fees are high-Self-Orientation behaviors that regulators are increasingly targeting through UDAP/UDAAP enforcement."
      - "Treating data privacy as a legal checkbox rather than a trust signal. GDPR, CCPA, and GLBA compliance are regulatory minimums — customers expect their financial data to be treated with extraordinary care. Any data breach is a trust-extinction event."
    fintech_example: "Chime built trust through radical simplification of the Self-Orientation denominator: no overdraft fees, no minimum balance fees, no monthly fees, and early direct deposit access. Each of these reduced perceived Self-Orientation (the company is not trying to extract fees) while increasing Credibility (FDIC-insured through partner banks) and Reliability (consistent experience). The trust equation explains Chime's growth to 15M+ accounts — in a market where consumers distrust banks, eliminating the behaviors that generate distrust is the most powerful growth lever."
    benchmark_references: ["monthly-active-users", "net-revenue-retention", "fraud-rate"]

  - skill: "swot-pest-analysis"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "PEST analysis in fintech is dominated by the Political and Legal dimensions to an extent not seen in other industries. Political: regulatory regime changes (new administration = new enforcement priorities), international regulatory coordination (Basel standards, FATF recommendations), state-level regulatory fragmentation (50 different money transmitter license requirements). Economic: interest rate environment (directly impacts lending NIM and deposit competition), credit cycle position (determines default rates), funding market conditions (warehouse line availability, securitization market health). Social: financial inclusion expectations, consumer privacy concerns, trust in digital-only institutions, generational banking preferences. Technological: real-time payments infrastructure (FedNow, RTP), open banking APIs (Plaid, MX), blockchain/DLT applications, AI in credit underwriting (model risk management requirements)."
    fintech_anti_patterns:
      - "Under-weighting the Political dimension. A change in CFPB leadership can shift enforcement priorities overnight. A new state attorney general can launch investigations into practices previously tolerated. Regulatory risk is the dominant PEST factor in fintech."
      - "Treating SWOT Strengths as permanent. A regulatory license is a strength today but can be revoked tomorrow. A banking partnership is a strength until the partner bank faces its own regulatory issues. Fintech strengths are more fragile than they appear."
      - "Conducting PEST analysis without monitoring regulatory pipelines. Proposed regulations (CFPB rulemaking, state legislative sessions, Basel Committee consultations) signal future changes that should be incorporated into the analysis."
    fintech_example: "A crypto exchange conducts PEST analysis in early 2024 and identifies that the Political dimension is about to shift dramatically: the EU's MiCA regulation takes effect, creating a comprehensive regulatory framework that will require significant compliance investment but also legitimize the industry. The Economic dimension shows institutional interest increasing. The SWOT reveals that the company's lack of EU entity is a critical Weakness that must be addressed before MiCA enforcement, while its strong compliance infrastructure (built for US regulations) is a Strength that transfers to the EU framework. The analysis drives a six-month plan to establish an EU entity and obtain MiCA authorization before competitors."
    benchmark_references: ["regulatory-compliance-cost", "gross-margin", "monthly-active-users"]

  - skill: "scenario-planning"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Scenario planning in fintech must include regulatory scenarios as a primary dimension — not an afterthought. The three critical scenario dimensions are: regulatory environment (favorable vs. restrictive vs. transformative), credit/economic cycle (expansion vs. contraction vs. crisis), and competitive dynamics (stable vs. big-tech entry vs. regulatory-enabled new competition). Regulatory scenarios have outsized impact: an unfavorable CFPB ruling can eliminate an entire revenue line; a favorable charter decision can unlock deposit funding that transforms unit economics; an open banking mandate can demolish switching-cost moats overnight. Every fintech should maintain scenarios for: (1) a major regulatory change affecting their core product, (2) a banking partner failure or exit, (3) a credit cycle downturn that doubles default rates."
    fintech_anti_patterns:
      - "Building only financial scenarios without regulatory scenarios. A fintech that models three growth rates but does not model the impact of a regulatory enforcement action is scenario planning incorrectly."
      - "Treating the banking partner relationship as a constant across scenarios. Banking partners can exit fintech relationships, face their own regulatory actions, or change terms. Scenario planning must include partner risk."
      - "Ignoring credit cycle scenarios in lending. Every lending fintech must model performance through a recession — default rates that are 2-3x baseline levels. If the business model does not survive a downturn, it is not sustainable."
    fintech_example: "A BNPL company builds four scenarios: (1) Base: current growth trajectory, CFPB regulation increases compliance costs by 20% but does not require fundamental model changes. (2) Regulatory upside: BNPL receives a favorable regulatory classification that legitimizes the product and drives mainstream adoption. (3) Regulatory downside: BNPL classified as credit under TILA, requiring full credit reporting, adverse action notices, and ability-to-repay assessments — fundamentally changing the cost structure. (4) Credit downturn: recession doubles default rates while transaction volume declines 30%. Each scenario has pre-committed strategic responses and trigger indicators."
    benchmark_references: ["default-rate", "regulatory-compliance-cost", "gross-margin"]

  - skill: "pricing-diagnosis"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Pricing in fintech is constrained by regulation in ways that no other industry experiences. Interchange is capped by Durbin Amendment (debit) and PSD2 IFR (EU credit/debit). Interest rates face state usury law ceilings and federal Military Lending Act caps. Fees must comply with UDAP/UDAAP — fees that are 'unfair, deceptive, or abusive' are illegal regardless of their commercial rationale. Pricing diagnosis must begin with a regulatory ceiling analysis: what are the maximum permissible prices for each revenue line? Then assess competitive positioning within those regulatory constraints. The diagnosis should also evaluate cross-subsidy strategies — free checking funded by interchange, zero-interest BNPL funded by merchant fees — and assess their regulatory sustainability."
    fintech_anti_patterns:
      - "Setting prices based on willingness-to-pay without checking regulatory caps. A lending product priced at market-clearing rates may violate usury laws in specific states."
      - "Assuming current regulatory pricing constraints are permanent. Interchange caps can tighten (as PSD2 demonstrated in Europe). Interest rate caps can change. Fee prohibitions can expand. Price within current regulations but plan for tighter constraints."
      - "Hiding fees that regulators consider material. CFPB 'junk fee' enforcement is targeting practices like surprise overdraft fees, late payment penalties, and account maintenance fees that are not prominently disclosed. Opacity is a regulatory risk, not a pricing strategy."
    fintech_example: "A payments company conducts pricing diagnosis and discovers that 60% of its revenue comes from interchange on debit transactions — revenue that is capped by the Durbin Amendment and could be further compressed by proposed legislation. The diagnosis reveals that the company's premium services (fraud analytics, financial reporting, lending integration) are under-priced relative to the value delivered because they were originally bundled 'free' with payment processing. The prescription: unbundle value-add services into separately priced products that are not subject to interchange regulation, shifting the revenue mix from regulated (interchange) to unregulated (SaaS-like fees) over 18 months."
    benchmark_references: ["take-rate", "arpu", "gross-margin", "regulatory-compliance-cost"]

  - skill: "systems-thinking"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "Fintech businesses are complex adaptive systems with regulatory feedback loops that create non-obvious outcomes. The most important loops: (1) The compliance investment loop: investing in compliance enables licenses, which enable products, which generate revenue, which funds more compliance — or underinvesting triggers enforcement, which restricts products, which reduces revenue, which further reduces compliance investment. (2) The trust-growth loop: trust enables customer acquisition, usage generates data, data improves products and risk models, improved products deepen trust. (3) The credit spiral: loan origination generates interest income, income funds new origination, but loosening underwriting to grow origination increases defaults, which consume the interest income, requiring tighter underwriting, which reduces origination. (4) The banking partner dependency loop: growth requires a banking partner, partner enables growth, growth increases partner's regulatory exposure, partner imposes restrictions, restrictions constrain growth."
    fintech_anti_patterns:
      - "Treating compliance as a one-time cost rather than a feedback loop. Under-investment in compliance creates a negative spiral: enforcement action, operational restrictions, customer loss, revenue decline, further compliance under-investment."
      - "Ignoring the time delays in credit risk feedback loops. Loose underwriting today generates revenue today but creates losses 6-18 months later. The delay makes the causal connection invisible to decision-makers focused on quarterly metrics."
      - "Optimizing one metric without modeling regulatory second-order effects. Growing transaction volume rapidly may trigger enhanced BSA/AML monitoring requirements that overwhelm the compliance team, leading to suspicious activity reporting failures."
    fintech_example: "A neobank discovers through systems analysis that its rapid customer growth is creating a negative feedback loop: more customers generate more transaction monitoring alerts, the compliance team cannot process alerts fast enough, alert backlogs trigger regulatory scrutiny, regulators impose growth restrictions until the backlog is cleared, restrictions slow customer acquisition. The system solution is not to hire more compliance analysts (linear scaling) but to invest in automated alert triage (exponential scaling) — a systems-level intervention that breaks the constraint on growth."
    benchmark_references: ["regulatory-compliance-cost", "monthly-active-users", "fraud-rate"]

  - skill: "cialdini-influence"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "Cialdini's influence principles apply powerfully to fintech — but several operate under regulatory constraints. Scarcity is regulated: creating artificial urgency around financial products ('limited-time rate, apply now!') is scrutinized under UDAP/UDAAP if the scarcity is manufactured. Social Proof must be truthful: testimonials and performance claims for investment products are regulated by SEC and FINRA. Reciprocity works differently: free financial products (free checking, free trades) create obligation but must deliver genuine value — 'free' products that generate hidden revenue (payment for order flow, data selling) face regulatory backlash. Authority in fintech comes from regulatory credentials: FDIC insurance, state licenses, SOC 2 certification, and regulatory examination results carry more authority than celebrity endorsements. Commitment & Consistency drives financial product adoption: customers who set up direct deposit are dramatically more likely to use the product long-term."
    fintech_anti_patterns:
      - "Using Scarcity tactics that violate financial advertising regulations. 'Only 48 hours to lock in this rate' is permissible if true; 'limited spots available' for a digital banking product with infinite capacity is deceptive."
      - "Deploying Social Proof that constitutes a financial guarantee. 'Join 10M customers who trust us' is acceptable; 'our customers earn 12% returns' without proper disclaimers violates SEC advertising rules."
      - "Relying on Authority signals that customers do not understand. Displaying a state banking license number is legally required but provides no authority to consumers. FDIC insurance badges, on the other hand, are immediately recognized and powerfully trust-building."
    fintech_example: "Robinhood leveraged Commitment & Consistency (fractional shares lowered the commitment threshold, making everyone an 'investor'), Social Proof (referral waitlists created visible demand), and Authority (SEC-registered, SIPC-insured) to acquire 22M+ accounts. However, the company's use of gamification elements (confetti after trades) and the opacity of payment for order flow revenue created Self-Orientation concerns that eventually attracted FINRA fines and SEC scrutiny — demonstrating that Cialdini's principles must be applied within regulatory boundaries."
    benchmark_references: ["cac", "monthly-active-users", "kyc-conversion-rate"]

  - skill: "growth-share-matrix"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "The BCG Growth-Share Matrix in fintech must account for regulatory capital allocation alongside financial capital. Stars (high growth, high share) may require disproportionate regulatory capital — a fast-growing lending product consumes capital reserves. Cash Cows (low growth, high share) in fintech are often legacy products with stable regulatory relationships and proven compliance — they fund the compliance build-out for new products. Question Marks must include the regulatory licensing timeline — a promising new product that requires a 2-year license acquisition is a very different Question Mark than one that operates under existing licenses. Dogs in fintech cannot always be killed — regulatory obligations may require maintaining products or services for existing customers even when they are uneconomic."
    fintech_anti_patterns:
      - "Allocating resources solely based on market attractiveness without considering regulatory capital constraints. A Star product that requires 50% of available regulatory capital limits the entire portfolio."
      - "Sunsetting Dog products without accounting for regulatory wind-down obligations. Customer notification requirements, data retention mandates, and account migration timelines constrain how quickly uneconomic products can be discontinued."
      - "Ignoring the regulatory timeline for Question Marks. A product that requires a new license, charter amendment, or regulatory approval operates on regulatory time, not market time."
    fintech_example: "A multi-product fintech maps its portfolio: Payments (Cash Cow — mature, high share, stable regulatory relationship), Lending (Star — growing rapidly but consuming capital reserves), Crypto custody (Question Mark — high growth market but regulatory framework uncertain), and Check cashing (Dog — declining, low margin, but regulatory obligations require continued service for existing customers). The matrix reveals that the Lending Star is consuming the capital that should fund the Crypto Question Mark's regulatory preparation — triggering a capital planning discussion with the board."
    benchmark_references: ["gross-margin", "loan-origination-volume", "regulatory-compliance-cost"]

  - skill: "doblin-ten-types"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "The Ten Types of Innovation framework reveals that the most successful fintech innovations occur outside the Product Performance dimension. Profit Model innovation is central: subscription-based financial services, zero-commission trading, BNPL — each is a Profit Model innovation applied to financial services. Network innovation through open banking APIs, banking-as-a-service, and embedded finance creates ecosystem value. Process innovation through automated compliance, AI-driven underwriting, and real-time payments transforms operational economics. Channel innovation through embedded finance (Shopify Capital, Uber driver lending) places financial services at the point of need. Customer Engagement innovation through financial literacy tools, spend categorization, and savings gamification builds emotional connection."
    fintech_anti_patterns:
      - "Innovating on Product Performance (features) while ignoring Profit Model constraints. A more feature-rich lending product is useless if the interest rate is capped by regulation and the cost to serve exceeds the margin."
      - "Neglecting Process innovation in compliance. The fintech with the most efficient compliance process (lowest cost per SAR, fastest KYC, most accurate transaction monitoring) has a structural cost advantage that compounds at scale."
      - "Ignoring Service innovation. Financial products are confusing and stressful for customers. Service innovations (real-time support, transparent status tracking, proactive financial guidance) build trust and reduce churn."
    fintech_example: "Stripe's success maps across multiple innovation types: Process (one-line API integration vs. months of payment gateway setup), Network (developer ecosystem creating distribution), Profit Model (pay-per-transaction vs. monthly minimums and setup fees), Channel (embedded directly in developers' code), and Structure (remote-first global team accessing talent globally). Product Performance (payment processing itself) was deliberately NOT the primary innovation — Stripe processes payments through existing infrastructure. The multi-type innovation created compound defensibility that commodity processors could not replicate."
    benchmark_references: ["cac", "cost-per-transaction", "kyc-cost-per-customer"]

  - skill: "eisenhower-matrix"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "The Eisenhower Matrix in fintech is complicated by the fact that regulatory deadlines create non-negotiable urgency. Regulatory examination responses, license renewal deadlines, SAR filing requirements, and consent order compliance timelines are all Urgent AND Important — they cannot be deprioritized. This compresses the available bandwidth for Not Urgent/Important strategic work (product vision, market expansion, partnership development). The fintech-specific challenge is distinguishing between genuinely urgent compliance requirements and compliance theater (activities that feel urgent because they involve regulators but are not actually time-critical). BSA/AML transaction monitoring is Urgent/Important. Updating an internal compliance policy that is already effective is Not Urgent/Important."
    fintech_anti_patterns:
      - "Treating all regulatory activities as Urgent/Important. Compliance work ranges from genuinely urgent (SAR filing within 30 days of detection) to strategically important but not urgent (building a compliance training program) to busywork (reformatting existing policies for aesthetic reasons)."
      - "Deprioritizing compliance infrastructure as Not Urgent because no regulator has asked about it yet. The absence of regulatory inquiry is not evidence that compliance is adequate — it is evidence that you have not been examined."
      - "Delegating regulatory relationship management. The CEO's relationship with regulators is Urgent/Important and cannot be delegated — regulatory goodwill is a strategic asset."
    fintech_example: "A fintech CEO uses the Eisenhower Matrix to discover that 50% of leadership time is consumed by Urgent/Not Important activities: responding to banking partner operational requests, reviewing routine compliance reports that the CCO should own, and attending standing meetings with external counsel that could be async. The critical finding: Not Urgent/Important activities — building a second banking partner relationship, preparing for future regulatory examinations, developing the compliance technology roadmap — receive zero time. The matrix restructuring frees 10 hours per week for strategic compliance and growth work."
    benchmark_references: ["regulatory-compliance-cost"]

  - skill: "emotional-intelligence"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "Emotional intelligence in fintech extends beyond interpersonal dynamics to a specific domain: managing the emotional weight of handling other people's money. Customers who experience financial distress (account freezes, loan denials, fraud on their accounts) are in heightened emotional states that require specific EI competencies. Regulators who examine the company are human beings whose concerns must be understood and addressed with emotional sophistication — adversarial regulatory relationships lead to enforcement actions. Banking partners experience anxiety about regulatory risk that manifests as restrictive behavior — understanding and addressing their emotional concerns (not just their contractual requirements) maintains critical partnerships."
    fintech_anti_patterns:
      - "Treating customer financial distress as a purely operational issue. A customer whose account is frozen due to a false-positive fraud alert is not a 'ticket to resolve' — they are a person who cannot access their money. The emotional dimension of financial services failures is categorically different from a software bug."
      - "Approaching regulatory examinations as adversarial. Regulators are executing a mandate; meeting them with defensiveness rather than transparency and collaboration escalates the examination and increases enforcement risk."
      - "Ignoring the emotional toll on compliance and risk teams. People who spend their days reviewing fraud cases, suspicious activity, and financial crimes experience secondary trauma. EI for fintech leaders includes caring for these teams."
    fintech_example: "A neobank's VP of Customer Success applies emotional intelligence during a regulatory-mandated mass account review that requires freezing 2,000 accounts for enhanced due diligence. Rather than sending form letters, the team implements personalized outreach explaining the review, providing a timeline, and offering alternative access to funds where possible. The EI-informed approach transforms a potential PR crisis into a trust-building moment — customers who felt respected during the process became more loyal than customers who never experienced the freeze."
    benchmark_references: ["monthly-active-users", "net-revenue-retention"]

  - skill: "black-swans"
    category: "frameworks"
    fintech_relevance: "critical"
    fintech_context: "Fintech is uniquely exposed to black swan events because financial systems are interconnected, leveraged, and trust-dependent. A black swan in fintech can propagate through the system: a BaaS provider failure can freeze customer funds for dozens of fintech companies (as the Synapse collapse demonstrated in 2024). A sovereign debt crisis can freeze cross-border payment corridors overnight. A zero-day vulnerability in a widely-used identity verification API can expose millions of KYC records. A regulatory enforcement action against one prominent fintech can trigger enhanced scrutiny of the entire sector. The black swan framework must be applied not just to the company's own operations but to its banking partners, technology providers, regulatory environment, and the broader financial system."
    fintech_anti_patterns:
      - "Assuming partner stability. The Synapse BaaS failure in 2024 demonstrated that a banking-as-a-service provider collapse can freeze customer funds across dozens of fintech companies. Partner risk IS company risk."
      - "Ignoring correlated risks. A credit cycle downturn simultaneously increases default rates, reduces transaction volume, tightens funding markets, and intensifies regulatory scrutiny — these are not independent events."
      - "Treating cybersecurity as an IT concern rather than an existential risk. A data breach at a fintech is not a PR problem — it is a regulatory enforcement trigger, a customer trust destroyer, and potentially a company-ending event."
    fintech_example: "The Synapse BaaS collapse in 2024 was a black swan for the fintech companies that relied on it. Customer funds were frozen for months, regulatory investigations were launched, and several fintech companies faced existential crises. The lesson for black swan planning: fintech companies must stress-test their banking partner dependencies, maintain contingency plans for partner failure, ensure customer funds are properly segregated and reconciled, and — most critically — understand the regulatory framework governing their banking relationships deeply enough to protect customers when the unexpected occurs."
    benchmark_references: ["capital-adequacy-ratio", "fraud-rate", "regulatory-compliance-cost"]

  # ─────────────────────────────────────────────
  # GAME THEORY (5 skills)
  # ─────────────────────────────────────────────

  - skill: "game-theory-fundamentals"
    category: "game-theory"
    fintech_relevance: "critical"
    fintech_context: "Fintech operates within a multi-player game that includes a uniquely powerful player: the regulator. Unlike traditional competitive games where all players follow the same rules, the regulator writes the rules, enforces them asymmetrically, and can change them mid-game. Game theory in fintech must model: (1) The regulatory game — compliance as a cooperative game with regulators where good-faith collaboration yields better outcomes than adversarial minimum compliance. (2) The competitive game — where regulatory barriers create oligopolistic dynamics and compliance capability is a competitive weapon. (3) The partnership game — where banking partners, card networks, and identity providers are simultaneously cooperators and potential competitors. (4) The trust game — where customer trust is a repeated game and a single defection (breach, fraud, hidden fee) can terminate the relationship permanently."
    fintech_anti_patterns:
      - "Modeling the competitive game without the regulatory player. Fintech strategy that ignores how regulators will react to competitive moves is fatally incomplete. Aggressive pricing, rapid expansion, or innovative product launches all have regulatory implications."
      - "Treating regulatory compliance as a one-shot game. It is a repeated game with memory — regulators remember past behavior. A fintech with a history of good-faith compliance receives more favorable treatment than one with a history of resistance."
      - "Applying zero-sum thinking to the regulatory relationship. The regulator's goal (consumer protection, financial stability) is not opposed to the fintech's goal (growth, profitability) — regulatory compliance and commercial success can be aligned."
    fintech_example: "A payments company analyzes its competitive dynamics as a three-player game: the company, a direct competitor, and the state regulator considering new licensing requirements. If both companies lobby against the regulation, it may be blocked but at reputational cost. If the company embraces the regulation while the competitor opposes it, the company gains regulatory goodwill and the competitor faces enforcement risk. The Nash equilibrium analysis reveals that proactive regulatory engagement (cooperate with the regulator) is the dominant strategy — the company that embraces regulation earliest converts a constraint into a competitive advantage."
    benchmark_references: ["regulatory-compliance-cost", "take-rate"]

  - skill: "prisoners-dilemma-and-cooperation"
    category: "game-theory"
    fintech_relevance: "critical"
    fintech_context: "The Prisoner's Dilemma appears repeatedly in fintech: in industry-wide compliance standards (if all companies invest in AML, the ecosystem is safer; if one defects by under-investing, they gain a cost advantage until caught), in data sharing for fraud prevention (sharing fraud data helps everyone but revealing patterns might help competitors), and in banking partnerships (both parties benefit from cooperation but each has incentives to extract more value). The most consequential dilemma is the compliance investment dilemma: every fintech that under-invests in compliance gains a short-term cost advantage but creates systemic risk that triggers regulatory crackdowns affecting the entire industry. The 2023-2024 wave of consent orders against neobanks demonstrated the collective punishment that follows when individual players defect on compliance."
    fintech_anti_patterns:
      - "Defecting on compliance investment because competitors appear to be under-investing. The short-term cost advantage of compliance under-investment is dwarfed by the expected cost of enforcement actions — the game is iterated, and the regulator always detects defection eventually."
      - "Refusing to participate in industry fraud data sharing networks because of competitive concerns. The collective benefit of fraud network disruption outweighs the marginal competitive information shared."
      - "Treating the banking partner relationship as exploitative rather than cooperative. Fintechs that extract maximum value from banking partners while contributing minimum compliance effort face relationship termination — the partner will defect when the regulatory risk exceeds the revenue benefit."
    fintech_example: "The fintech industry's response to the Synapse BaaS collapse illustrates the Prisoner's Dilemma in action. Before the collapse, individual fintechs had incentives to minimize banking partner due diligence (cost savings). After the collapse, every fintech in the BaaS ecosystem faced enhanced scrutiny because the industry had collectively under-invested in partner oversight. The Nash equilibrium shifted: regulatory attention made compliance cooperation the dominant strategy. Industry groups formed to establish BaaS oversight standards — a cooperative equilibrium enforced by the regulatory threat."
    benchmark_references: ["regulatory-compliance-cost", "fraud-rate"]

  - skill: "first-mover-strategy"
    category: "game-theory"
    fintech_relevance: "high"
    fintech_context: "First-mover advantage in fintech is complicated by the regulatory approval timeline. A fintech can be first-to-market with a product concept but blocked from launch by licensing delays — creating a window for competitors who find faster regulatory pathways. Conversely, being the first company to obtain a specific license or charter creates a durable advantage because the regulatory process acts as a years-long barrier to entry. The most powerful first-mover advantages in fintech are regulatory: being the first to obtain a bank charter (Varo), the first to gain a BitLicense (Circle), or the first to secure approval for a novel product structure creates moats that market-based first-mover advantages cannot match."
    fintech_anti_patterns:
      - "Racing to launch before regulatory approval is complete. First-to-market with an unlicensed product is not a first-mover advantage — it is a violation. The penalty for operating without required licenses far exceeds any revenue gained."
      - "Assuming first-mover advantage is permanent in regulated markets. Regulators can mandate interoperability (open banking), eliminate proprietary advantages (data portability), or create new competitive pathways (new charter types) that erode first-mover moats."
      - "Ignoring the second-mover advantage in fintech compliance. Second movers can learn from the first mover's regulatory mistakes and compliance costs, often launching with better compliance at lower cost."
    fintech_example: "Varo Bank became the first consumer fintech to receive a national bank charter from the OCC in 2020. This first-mover advantage was regulatory in nature: the charter application process took over three years and cost tens of millions in legal and compliance preparation. Competing fintechs who started the charter process later (Revolut, SoFi) faced similar timelines. Varo's first-mover advantage was not in product innovation but in regulatory positioning — the charter enabled deposit-funded lending with dramatically better unit economics than the BaaS-dependent model competitors were forced to use."
    benchmark_references: ["net-interest-margin", "regulatory-compliance-cost", "capital-adequacy-ratio"]

  - skill: "information-asymmetry"
    category: "game-theory"
    fintech_relevance: "critical"
    fintech_context: "Information asymmetry is the foundational problem that financial regulation exists to address. Lenders know less about borrowers than borrowers know about themselves (adverse selection). Borrowers may take on more risk after obtaining a loan (moral hazard). Customers do not understand complex financial product terms (information asymmetry in pricing). Fintech innovation either reduces or exploits these asymmetries — and the regulatory response depends on which. Fintechs that use alternative data to reduce information asymmetry in credit underwriting (reducing adverse selection) are generally embraced by regulators. Fintechs that exploit information asymmetry to sell opaque products to unsophisticated consumers (increasing asymmetry) face enforcement. The regulatory lens is: does this innovation make information more symmetric or less?"
    fintech_anti_patterns:
      - "Exploiting information asymmetry in product design. Complex fee structures, opaque pricing, and deliberately confusing terms may increase short-term revenue but trigger UDAP/UDAAP enforcement and destroy trust."
      - "Ignoring adverse selection in lending. Without robust underwriting, lending platforms attract the borrowers that traditional lenders have already rejected — the information asymmetry problem that has driven lending regulation for centuries."
      - "Failing to recognize that regulators exist to address information asymmetry. Financial regulation is fundamentally about leveling the information playing field. Innovations that align with this goal receive regulatory support; innovations that oppose it receive enforcement."
    fintech_example: "Upstart's approach to information asymmetry in lending demonstrates the regulatory-innovation alignment. Traditional credit scoring uses limited variables (FICO, income, debt ratio), creating information asymmetry where the lender cannot distinguish between borrowers with similar scores but different true risk profiles. Upstart's AI model incorporates additional variables (education, employment history, cost of living) to reduce this asymmetry. Critically, Upstart obtained a CFPB no-action letter by demonstrating that its model expanded credit access without increasing risk — the innovation reduced information asymmetry, aligning with regulatory goals. The company openly publishes fair lending analysis, further reducing the asymmetry between regulator and lender."
    benchmark_references: ["default-rate", "loan-origination-volume"]

  - skill: "coalition-and-partnership-games"
    category: "game-theory"
    fintech_relevance: "high"
    fintech_context: "Coalition formation in fintech is shaped by the regulatory requirement for licensed intermediaries. Every fintech coalition must include at least one regulated entity — a bank, a broker-dealer, an insurance carrier — whose license enables the coalition's activities. This creates asymmetric coalition dynamics: the regulated entity has outsized power because their license is the enabling asset. Coalition games in fintech include: BaaS partnerships (fintech + bank), payment processing alliances (fintech + card network + issuing bank), lending marketplaces (fintech platform + multiple lending partners), and embedded finance (non-financial platform + fintech infrastructure provider). Each coalition must solve the regulatory allocation problem: who bears the compliance responsibility, and who bears the regulatory risk?"
    fintech_anti_patterns:
      - "Entering a coalition without understanding regulatory responsibility allocation. When a fintech uses a banking partner, the bank bears primary regulatory responsibility — but the fintech's actions create the bank's regulatory risk. This asymmetry must be explicitly addressed."
      - "Forming coalitions based solely on commercial terms without assessing regulatory risk sharing. A bank partnership with attractive revenue terms but ambiguous compliance responsibility allocation is a liability, not an asset."
      - "Ignoring the regulatory pressure on banking partners. OCC, FDIC, and Federal Reserve guidance on bank-fintech partnerships is tightening. Banking partners face increasing pressure to oversee fintech activities, which translates into operational restrictions on the fintech."
    fintech_example: "The embedded finance coalition between Shopify and Stripe demonstrates effective coalition game theory. Shopify provides the merchant distribution (millions of merchants), Stripe provides the payment infrastructure and regulatory compliance layer, and Celtic Bank (Stripe's lending partner) provides the lending license. The coalition works because each player contributes a resource the others cannot efficiently build (distribution, infrastructure, license), and the regulatory responsibility is clearly allocated — Stripe handles PCI-DSS and payment compliance, Celtic Bank handles lending regulation, and Shopify handles the merchant relationship. The coalition creates value that no individual player could create alone."
    benchmark_references: ["tpv", "cac", "regulatory-compliance-cost"]

  # ─────────────────────────────────────────────
  # NEGOTIATION (3 skills)
  # ─────────────────────────────────────────────

  - skill: "competitive-negotiation"
    category: "negotiation"
    fintech_relevance: "high"
    fintech_context: "Competitive negotiation in fintech occurs across three primary contexts: banking partner negotiations (the most critical — terms, compliance responsibility allocation, revenue sharing), regulatory negotiations (responding to examination findings, negotiating consent order terms, advocating for favorable regulatory interpretations), and enterprise client negotiations (compliance requirements embedded in contracts, data security addenda, regulatory representation clauses). Banking partner negotiations are uniquely high-stakes: the partner bank holds asymmetric power because their license enables the fintech's operations. Regulatory negotiations require a specific tone — adversarial negotiation tactics that work in commercial settings can backfire catastrophically with regulators."
    fintech_anti_patterns:
      - "Applying aggressive negotiation tactics to regulatory interactions. Regulators have enforcement power that commercial counterparties do not. 'Hardball' with a regulator escalates to enforcement actions."
      - "Negotiating banking partnership terms without independent regulatory counsel. Commercial terms that seem favorable may embed compliance obligations that are operationally impractical or financially ruinous."
      - "Using competitive leverage (threatening to switch banks) with a banking partner during a regulatory examination period. The partner bank will prioritize its regulatory standing over the commercial relationship — every time."
    fintech_example: "A fintech negotiates its banking partnership renewal after the partner bank receives regulatory guidance to strengthen fintech oversight. The bank proposes tripling compliance reporting requirements and imposing a 60-day termination clause. Rather than countering aggressively, the fintech prepares a detailed compliance portfolio demonstrating its existing controls, proposes a joint compliance committee with shared cost, and offers to undergo a voluntary third-party compliance audit. This cooperative approach preserves the relationship while addressing the bank's regulatory concern — competitive negotiation in fintech requires understanding that the real counterparty is often the regulator, not the negotiating partner."
    benchmark_references: ["regulatory-compliance-cost", "take-rate"]

  - skill: "cooperative-negotiation"
    category: "negotiation"
    fintech_relevance: "critical"
    fintech_context: "Cooperative negotiation is the dominant strategy for fintech regulatory relationships. The regulatory examination process is fundamentally a negotiation — the regulator identifies concerns, the company proposes remediation, and both parties work toward an outcome that satisfies regulatory requirements while allowing business continuity. This negotiation is cooperative, not competitive — both parties benefit from a well-regulated, sustainable fintech. Cooperative negotiation also governs industry consortium formation (shared KYC utilities, fraud data networks, regulatory advocacy groups) where competitors must collaborate on non-competitive infrastructure. The embedded finance ecosystem depends on cooperative negotiation between platforms, infrastructure providers, and banks."
    fintech_anti_patterns:
      - "Treating regulatory examinations as adversarial. Examiners who feel the company is being obstructive escalate findings. Transparent, cooperative engagement results in better outcomes — examiners who feel the company is genuinely committed to compliance give the benefit of the doubt on ambiguous issues."
      - "Negotiating data sharing agreements with competitive restrictions that prevent fraud prevention cooperation. In fintech, shared fraud intelligence is a collective good — restrictions that protect competitive advantage at the expense of fraud detection harm the ecosystem."
      - "Entering multi-party partnerships (embedded finance) without cooperative framework agreements. Without explicit cooperation norms, partnership coalitions devolve into competitive extraction — each party trying to capture more of the value at others' expense."
    fintech_example: "A group of competing neobanks forms a cooperative consortium to share anonymized fraud pattern data. Each participant feared sharing would help competitors. Cooperative negotiation produced a framework: data is anonymized and aggregated (no individual transaction data shared), contributions are measured and reciprocity enforced (free-riders are excluded), and a neutral third party manages the data (no participant gains competitive intelligence beyond fraud patterns). The result: all participants saw 30% improvement in fraud detection rates. The cooperative equilibrium proved more valuable than the competitive information each party feared sharing."
    benchmark_references: ["fraud-rate", "fraud-loss-rate", "regulatory-compliance-cost"]

  - skill: "delivering-the-deal"
    category: "negotiation"
    fintech_relevance: "high"
    fintech_context: "Deal execution in fintech is complicated by regulatory requirements embedded in every contract. Enterprise fintech deals require: regulatory compliance representations (the product complies with applicable laws), data security addenda (PCI-DSS, SOC 2, GDPR compliance), business continuity provisions (what happens if the fintech loses its license or banking partner), and regulatory change clauses (who bears the cost when regulations change). Banking partnership agreements require: compliance responsibility matrices (who does KYC, who files SARs), audit rights (the bank must be able to examine the fintech's compliance program), and termination triggers (regulatory events that allow immediate termination). These deal elements add 30-60 days to typical sales cycles."
    fintech_anti_patterns:
      - "Attempting to close deals without pre-prepared compliance documentation. Enterprise buyers and banking partners request SOC 2 reports, PCI-DSS attestations, penetration test results, and regulatory licenses before closing. Not having these ready extends the sales cycle by months."
      - "Ignoring regulatory change clauses in long-term contracts. A three-year contract without a mechanism to address regulatory changes (new compliance requirements, new fee caps) creates unpredictable risk for both parties."
      - "Treating regulatory representations as boilerplate. Representing that your product 'complies with all applicable laws' creates legal liability. Each representation should be reviewed by regulatory counsel and scoped to specific regulations."
    fintech_example: "A B2B fintech creates a 'regulatory deal kit' for enterprise sales: pre-completed SOC 2 Type II report, PCI-DSS Attestation of Compliance, state-by-state license registry, data processing agreement (GDPR-compliant), BSA/AML program summary, and penetration test results (redacted). The kit also includes a compliance responsibility matrix template that clearly allocates regulatory obligations between the fintech and the client. This kit reduces enterprise deal cycles from 120 days to 65 days by preempting the three most common stall points: security review, regulatory verification, and compliance responsibility negotiation."
    benchmark_references: ["cac", "regulatory-compliance-cost"]

  # ─────────────────────────────────────────────
  # THINKING & DECISIONS (4 skills)
  # ─────────────────────────────────────────────

  - skill: "enemies-of-clear-thinking"
    category: "thinking"
    fintech_relevance: "critical"
    fintech_context: "Fintech operators face cognitive biases amplified by the high-stakes, regulation-heavy nature of financial services. Survivorship bias: benchmarking against successful neobanks while ignoring the majority that failed or received enforcement actions. Sunk cost fallacy: continuing to invest in a banking partner relationship that is deteriorating because switching costs seem prohibitive. Confirmation bias: interpreting ambiguous compliance signals as 'no news is good news' rather than investigating potential violations. Anchoring: fixating on the initial take rate or NIM assumption when market conditions and regulations have shifted. Normalcy bias: assuming the current regulatory environment is permanent when legislative change is imminent. Optimism bias: under-estimating default rates and over-estimating credit model accuracy because the model has not yet been tested through a credit cycle."
    fintech_anti_patterns:
      - "Using benign credit period data to validate credit models. A model that performs well during economic expansion has not been tested. Optimism bias makes founders believe their underwriting is superior when it may simply be untested."
      - "Interpreting regulatory silence as regulatory approval. The absence of an enforcement action does not mean the company is compliant — it means the company has not yet been examined. Normalcy bias creates false security."
      - "Anchoring on early vintage loan performance when projecting portfolio quality. Early borrowers are systematically different from later borrowers — they are typically lower risk because they self-select. Extrapolating early performance to the full portfolio is a textbook anchoring error."
    fintech_example: "A lending fintech reports a 1% default rate and celebrates its underwriting model. An advisor trained in clear thinking identifies three biases: (1) Vintage bias — the portfolio is only 8 months old, and most defaults occur between months 12-24. (2) Survivorship bias — comparing to the 1% default rate of successful lending fintechs while ignoring the 5-10% default rates that caused several competitors to fail. (3) Confirmation bias — the team cites the 1% rate as evidence the model works while ignoring early delinquency signals that suggest default rates will rise. The clear-thinking intervention triggers a stress test that projects 3-4% default rates at portfolio maturity — fundamentally changing the capital planning."
    benchmark_references: ["default-rate", "net-interest-margin", "loan-origination-volume"]

  - skill: "evaluating-and-deciding"
    category: "thinking"
    fintech_relevance: "high"
    fintech_context: "Decision-making in fintech must account for a dimension absent in most industries: regulatory irreversibility. Some fintech decisions are irreversible not because of market dynamics but because of regulatory consequences. Launching a product without proper licensing cannot be 'undone' — the regulatory record of unlicensed activity persists. A compliance failure that triggers an enforcement action permanently alters the company's regulatory profile. The one-way-door / two-way-door framework must be expanded in fintech to include a third category: regulatory one-way doors — decisions that create permanent regulatory records regardless of whether they can be commercially reversed."
    fintech_anti_patterns:
      - "Treating regulatory decisions as two-way doors. Applying for a bank charter, launching a lending product, or entering a new regulated market creates regulatory obligations and records that cannot be reversed by simply stopping the activity."
      - "Deciding by speed when the decision has regulatory implications. The 'move fast' ethos must be tempered by regulatory awareness — fast decisions that create compliance violations are expensive regardless of how quickly they were made."
      - "Over-relying on data for credit decisions without understanding model risk management requirements. Regulators require that credit models be explainable, fair, and validated — a purely data-driven decision process that cannot explain its logic violates regulatory requirements (ECOA, FCRA, SR 11-7)."
    fintech_example: "A fintech must decide whether to apply for a bank charter or continue operating through a banking partner. Applying the expanded one-way-door framework: Charter application is a regulatory one-way door — once filed, the company is under OCC supervision, must submit to examinations, and the application outcome becomes part of the permanent regulatory record. The partnership is a two-way door commercially but creates regulatory dependencies. The team analyzes both options through the regulatory irreversibility lens and decides to pursue the charter — accepting the regulatory one-way door because the long-term unit economics (deposit funding vs. warehouse lending) justify the permanent commitment."
    benchmark_references: ["net-interest-margin", "regulatory-compliance-cost", "capital-adequacy-ratio"]

  - skill: "defining-and-exploring-problems"
    category: "thinking"
    fintech_relevance: "high"
    fintech_context: "Problem definition in fintech must always ask: is this a market problem, a product problem, or a regulatory problem? These three root cause categories require fundamentally different solutions, and misdiagnosis is common. Declining transaction volume could be a market problem (competition, economic downturn), a product problem (UX friction, feature gaps), or a regulatory problem (compliance-driven account closures, new KYC requirements deterring customers). Rising default rates could be a credit model problem, an economic cycle problem, or a regulatory problem (adverse selection caused by new fair lending requirements). The discipline of separating market, product, and regulatory root causes prevents fintech teams from applying product solutions to regulatory problems."
    fintech_anti_patterns:
      - "Defining the problem as 'we need feature X' when the real problem is regulatory friction. Building a better payment screen does not solve the problem if customers are abandoning during KYC verification."
      - "Framing regulatory requirements as problems to be solved rather than constraints to be optimized within. 'The problem is we need to do KYC' is wrong framing. 'The problem is our KYC process takes 4 minutes when it should take 30 seconds' is correct framing."
      - "Conflating symptoms across different root cause categories. 'Customers are churning' is a symptom. If some churn is product-driven (bad UX), some is market-driven (competitor offering better rates), and some is compliance-driven (account closures from risk reviews), treating it as a single problem leads to solutions that address none of the causes."
    fintech_example: "A neobank diagnoses 'declining growth' and the product team proposes building five new features. Rigorous problem exploration reveals three distinct problems: (1) KYC conversion dropped 15% after adding a new identity verification step required by updated BSA/AML guidance — a regulatory problem requiring UX optimization of the compliance flow. (2) New customer activation declined because the onboarding flow does not guide users to set up direct deposit — a product problem. (3) Marketing CAC increased 40% because a competitor launched a high-yield savings promotion — a market problem requiring competitive response. The product team's feature proposal would have addressed none of these actual problems."
    benchmark_references: ["kyc-conversion-rate", "cac", "monthly-active-users"]

  - skill: "tough-decision-situations"
    category: "decisions"
    fintech_relevance: "critical"
    fintech_context: "Fintech founders face uniquely difficult decisions that carry regulatory and legal consequences beyond commercial impact. Whether to self-report a compliance failure to regulators (legally required in many cases, strategically important in all). Whether to exit a banking partner relationship when the partner faces regulatory issues (staying risks contagion, leaving disrupts operations). Whether to restrict a profitable product when internal compliance review identifies potential fair lending issues (short-term revenue vs. long-term enforcement risk). Whether to pursue a bank charter (years of regulatory effort and supervision vs. permanent unit economics advantage). Whether to shut down a product that has customer obligations (data retention, account migration, regulatory wind-down requirements). These decisions cannot be made on commercial grounds alone — they require regulatory judgment."
    fintech_anti_patterns:
      - "Delaying self-reporting of compliance failures in hopes they will be resolved before discovery. Regulators penalize concealment far more severely than the underlying violation. The cover-up is always worse than the crime in regulatory enforcement."
      - "Making tough decisions about regulated products without regulatory counsel present. Commercial instincts that serve well in unregulated businesses can lead to disastrous outcomes when applied to regulated financial products."
      - "Treating ethical concerns about financial products (predatory lending terms, exploitative fee structures, algorithmic bias in credit scoring) as merely PR risks rather than regulatory and moral obligations. UDAP/UDAAP and fair lending laws exist because these are not just bad PR — they are illegal."
    fintech_example: "A lending fintech's internal audit discovers that its AI credit model is inadvertently producing disparate impact in loan approvals across protected demographic groups. The tough decision: continue operating the model (which is profitable and passes traditional statistical tests) while investigating, or immediately suspend it (disrupting operations and loan volume) until the fair lending analysis is complete. The company chooses suspension, self-reports to the CFPB, and engages an independent fair lending auditor. The decision costs $2M in lost origination but avoids a potential $50M+ enforcement action — and demonstrates to regulators that the company takes fair lending seriously, building regulatory goodwill that proves valuable in future interactions."
    benchmark_references: ["regulatory-compliance-cost", "default-rate", "loan-origination-volume"]

  # ─────────────────────────────────────────────
  # AI & LEADERSHIP (3 skills)
  # ─────────────────────────────────────────────

  - skill: "ai-vision-and-strategy"
    category: "ai-leadership"
    fintech_relevance: "critical"
    fintech_context: "AI in fintech operates under regulatory requirements that do not exist in other industries. Credit underwriting models using AI/ML must comply with fair lending laws (ECOA, FCRA) that require explainability — a model that cannot explain why it denied a loan application violates adverse action notice requirements. AI-driven fraud detection must balance effectiveness with false-positive rates that affect customer access to funds. AI-based customer communication must comply with financial services disclosure requirements. The SR 11-7 guidance on model risk management requires that all models used in financial decision-making (credit, pricing, risk) be validated, documented, and subject to independent review. EU AI Act classifies financial services AI as 'high-risk,' imposing additional requirements. AI strategy in fintech must be compliance-first: what is the regulatory framework for AI in our specific financial activity, and how does our AI approach satisfy it?"
    fintech_anti_patterns:
      - "Deploying black-box ML models for credit decisions. Regulators require that credit decisions be explainable. A model that accurately predicts default but cannot explain its reasoning violates adverse action notice requirements under ECOA and FCRA."
      - "Using AI to optimize revenue extraction without fair lending analysis. An AI that optimizes pricing may inadvertently create disparate impact across protected demographic groups — a violation regardless of intent."
      - "Treating AI model validation as a one-time event. SR 11-7 requires ongoing monitoring, periodic revalidation, and challenger model comparison. A model validated at launch but never revalidated is a compliance risk."
    fintech_example: "Upstart developed an AI credit underwriting model that expands beyond traditional FICO scores. Critically, the company obtained a CFPB no-action letter before scaling, demonstrated fair lending compliance through published disparate impact analysis, and maintained explainability features that generate specific adverse action reasons for every denied application. The AI strategy was regulatory-first: prove to regulators that the model expands credit access (reducing information asymmetry) rather than exploiting it, and do so transparently. This regulatory alignment enabled Upstart to scale to $12B+ in loan originations while facing less regulatory friction than competitors who deployed AI without regulatory engagement."
    benchmark_references: ["default-rate", "loan-origination-volume", "regulatory-compliance-cost"]

  - skill: "ai-human-centered-approach"
    category: "ai-leadership"
    fintech_relevance: "high"
    fintech_context: "Human-centered AI in fintech is not just a design philosophy — it is a regulatory requirement. The CFPB has issued guidance that automated financial decision-making must include meaningful human oversight. Fair lending laws require that AI-driven credit decisions be reviewable by humans who can explain the reasoning. Customer-facing AI (chatbots, robo-advisors) must include escalation to human agents for complex financial questions. The human-centered approach in fintech means: humans design the models, humans validate the outputs, humans oversee the decisions, and humans are available when AI fails. This is not optional — it is a regulatory mandate under SR 11-7, ECOA, and emerging AI regulations."
    fintech_anti_patterns:
      - "Removing human oversight from financial decision-making to reduce costs. Regulators expect human review of AI-driven credit decisions, fraud alerts, and compliance determinations. Full automation without human oversight is a regulatory violation."
      - "Deploying customer-facing AI without human escalation paths. A chatbot that handles financial complaints without the ability to escalate to a human violates consumer protection expectations and potentially UDAP/UDAAP."
      - "Treating AI explainability as a feature rather than a requirement. In financial services, explainability is not a nice-to-have — it is legally required for credit decisions, insurance underwriting, and investment recommendations."
    fintech_example: "A robo-advisor implements AI-driven portfolio management but applies human-centered design principles required by SEC/FINRA guidance: algorithmic recommendations are explained in plain language, customers can override AI suggestions, a registered investment advisor reviews flagged recommendations before execution, and quarterly human-reviewed performance reports are generated. The human-centered approach costs 15% more than full automation but satisfies regulatory requirements, reduces liability exposure, and produces higher customer trust scores — trust that translates directly to higher AUM retention."
    benchmark_references: ["aum", "monthly-active-users", "regulatory-compliance-cost"]

  - skill: "strategic-thinking-and-alignment"
    category: "leadership"
    fintech_relevance: "high"
    fintech_context: "Strategic alignment in fintech must incorporate the compliance function as a strategic partner, not a cost center. The most common misalignment in fintech organizations is between the growth team (which wants speed and scale) and the compliance team (which wants control and risk mitigation). This tension is productive when managed — compliance constraints force creative solutions and build sustainable competitive advantages. It is destructive when one side dominates — uncontrolled growth leads to enforcement actions; excessive compliance conservatism prevents market entry. Strategic alignment means ensuring that growth targets include compliance readiness, that product roadmaps include regulatory features, and that the compliance team understands commercial objectives well enough to find compliant paths to growth."
    fintech_anti_patterns:
      - "Treating compliance as a veto function rather than an enabling function. A compliance team that only says 'no' is not aligned with the business. Aligned compliance says 'not that way, but here is a compliant way to achieve the same goal.'"
      - "Excluding the Chief Compliance Officer from strategic planning. The CCO should be present at strategy offsites, product planning sessions, and board meetings — not consulted after decisions are made."
      - "Setting growth targets without modeling the compliance infrastructure required to support them. Doubling customer count requires proportional investment in transaction monitoring, KYC operations, and regulatory reporting capacity."
    fintech_example: "A neobank's CEO institutes 'compliance-in-the-room' policy: the CCO or a compliance delegate attends every product planning meeting and every go-to-market strategy session. Initially resisted by the product team as slowing decisions, the policy produces unexpected benefits: compliance identifies regulatory risks early (preventing costly late-stage redesigns), suggests compliant alternatives to blocked product ideas, and provides regulatory intelligence that opens new market opportunities. Strategic alignment transforms compliance from a cost center into a strategic advantage — the company launches products faster than competitors because compliance is built in, not bolted on."
    benchmark_references: ["regulatory-compliance-cost", "monthly-active-users"]

  - skill: "kaizen-bpr"
    category: "frameworks"
    fintech_relevance: "high"
    fintech_context: "Kaizen and Business Process Reengineering in fintech must focus on compliance processes as the primary efficiency opportunity. KYC onboarding, transaction monitoring, SAR filing, regulatory reporting, and audit preparation are process-heavy activities that consume 10-25% of fintech operating costs. Small, continuous improvements (Kaizen) apply to reducing false positive rates in fraud detection, shortening KYC verification time, and accelerating regulatory report generation. Business Process Reengineering applies to fundamental restructuring — replacing manual transaction monitoring with automated systems, transitioning from batch to real-time regulatory reporting, or consolidating multi-state compliance into a unified framework."
    fintech_anti_patterns:
      - "Applying BPR to compliance processes without regulatory counsel. Redesigning the AML process to be 'more efficient' may inadvertently eliminate controls that regulators require. Process redesign in compliance must be validated against regulatory requirements."
      - "Ignoring the compliance process improvement opportunity. Many fintechs invest heavily in product and engineering process improvement while running compliance on manual spreadsheets and email chains."
      - "Treating compliance process improvements as one-time projects. Regulatory requirements change continuously — a process optimized for today's regulations may be non-compliant tomorrow. Kaizen (continuous improvement) is the correct approach."
    fintech_example: "A payments fintech applies Kaizen to its SAR filing process and discovers that the average time from alert to filing is 22 days — against a regulatory expectation of 30 days but with no buffer for complex cases. Small improvements over six months: automated pre-population of SAR forms from transaction data (saves 2 days), standardized narrative templates for common typologies (saves 1 day), and a triage system that routes simple cases to junior analysts and complex cases to senior investigators (improves quality while reducing cycle time to 14 days). The Kaizen approach produces compliant, efficient processes without the risk of a full BPR that might inadvertently remove required controls."
    benchmark_references: ["regulatory-compliance-cost", "kyc-cost-per-customer", "cost-to-income-ratio"]
