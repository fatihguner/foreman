  - template: "case-study-template"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech case studies must include compliance outcomes alongside commercial outcomes. Financial services buyers evaluate vendors partly on their compliance track record — a case study that demonstrates compliance value is more persuasive than one focused solely on commercial metrics."
    field_changes:
      - field: "Results"
        sector_label: "Quantified Outcomes (Including Compliance)"
        sector_guidance: "Include compliance outcomes alongside commercial outcomes: fraud losses prevented, compliance costs reduced, regulatory reports automated, examination findings avoided, and time saved on compliance operations. Financial services buyers value these outcomes at least as highly as revenue or efficiency gains."
      - field: "Challenge"
        sector_label: "Challenge (Including Regulatory Context)"
        sector_guidance: "Include the regulatory dimension of the client's challenge: compliance burden, regulatory risk, examination preparation, or fraud exposure. This helps prospects with similar regulatory pressures see themselves in the story."
    sections_to_add:
      - section_name: "Compliance Impact"
        placement: "after:Quantified Outcomes (Including Compliance)"
        description: "Dedicated compliance outcomes section."
        fields:
          - "Regulatory compliance improvements achieved"
          - "Fraud prevention results"
          - "Compliance cost impact"
          - "Examination or audit outcomes influenced"
    sections_to_remove: []
    benchmark_references: ["fraud-loss-rate", "regulatory-compliance-cost"]

  - template: "partnership-memo"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech partnership memos must address regulatory responsibility allocation — the most consequential and contentious element of fintech partnerships. Every fintech partnership involves regulated activities where compliance responsibility must be explicitly divided."
    field_changes:
      - field: "Partnership structure"
        sector_label: "Fintech Partnership Structure (Including Regulatory Allocation)"
        sector_guidance: "Define: partnership type (banking partner, technology integration, embedded finance, distribution), regulatory structure (which party holds relevant licenses, which party performs compliance activities), commercial terms (revenue share, transaction pricing, volume commitments), and governance (joint compliance review cadence, escalation path, audit rights). The regulatory responsibility matrix is the most critical section — it determines who is liable for compliance failures."
    sections_to_add:
      - section_name: "Regulatory Responsibility Matrix"
        placement: "after:Fintech Partnership Structure (Including Regulatory Allocation)"
        description: "Explicit allocation of compliance responsibilities between partners — the most critical section of a fintech partnership document."
        fields:
          - "KYC/CDD responsibility (which party performs identity verification)"
          - "Transaction monitoring responsibility (which party monitors for suspicious activity)"
          - "SAR filing responsibility (which party files Suspicious Activity Reports)"
          - "Regulatory reporting responsibility (by report type and jurisdiction)"
          - "Consumer complaint handling responsibility"
          - "Audit and examination cooperation obligations"
          - "Regulatory change management process"
      - section_name: "Partner Risk Assessment"
        placement: "after:Regulatory Responsibility Matrix"
        description: "Assessment of regulatory risk introduced by the partnership."
        fields:
          - "Partner's regulatory standing (licenses, examination history, enforcement record)"
          - "Concentration risk (dependency on a single partner for regulated activities)"
          - "Termination provisions and transition plan"
          - "Contingency plan for partner regulatory disruption"
    sections_to_remove: []
    benchmark_references: ["regulatory-compliance-cost"]
