# Fintech Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for fintech companies. The output agent loads these rules
# when generating documents with the fintech industry pack active.
#
# REGULATORY PRINCIPLE: All investor, board, and client-facing materials must
# include regulatory status, compliance framework, and license standing as
# first-class dimensions. Risk assessment always includes regulatory risk.
# Unit economics must separate regulated vs. unregulated revenue lines.
# Board materials must include compliance standing, audit findings, and
# regulatory change tracking.
#
# Adaptation types:
#   as-is    — The template works without modification for fintech companies.
#   modified — The template requires field changes, additional sections, or
#              reframing of existing sections for fintech context.

pack_metadata:
  sector: "fintech"
  display_name: "Fintech"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech unit economics differ fundamentally from SaaS. Revenue lines are a mix of interchange, NIM, fees, and subscription income — each with different regulatory exposure and margin profiles. Unit economics must separate regulated and unregulated revenue, include compliance cost per customer, and account for credit losses in lending businesses."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "Revenue per Customer (by Revenue Line)"
        sector_guidance: "Decompose revenue per customer by type: interchange/processing revenue (subject to Durbin/PSD2 caps), net interest income (subject to usury caps and credit risk), fee revenue (subject to UDAP/UDAAP), and subscription/platform revenue (unregulated). Report each separately because regulatory exposure differs dramatically."
      - field: "Cost per unit"
        sector_label: "CAC (Fully Loaded Including KYC)"
        sector_guidance: "Include all acquisition costs: marketing, sales, sign-up incentives, KYC/identity verification, and initial compliance screening. In fintech, KYC costs ($3-$15 per consumer) are a non-discretionary component of CAC that does not exist in unregulated businesses."
      - field: "Margin per unit"
        sector_label: "Gross Margin by Revenue Line"
        sector_guidance: "Report gross margin separately for each revenue type. Interchange margin net of processing costs. NIM net of cost of funds and credit provisions. Fee margin net of compliance costs. Platform/subscription margin. Blended gross margin masks the true economics of each revenue stream."
      - field: "Lifetime value"
        sector_label: "LTV (Risk-Adjusted)"
        sector_guidance: "Calculate LTV incorporating: revenue per customer (multi-product if applicable), gross margin by revenue line, ongoing compliance costs (transaction monitoring, KYC refresh, regulatory reporting allocation), and for lending — expected credit losses. Disclose churn rate assumption and average customer lifetime."
      - field: "Acquisition cost"
        sector_label: "CAC Payback Period"
        sector_guidance: "Report in months. For multi-product fintechs, report payback on initial product and accelerated payback when customers adopt additional products. Include the compliance cost runway — how long compliance infrastructure costs persist before being amortized across sufficient customers."
      - field: "Unit economics ratio"
        sector_label: "LTV:CAC Ratio (by Customer Segment)"
        sector_guidance: "Report the ratio by segment (consumer, SMB, enterprise) and by product. A blended LTV:CAC can mask segments where unit economics are negative. Nubank's LTV:CAC above 5x at IPO was the benchmark-setting disclosure for fintech unit economics."
    sections_to_add:
      - section_name: "Fintech Metrics Dashboard"
        placement: "before:Revenue per Customer (by Revenue Line)"
        description: "Core fintech metrics in a format investors expect. Varies by sub-sector."
        fields:
          - "TPV / Loan Origination Volume / AUM (as applicable)"
          - "Take Rate / NIM / Management Fee"
          - "Net Revenue and growth rate"
          - "Monthly Active Users and transactions per user"
          - "Net Revenue Retention"
          - "Gross Margin (blended and by revenue line)"
          - "Default Rate / Fraud Loss Rate (as applicable)"
          - "Cost-to-Income Ratio"
      - section_name: "Revenue Composition and Regulatory Exposure"
        placement: "after:Fintech Metrics Dashboard"
        description: "Breakdown of revenue by regulatory exposure — critical for investor risk assessment."
        fields:
          - "Regulated revenue (% of total): interchange, NIM, regulated fees"
          - "Unregulated revenue (% of total): subscription, platform, data products"
          - "Revenue lines subject to pending regulatory changes"
          - "Revenue concentration in single revenue type"
      - section_name: "Compliance Cost Structure"
        placement: "after:CAC Payback Period"
        description: "Regulatory compliance costs broken out from general operating expenses."
        fields:
          - "KYC/onboarding cost per customer"
          - "Ongoing compliance cost per customer per year (transaction monitoring, KYC refresh, reporting)"
          - "Total compliance cost as % of revenue"
          - "Compliance cost trajectory (increasing or decreasing as % of revenue)"
    sections_to_remove: []
    benchmark_references: ["tpv", "take-rate", "net-interest-margin", "cac", "ltv", "gross-margin", "regulatory-compliance-cost", "kyc-cost-per-customer", "default-rate", "fraud-loss-rate", "cost-to-income-ratio"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech investor updates must include regulatory status alongside financial metrics. Investors in regulated businesses expect proactive disclosure of regulatory developments, compliance milestones, and any regulatory interactions."
    field_changes:
      - field: "Financial highlights"
        sector_label: "Fintech KPIs"
        sector_guidance: "Report by sub-sector: Payments (TPV, take rate, transaction volume, net revenue). Lending (origination volume, NIM, default rate, portfolio quality). Neobanking (MAU, deposits, ARPU, NRR). Wealthtech (AUM, net flows, management fee revenue). Present current month, prior month, and trend."
      - field: "Key metrics"
        sector_label: "Operating and Compliance Metrics"
        sector_guidance: "Include both commercial metrics (new customers, CAC, NRR) and compliance metrics (KYC conversion rate, fraud rate, regulatory compliance cost). The inclusion of compliance metrics signals sophistication to fintech investors."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include regulatory wins alongside commercial wins: license approvals, successful regulatory examinations, compliance certifications (SOC 2, PCI-DSS), banking partner expansions. Regulatory milestones are investment milestones in fintech."
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Proactively disclose regulatory challenges: pending regulatory changes, examination findings, compliance infrastructure gaps, banking partner issues. Investors prefer proactive disclosure over surprises."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "Be specific. Fintech-relevant asks: introductions to banking partners, regulatory counsel, compliance technology vendors, or industry regulators. Also: feedback on regulatory strategy or capital planning."
    sections_to_add:
      - section_name: "Regulatory Status"
        placement: "after:Fintech KPIs"
        description: "Mandatory section for fintech investor updates — regulatory developments and compliance standing."
        fields:
          - "License status (current, pending applications, renewals)"
          - "Regulatory interactions (examinations, inquiries, guidance received)"
          - "Banking partner relationship status"
          - "Notable regulatory changes affecting the business"
      - section_name: "Cash and Capital Position"
        placement: "after:Regulatory Status"
        description: "Cash position and regulatory capital (if applicable)."
        fields:
          - "Cash balance"
          - "Monthly burn rate"
          - "Months of runway"
          - "Regulatory capital ratio (if bank-chartered or holding customer funds)"
    sections_to_remove: []
    benchmark_references: ["tpv", "take-rate", "net-interest-margin", "monthly-active-users", "regulatory-compliance-cost"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech competitive analysis must include regulatory barriers to entry, big tech threat assessment, and the impact of open banking mandates on competitive dynamics. The competitive map must position regulatory advantages (licenses, charters, compliance infrastructure) as defensibility factors alongside product and technology."
    field_changes:
      - field: "Competitor overview"
        sector_label: "Competitive Map with Regulatory Positioning"
        sector_guidance: "Map competitors on a matrix: X-axis = customer segment (consumer to enterprise), Y-axis = regulatory depth (operating through partners to holding own charter). Position each competitor with: estimated volume, funding, license status, and banking partner(s). Include big tech entries (Apple, Google) and traditional bank digital offerings."
      - field: "Competitive advantages"
        sector_label: "Defensibility Analysis (Including Regulatory Moat)"
        sector_guidance: "Assess defensibility along fintech-specific dimensions: regulatory moat (licenses, charter, compliance infrastructure), data advantage (transaction data, credit data), network effects (two-sided marketplace dynamics, embedded distribution), banking partner quality, and trust/brand (NPS, FDIC insurance, security certifications)."
      - field: "Competitive threats"
        sector_label: "Threat Vectors"
        sector_guidance: "Categorize: (1) Peer fintechs — same sub-sector, same regulatory pathway. (2) Big tech — Apple, Google, Amazon entering with distribution advantage. (3) Traditional banks — digital subsidiaries and partnerships. (4) Regulatory change — open banking mandates enabling new competitors, new charter types creating new entrants. (5) Cross-border competitors — international fintechs entering the US market (Revolut, Wise)."
    sections_to_add:
      - section_name: "Regulatory Landscape Impact"
        placement: "after:Threat Vectors"
        description: "How current and pending regulation shapes the competitive landscape."
        fields:
          - "Current regulatory framework and its competitive implications"
          - "Pending regulatory changes that will alter competitive dynamics"
          - "Open banking mandate impact on data-based competitive advantages"
          - "Regulatory barriers protecting the company's position"
      - section_name: "Big Tech Threat Assessment"
        placement: "after:Regulatory Landscape Impact"
        description: "Specific assessment of big tech financial services entries."
        fields:
          - "Active big tech financial products in the company's space"
          - "Announced or rumored big tech financial services initiatives"
          - "The company's defensibility against big tech entry (niche depth, regulatory advantage, relationship density)"
    sections_to_remove: []
    benchmark_references: ["take-rate", "cac", "monthly-active-users", "regulatory-compliance-cost"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech pitch decks must include a dedicated regulatory strategy slide — investors evaluate regulatory risk and regulatory moat as primary investment criteria. The deck must address license status, compliance infrastructure, banking partner stability, and regulatory trajectory."
    field_changes:
      - field: "Market opportunity"
        sector_label: "Market Opportunity"
        sector_guidance: "Present TAM/SAM/SOM with fintech-specific methodology: (target customers) x (revenue per customer including cross-sell trajectory). Include the regulatory addressable market — the portion of the market the company can legally serve given its current licensing. Address regulatory tailwinds (open banking, embedded finance) and headwinds (fee caps, new compliance requirements)."
      - field: "Business model"
        sector_label: "Fintech Business Model"
        sector_guidance: "Cover: revenue model (interchange, NIM, fees, subscription), regulatory structure (licenses held, banking partner arrangement, charter strategy), unit economics by revenue line, and the cross-sell/expansion revenue mechanism. Separate regulated and unregulated revenue."
      - field: "Traction"
        sector_label: "Fintech Traction Metrics"
        sector_guidance: "Dedicated slide with sub-sector-appropriate metrics: TPV/origination volume/AUM trajectory, net revenue and growth rate, MAU and engagement, NRR, gross margin, and regulatory milestones. This slide is the most scrutinized in any fintech pitch."
    sections_to_add:
      - section_name: "Regulatory Strategy Slide"
        placement: "after:Fintech Business Model"
        description: "Mandatory slide for fintech fundraising — investors require clarity on regulatory positioning."
        fields:
          - "Current license status (licenses held, jurisdictions covered)"
          - "Regulatory structure (banking partner, own charter, or hybrid)"
          - "Compliance infrastructure (team, technology, processes)"
          - "Regulatory roadmap (charter application timeline, license expansion plan)"
          - "Regulatory risk mitigation (banking partner diversification, compliance investment plan)"
      - section_name: "Unit Economics Slide"
        placement: "after:Fintech Traction Metrics"
        description: "Fintech-specific unit economics with regulatory cost transparency."
        fields:
          - "LTV:CAC ratio (including KYC costs in CAC)"
          - "Revenue per customer by product line"
          - "Gross margin by revenue type (regulated vs. unregulated)"
          - "Compliance cost per customer and as % of revenue"
          - "For lending: default rate, provision rate, risk-adjusted NIM"
    sections_to_remove: []
    benchmark_references: ["tpv", "take-rate", "net-interest-margin", "cac", "ltv", "gross-margin", "regulatory-compliance-cost"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "A fintech strategic one-pager must anchor analysis in the regulatory landscape alongside commercial strategy. Regulatory positioning is a strategic variable, not an appendix item."
    field_changes:
      - field: "Strategic position"
        sector_label: "Fintech Strategic Position"
        sector_guidance: "Frame position in fintech terms: sub-sector positioning, regulatory moat strength, competitive differentiation (product, distribution, compliance, data), banking partner or charter status, and cross-sell breadth. Include the company's position on the embedded-vs-standalone spectrum."
      - field: "Key metrics"
        sector_label: "Fintech Health Metrics"
        sector_guidance: "Core metrics: Net Revenue + growth rate, NRR, LTV:CAC (inclusive of compliance costs), Gross Margin (by revenue line), Regulatory Compliance Cost (% of revenue), and sub-sector-specific KPI (default rate for lending, fraud rate for payments, AUM for wealthtech). Compare each to stage-appropriate benchmarks."
    sections_to_add:
      - section_name: "Regulatory Moat Assessment"
        placement: "end"
        description: "Assessment of the company's regulatory competitive advantage."
        fields:
          - "License portfolio and coverage (% of addressable market currently licensable)"
          - "Compliance infrastructure maturity vs. competitors"
          - "Regulatory relationship quality (examination history, enforcement record)"
          - "Charter strategy and timeline (if pursuing direct charter)"
    sections_to_remove: []
    benchmark_references: ["take-rate", "net-revenue-retention", "gross-margin", "regulatory-compliance-cost"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech market sizing must account for regulatory addressable market — the portion of the total market the company can serve given its licensing status. Regulatory changes can expand or contract the addressable market overnight."
    field_changes:
      - field: "Total addressable market"
        sector_label: "TAM / SAM / SOM (Regulatory-Adjusted)"
        sector_guidance: "Present TAM with regulatory adjustment: total market opportunity x percentage addressable under current licensing x regulatory probability factor for markets requiring new licenses. Include the regulatory expansion opportunity — the incremental SAM available if pending license applications are approved."
      - field: "Market dynamics"
        sector_label: "Fintech Market Dynamics"
        sector_guidance: "Address: regulatory trajectory (tightening, loosening, transforming), competitive density by sub-sector, big tech entry risk, open banking impact, embedded finance opportunity, and the digital adoption curve for the target customer segment."
    sections_to_add:
      - section_name: "Regulatory Market Dynamics"
        placement: "end"
        description: "How regulation shapes the market opportunity."
        fields:
          - "Current regulatory framework and its impact on market structure"
          - "Pending regulatory changes and their market impact (expansion or contraction)"
          - "International regulatory comparison (markets with favorable regulation for expansion)"
          - "Regulatory moat — how compliance requirements create barriers that protect market share"
    sections_to_remove: []
    benchmark_references: ["tpv", "monthly-active-users", "regulatory-compliance-cost"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech due diligence is dominated by regulatory verification. Investors must verify license status, compliance infrastructure, banking partner stability, audit findings, enforcement history, and the regulatory risk profile. This is the most fintech-divergent template — regulatory DD items exceed commercial DD items."
    field_changes:
      - field: "Financial review"
        sector_label: "Fintech Financial and Regulatory Verification"
        sector_guidance: "Verify: revenue decomposition by type (interchange, NIM, fees, subscription), compliance cost allocation methodology, credit loss provisioning (for lending), regulatory capital adequacy (for charter holders), and banking partner financial terms. Request: audited financials, regulatory examination reports, and compliance audit results."
      - field: "Operational review"
        sector_label: "Operations, Compliance, and Risk Review"
        sector_guidance: "Review: compliance program documentation, BSA/AML program effectiveness, KYC processes and false positive rates, transaction monitoring system capability, SAR filing history and timeliness, regulatory reporting accuracy, and data security posture. Request: compliance audit reports, regulatory examination findings, and banking partner oversight documentation."
    sections_to_add:
      - section_name: "Regulatory Due Diligence"
        placement: "before:Fintech Financial and Regulatory Verification"
        description: "Comprehensive regulatory review — the most critical DD section for fintech investments."
        fields:
          - "License inventory (type, jurisdiction, status, renewal dates)"
          - "Regulatory examination history (findings, MRAs, enforcement actions)"
          - "Banking partner(s): identity, relationship tenure, contract terms, termination provisions"
          - "BSA/AML compliance program assessment"
          - "Consumer protection compliance (UDAP/UDAAP, TILA, ECOA, FCRA as applicable)"
          - "Data privacy compliance (GLBA, GDPR, CCPA)"
          - "PCI-DSS compliance status (if handling card data)"
          - "SOC 2 Type II report review"
          - "Fair lending analysis (for lending companies)"
          - "Pending or threatened regulatory actions"
      - section_name: "Credit Risk Review (Lending Companies)"
        placement: "after:Regulatory Due Diligence"
        description: "Lending-specific due diligence."
        fields:
          - "Vintage analysis (default rates by origination cohort)"
          - "Credit model validation and back-testing results"
          - "Portfolio concentration analysis (geography, product, borrower type)"
          - "Stress test results (recession scenario impact on portfolio)"
          - "Warehouse facility terms and covenants"
          - "Securitization history and performance"
    sections_to_remove: []
    benchmark_references: ["default-rate", "regulatory-compliance-cost", "net-interest-margin", "fraud-rate", "capital-adequacy-ratio"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Cap table structure is not fintech-specific. Standard venture capital cap table formats apply."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech decision rationale documentation must include regulatory impact assessment as a standard section. Every significant decision in fintech has regulatory implications that should be documented."
    field_changes:
      - field: "Decision context"
        sector_label: "Decision Context (Including Regulatory Factors)"
        sector_guidance: "Include regulatory considerations alongside commercial factors: how regulation constrains the options, whether the decision requires regulatory approval or notification, and the regulatory risk of each alternative."
    sections_to_add:
      - section_name: "Regulatory Impact Assessment"
        placement: "end"
        description: "Assessment of regulatory implications of the decision."
        fields:
          - "Regulatory requirements triggered by this decision"
          - "License or approval requirements"
          - "Compliance infrastructure changes needed"
          - "Regulatory risk level of each alternative considered"
    sections_to_remove: []
    benchmark_references: []

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech exit scenarios are governed by regulatory approval requirements. Bank acquisitions require OCC/FDIC/Fed approval. Insurance company acquisitions require state insurance commissioner approval. Any change of control of a licensed financial entity triggers regulatory review. Valuation multiples vary dramatically by sub-sector and regulatory structure."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "Fintech Valuation Framework"
        sector_guidance: "Fintech valuations depend on sub-sector: payments companies trade on revenue multiples (10-25x for high-growth); lending companies trade on book value or earnings multiples (lower than payments due to credit risk); neobanks trade on customer multiples or revenue multiples depending on monetization stage; wealthtech trades on AUM-based multiples. Regulatory status (charter vs. partner model) significantly affects multiples — charter holders command premiums."
      - field: "Potential acquirers"
        sector_label: "Fintech Acquirer Landscape"
        sector_guidance: "Categorize: (1) Strategic fintech acquirers (larger fintechs acquiring capability or customer base). (2) Bank acquirers (traditional banks acquiring fintech technology and customer relationships — requires regulatory approval). (3) Big tech acquirers (platform companies acquiring financial services capability — faces intense regulatory scrutiny). (4) PE acquirers (financial services-focused PE firms). Note: change of control of licensed entities requires regulatory approval that can take 6-18 months."
    sections_to_add:
      - section_name: "Regulatory Exit Requirements"
        placement: "after:Fintech Acquirer Landscape"
        description: "Regulatory approvals required for exit transactions."
        fields:
          - "Regulatory approvals required for change of control (by license type)"
          - "Expected regulatory approval timeline"
          - "License portability (which licenses transfer to the acquirer, which must be re-obtained)"
          - "Regulatory conditions that could be imposed on the acquisition"
    sections_to_remove: []
    benchmark_references: ["tpv", "net-interest-margin", "aum", "gross-margin"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech board meetings must include regulatory standing as a first-class agenda item alongside financial and operational performance. Board members have fiduciary responsibility for regulatory compliance, and regulators expect board-level oversight of compliance programs."
    field_changes:
      - field: "Financial summary"
        sector_label: "Fintech Financial Dashboard"
        sector_guidance: "Present sub-sector-appropriate financial metrics: revenue by line (interchange, NIM, fees, subscription), gross margin by revenue type, compliance cost trend, and for lending — credit quality summary (default rate, provision rate, portfolio composition). Compare to plan and prior quarter."
      - field: "Strategic priorities"
        sector_label: "Strategic Priorities and Regulatory Roadmap"
        sector_guidance: "Report progress against OKRs with compliance milestones explicitly included. Present the regulatory roadmap alongside the product roadmap — license applications, charter strategy, compliance technology investment."
      - field: "Risks"
        sector_label: "Risk Dashboard (Including Regulatory Risk)"
        sector_guidance: "Mandatory risk categories for fintech board review: (1) Regulatory risk — pending regulations, examination findings, enforcement environment. (2) Credit risk — portfolio quality, concentration, stress test results (for lending). (3) Fraud risk — fraud rate trends, loss rate, detection system effectiveness. (4) Banking partner risk — partner stability, relationship health, concentration. (5) Operational risk — compliance backlog, system availability, incident history. (6) Competitive risk — big tech entry, regulatory-enabled competition."
    sections_to_add:
      - section_name: "Compliance Standing Report"
        placement: "before:Fintech Financial Dashboard"
        description: "Mandatory section for fintech board materials — board must demonstrate oversight of compliance program."
        fields:
          - "Overall compliance program status (Green/Yellow/Red)"
          - "License status (current, pending, renewals due)"
          - "Regulatory examination update (recent findings, remediation progress)"
          - "BSA/AML program metrics (alert volume, SAR filing timeliness, backlog)"
          - "Consumer complaint trends (CFPB, state regulators, BBB)"
          - "Compliance staffing (vacancies, key position changes)"
      - section_name: "Regulatory Change Tracker"
        placement: "after:Compliance Standing Report"
        description: "Tracking of regulatory changes that affect the business."
        fields:
          - "Pending regulations with expected impact (high/medium/low)"
          - "Recently enacted regulations and compliance timeline"
          - "Industry enforcement trends relevant to the company"
          - "Regulatory advocacy activities (comment letters, trade association participation)"
      - section_name: "Audit Findings Summary"
        placement: "after:Regulatory Change Tracker"
        description: "Internal and external audit findings requiring board awareness."
        fields:
          - "Open audit findings by severity (critical, high, medium, low)"
          - "Remediation progress on prior findings"
          - "Upcoming audits and examinations"
    sections_to_remove: []
    benchmark_references: ["regulatory-compliance-cost", "default-rate", "fraud-rate", "gross-margin", "net-revenue-retention"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech board agendas must allocate dedicated time for compliance reporting. Regulators examine board minutes for evidence of compliance oversight — the agenda must demonstrate that the board allocates meaningful time to regulatory matters."
    field_changes:
      - field: "Agenda items"
        sector_label: "Fintech Board Agenda"
        sector_guidance: "Standard fintech board agenda: (1) Compliance standing report — 15 min (presented by CCO, not CEO — regulators expect independent compliance reporting to the board). (2) Financial and operating metrics — 15 min (pre-read, discussion only). (3) Strategic topic deep-dive — 25 min (rotate: regulatory strategy, product, credit risk, GTM, partnerships). (4) Risk dashboard review — 10 min. (5) CEO asks — 10 min. (6) Executive session — 15 min. Total: 90 minutes. NOTE: The compliance standing report MUST be a standing agenda item, not an occasional add-on — regulators review board minutes for compliance oversight evidence."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech risk assessment must include regulatory risk as the first dimension — not a secondary consideration. The risk categories for fintech are structurally different from generic businesses, with credit risk, fraud risk, regulatory risk, and banking partner risk as primary categories."
    field_changes:
      - field: "Risk categories"
        sector_label: "Fintech Risk Categories"
        sector_guidance: "Fintech-specific risk taxonomy (all mandatory): (1) Regulatory risk — enforcement environment, pending regulations, examination findings, license risk. (2) Credit risk — portfolio quality, concentration, stress performance, underwriting model accuracy (for lending). (3) Fraud risk — fraud rate trends, loss rate, detection effectiveness, false positive impact. (4) Banking partner risk — partner stability, regulatory standing, concentration, contract terms. (5) Operational risk — system availability, compliance process backlog, key person dependency. (6) Cybersecurity risk — data breach exposure, penetration test results, incident response readiness. (7) Competitive risk — big tech entry, regulatory-enabled competition, rate/fee competition."
    sections_to_add:
      - section_name: "Regulatory Risk Deep Dive"
        placement: "before:Fintech Risk Categories"
        description: "Detailed regulatory risk assessment — the primary risk dimension for fintech."
        fields:
          - "Current regulatory enforcement environment (agency priorities, recent actions against peers)"
          - "Pending regulatory changes and their risk rating"
          - "Examination preparation status and timeline"
          - "Regulatory capital adequacy (if applicable)"
          - "License renewal status and risk"
      - section_name: "Credit Risk Summary (Lending Companies)"
        placement: "after:Fintech Risk Categories"
        description: "Lending-specific risk metrics."
        fields:
          - "Default rate by vintage (trend analysis)"
          - "Portfolio concentration (geography, product, borrower type)"
          - "Stress test results (mild recession, severe recession scenarios)"
          - "Provision adequacy (actual losses vs. reserved amounts)"
      - section_name: "Banking Partner Risk Assessment"
        placement: "after:Credit Risk Summary (Lending Companies)"
        description: "Assessment of banking partner concentration and stability."
        fields:
          - "Banking partner(s) and relationship health"
          - "Partner regulatory standing (recent examinations, enforcement actions)"
          - "Concentration risk (single partner vs. multiple)"
          - "Contingency plan for partner disruption"
    sections_to_remove: []
    benchmark_references: ["default-rate", "fraud-rate", "fraud-loss-rate", "regulatory-compliance-cost", "capital-adequacy-ratio"]

