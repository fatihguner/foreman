        sector_guidance: "Present: transaction pricing (per-transaction, volume-based tiers), platform fees, compliance feature pricing (if separate). Include compliance ROI: reduced compliance costs (automated reporting, reduced manual review), fraud prevention value (dollar losses prevented), and regulatory risk reduction (fewer examination findings). Financial services clients weight compliance value heavily in purchasing decisions."
      - field: "Scope"
        sector_label: "Implementation Scope (Including Compliance Integration)"
        sector_guidance: "Include: technical integration timeline, compliance setup (KYB, regulatory agreements, compliance feature activation), testing and certification phase, and compliance monitoring activation. Note: compliance integration may require client's compliance team involvement."
    sections_to_add:
      - section_name: "Compliance and Security Credentials"
        placement: "end"
        description: "Regulatory and security credentials that financial services clients require."
        fields:
          - "Licenses and regulatory registrations"
          - "SOC 2 Type II attestation"
          - "PCI-DSS compliance status"
          - "Data handling and privacy commitments (GLBA, GDPR, CCPA)"
          - "Penetration test results summary"
    sections_to_remove: []
    benchmark_references: ["fraud-loss-rate", "kyc-cost-per-customer"]

  - template: "service-level-agreement"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech SLAs must include regulatory compliance commitments alongside standard availability and support commitments. Financial services clients require contractual assurance of regulatory compliance."
    field_changes:
      - field: "Service levels"
        sector_label: "Fintech Service Commitments"
        sector_guidance: "Standard fintech SLA components: (1) Transaction processing uptime (99.95% for payment processing — higher than SaaS because transactions involve money), (2) Transaction processing time (real-time for payments, within SLA for lending decisions), (3) Support response time by severity, (4) Compliance service levels (regulatory report delivery timeline, fraud alert response time, KYC verification turnaround). (5) Data handling commitments (encryption, retention, deletion)."
      - field: "Remediation"
        sector_label: "Credit, Remediation, and Regulatory Notification"
        sector_guidance: "Define: service credit structure for SLA breaches, escalation procedures for compliance-affecting outages, mutual notification obligations for regulatory events (either party receiving a regulatory inquiry that affects the other), and termination rights for sustained compliance failures."
    sections_to_add:
      - section_name: "Regulatory Compliance Commitments"
        placement: "after:Fintech Service Commitments"
        description: "Contractual compliance commitments — standard in financial services agreements."
        fields:
          - "Regulatory compliance representations (which regulations the service complies with)"
          - "Audit rights (client's right to audit the service provider's compliance)"
          - "Regulatory change management (process for adapting to regulatory changes)"
          - "Breach notification obligations and timeline"
          - "Data handling and GLBA compliance commitments"
    sections_to_remove: []
    benchmark_references: []

  - template: "project-status-update"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech project status updates must track compliance integration milestones alongside technical milestones. A project that is technically complete but not compliance-approved cannot launch."
    field_changes:
      - field: "Progress summary"
        sector_label: "Implementation Progress (Including Compliance Gates)"
        sector_guidance: "Track: technical integration progress, compliance integration progress (KYB status, agreement execution, compliance feature setup), testing phase status, and compliance approval status. Highlight any compliance gates that are blocking launch — these are non-negotiable and often on a different timeline than technical work."
    sections_to_add: []
    sections_to_remove: []
