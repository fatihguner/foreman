  - template: "analysis-report"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "Fintech analysis reports for clients should include regulatory context — how regulation affects the analysis and its recommendations."
    field_changes:
      - field: "Analysis framework"
        sector_label: "Analysis Framework (Regulatory Context)"
        sector_guidance: "Include regulatory constraints as a dimension of the analysis. Any recommendation must be assessed for regulatory feasibility — a commercially attractive strategy that violates regulations is not a recommendation but a liability."
