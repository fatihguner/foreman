# SaaS Industry Pack — Skill Overlays
#
# For 40 of the 158 Foreman skills, this file provides SaaS-specific context
# that the skill executor agent applies as additional framing. These overlays
# do not replace the base skill content — they add a SaaS lens.
#
# Selection criteria for the 40 skills:
#   - Frameworks with direct SaaS application (strategy, pricing, growth)
#   - Decision and thinking skills (used constantly in SaaS operator contexts)
#   - Negotiation skills (fundraising, partnerships, enterprise sales)
#   - Leadership skills most affected by SaaS organizational dynamics
#   - Game theory skills applicable to SaaS competitive strategy
#
# Relevance tiers:
#   critical — The SaaS overlay materially changes how the skill is applied.
#              The skill executor should always surface SaaS context.
#   high     — SaaS context adds significant value. Surface when relevant.
#   moderate — Useful SaaS framing but the base skill works well as-is.

