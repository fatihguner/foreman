# SaaS Industry Pack — Output Template Adaptations
#
# For each of the 48 Foreman output templates, this file defines how fields
# and sections adapt for SaaS companies. The output agent loads these rules
# when generating documents with the SaaS industry pack active.
#
# Adaptation types:
#   as-is    — The template works without modification for SaaS companies.
#   modified — The template requires field changes, additional sections, or
#              reframing of existing sections for SaaS context.

pack_metadata:
  sector: "saas"
  display_name: "SaaS"
  version: "1.0.0"
  author: "Fatih Guner"
  last_updated: "2026-03-26"

# ═══════════════════════════════════════════════════════════════
# TEMPLATE ADAPTATIONS
# ═══════════════════════════════════════════════════════════════

template_adaptations:

  # ─────────────────────────────────────────────
  # INVESTOR TEMPLATES (10)
  # ─────────────────────────────────────────────

  - template: "unit-economics-snapshot"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "This template is almost entirely SaaS-specific. The base template covers generic unit economics; the SaaS overlay replaces it with a complete SaaS metrics dashboard."
    field_changes:
      - field: "Revenue per unit"
        sector_label: "MRR / ARR"
        sector_guidance: "Report both MRR (current month) and ARR (MRR x 12). Decompose MRR into five components: New, Expansion, Reactivation, Contraction, Churned."
      - field: "Cost per unit"
        sector_label: "CAC (Fully Loaded)"
        sector_guidance: "Include all sales and marketing costs: salaries, commissions, tooling, content production, events, and allocated overhead. Report by channel and blended."
      - field: "Margin per unit"
        sector_label: "Gross Margin %"
        sector_guidance: "SaaS COGS includes hosting, infrastructure, support, customer success (if included in COGS), and third-party API costs. Target: 70-85%."
      - field: "Lifetime value"
        sector_label: "LTV (Gross-Profit Adjusted)"
        sector_guidance: "Calculate as ARPU x Gross Margin % / Monthly Revenue Churn Rate. Disclose churn rate assumption and average customer lifetime."
      - field: "Acquisition cost"
        sector_label: "CAC Payback Period"
        sector_guidance: "Report in months: CAC / (ARPU x Gross Margin %). This is the gross-margin-adjusted payback, not the revenue payback."
      - field: "Unit economics ratio"
        sector_label: "LTV:CAC Ratio"
        sector_guidance: "Report the ratio and compare to the 3x-5x benchmark. If below 3x, explain the improvement trajectory. If above 5x, address whether growth investment is sufficient."
    sections_to_add:
      - section_name: "SaaS Metrics Dashboard"
        placement: "before:Revenue per unit"
        description: "Core SaaS metrics in a standardized format that investors expect."
        fields:
          - "MRR (end of period)"
          - "ARR (end of period)"
          - "MoM Growth Rate (3-month average)"
          - "Net Revenue Retention (NRR)"
          - "Gross Revenue Retention (GRR)"
          - "Logo Churn (monthly)"
          - "Revenue Churn (monthly, gross)"
          - "Customers (total active)"
          - "ARPU (monthly)"
          - "ACV (new contracts)"
      - section_name: "Efficiency Metrics"
        placement: "after:Unit economics ratio"
        description: "Capital efficiency metrics that determine fundraising readiness and valuation."
        fields:
          - "Burn Multiple"
          - "Rule of 40 Score"
          - "Magic Number"
          - "SaaS Quick Ratio"
          - "Runway (months at current burn)"
      - section_name: "Cohort Analysis"
        placement: "end"
        description: "Retention and expansion by customer acquisition cohort."
        fields:
          - "Monthly cohort retention curves (graph or table)"
          - "Revenue retention by quarterly cohort"
          - "Expansion revenue by cohort vintage"
    sections_to_remove: []
    benchmark_references: ["mrr", "arr", "nrr", "grr", "cac", "ltv", "ltv-cac-ratio", "cac-payback-period", "gross-margin", "burn-multiple", "rule-of-40", "magic-number", "saas-quick-ratio"]

  - template: "investor-update-email"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS investor updates have a well-established format and metric set. Investors expect specific SaaS KPIs reported consistently each month. The template should enforce this standard."
    field_changes:
      - field: "Financial highlights"
        sector_label: "SaaS KPIs"
        sector_guidance: "Report: MRR, MoM Growth %, ARR, NRR (trailing 12-month), Burn Rate, Runway. Present as a small table with current month, prior month, and trend arrow."
      - field: "Key metrics"
        sector_label: "Operating Metrics"
        sector_guidance: "Report: New customers, churned customers, expansion MRR, CAC (blended), pipeline coverage. Choose 3-5 metrics that are most relevant to the current company focus."
      - field: "Wins"
        sector_label: "Wins"
        sector_guidance: "Include at least one quantified win: a named customer closed (with ACV if appropriate), a retention metric improvement, or a product milestone with measurable impact."
      - field: "Challenges"
        sector_label: "Challenges"
        sector_guidance: "Lead with challenges, not wins. Investors respect transparency. Describe the problem, the root cause hypothesis, and the planned response."
      - field: "Asks"
        sector_label: "Asks"
        sector_guidance: "Be specific. Not 'introductions to potential customers' but 'an introduction to [Name] at [Company] because [specific reason].' Give investors concrete ways to help."
    sections_to_add:
      - section_name: "Cash Position"
        placement: "after:SaaS KPIs"
        description: "Investors want to know runway at a glance."
        fields:
          - "Cash balance (end of month)"
          - "Monthly burn rate (trailing 3-month average)"
          - "Months of runway"
    sections_to_remove: []
    benchmark_references: ["mrr", "arr", "nrr", "burn-multiple"]

  - template: "competitive-landscape-brief"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS competitive dynamics are uniquely transparent — competitors' features, pricing, and positioning are publicly visible. The competitive brief should leverage this transparency and address the specific threat categories relevant to SaaS."
    field_changes:
      - field: "Competitor overview"
        sector_label: "Competitive Map"
        sector_guidance: "Map competitors on a 2x2 matrix: X-axis = market segment (SMB to Enterprise), Y-axis = product scope (point solution to platform). Position your product and each competitor. Include funding levels and estimated ARR where known."
      - field: "Competitive advantages"
        sector_label: "Defensibility Analysis"
        sector_guidance: "Assess defensibility along SaaS-specific dimensions: data moat (unique data assets), network effects (product improves with more users), integration ecosystem (switching costs from integrations), brand/community (organic distribution), and technical architecture (speed, reliability, unique capabilities)."
      - field: "Competitive threats"
        sector_label: "Threat Vectors"
        sector_guidance: "Categorize threats: (1) Direct competitors — same category, same segment. (2) Platform expansion — incumbents adding your feature. (3) Adjacent category expansion — companies in neighboring categories moving into your space. (4) AI disruption — general-purpose AI tools performing your product's function."
    sections_to_add:
      - section_name: "Win/Loss Analysis"
        placement: "after:Threat Vectors"
        description: "Data-driven competitive intelligence from the sales pipeline."
        fields:
          - "Win rate against each named competitor (last quarter)"
          - "Primary win reasons by competitor"
          - "Primary loss reasons by competitor"
          - "Deals lost to 'no decision' or 'built internally' (percentage)"
      - section_name: "Feature Comparison Matrix"
        placement: "after:Win/Loss Analysis"
        description: "Objective capability comparison across competitors."
        fields:
          - "Feature matrix (rows: key capabilities; columns: competitors; cells: present/absent/superior)"
          - "Pricing comparison (public pricing tiers and structure)"
          - "Integration ecosystem comparison (number and quality of integrations)"
      - section_name: "AI Threat Assessment"
        placement: "end"
        description: "Specific assessment of how AI tools affect the competitive landscape."
        fields:
          - "Which product capabilities can be replicated by general-purpose AI?"
          - "Which capabilities are defensible against AI substitution?"
          - "How is the company incorporating AI to strengthen its position?"
    sections_to_remove: []
    benchmark_references: ["win-rate", "nrr", "nps-saas"]

  - template: "fundraising-deck-outline"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS pitch decks have a well-established structure that investors expect. The SaaS overlay ensures the deck includes the specific metric slides and narrative structure that SaaS investors require."
    field_changes:
      - field: "Market opportunity"
        sector_label: "Market Opportunity"
        sector_guidance: "Present TAM/SAM/SOM with bottom-up validation. For SaaS, investors prefer: (target companies) x (annual willingness to pay) = SAM. Include market growth rate and secular tailwinds."
      - field: "Business model"
        sector_label: "SaaS Business Model"
        sector_guidance: "Cover: pricing model (per-seat/usage/tiered), GTM motion (PLG/sales-led/hybrid), customer segments, and the expansion revenue mechanism. Show how ACV and NRR drive compounding revenue."
      - field: "Traction"
        sector_label: "SaaS Traction Metrics"
        sector_guidance: "Dedicated slide with: ARR/MRR trajectory chart, customer count, NRR, logo retention, ARPU trend, and growth rate. This slide is the most scrutinized in any SaaS pitch."
    sections_to_add:
      - section_name: "Unit Economics Slide"
        placement: "after:SaaS Traction Metrics"
        description: "Dedicated unit economics presentation that investors expect in every SaaS pitch."
        fields:
          - "LTV:CAC ratio"
          - "CAC Payback Period"
          - "Gross Margin %"
          - "Burn Multiple"
          - "Cohort retention curve"
      - section_name: "Go-to-Market Slide"
        placement: "after:Unit Economics Slide"
        description: "The GTM motion is a critical evaluation criterion for SaaS investors."
        fields:
          - "GTM motion description (PLG, sales-led, hybrid)"
          - "Sales funnel metrics (top to bottom conversion rates)"
          - "CAC by channel"
          - "Pipeline coverage and win rate"
    sections_to_remove: []
    benchmark_references: ["arr", "nrr", "ltv-cac-ratio", "cac-payback-period", "gross-margin", "burn-multiple"]

  - template: "strategic-analysis-one-pager"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "A SaaS strategic one-pager must anchor analysis in SaaS-specific frameworks and metrics rather than generic strategic analysis."
    field_changes:
      - field: "Strategic position"
        sector_label: "SaaS Strategic Position"
        sector_guidance: "Frame position in SaaS terms: market segment, competitive differentiation, GTM efficiency, and retention moat. Include where the company sits on the product-led to sales-led spectrum."
      - field: "Key metrics"
        sector_label: "SaaS Health Metrics"
        sector_guidance: "Core 5: ARR + growth rate, NRR, LTV:CAC, Burn Multiple, Gross Margin. Compare each to stage-appropriate benchmarks."
    sections_to_add:
      - section_name: "SaaS Flywheel Assessment"
        placement: "end"
        description: "Assessment of the company's growth flywheel — the reinforcing loops that drive compounding growth."
        fields:
          - "Primary growth loop (acquisition > activation > retention > referral > acquisition)"
          - "Flywheel health indicators (which loops are working, which are broken)"
          - "Key constraint (the bottleneck in the flywheel)"
    sections_to_remove: []
    benchmark_references: ["arr", "nrr", "ltv-cac-ratio", "burn-multiple", "gross-margin"]

  - template: "market-opportunity-summary"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS market sizing uses specific methodologies (bottom-up company count x ACV, category spend analysis) and must address SaaS-specific dynamics like category creation, platform expansion, and AI disruption."
    field_changes:
      - field: "Total addressable market"
        sector_label: "TAM / SAM / SOM"
        sector_guidance: "Use bottom-up sizing: (number of target companies in segment) x (realistic annual contract value). Cross-reference with category spend data (Gartner, IDC). Do not use top-down GDP-fraction estimates."
      - field: "Market dynamics"
        sector_label: "SaaS Category Dynamics"
        sector_guidance: "Address: category maturity (emerging, growth, mature), buyer behavior (self-serve adoption, procurement complexity), competitive density (number of funded competitors), and platform risk (probability of a major platform entering)."
    sections_to_add:
      - section_name: "Category Evolution"
        placement: "end"
        description: "How the SaaS category is expected to evolve, including AI impact."
        fields:
          - "Current category state (fragmented, consolidating, mature)"
          - "AI impact thesis (how AI changes the category)"
          - "Predicted winner-take-most or winner-take-some dynamics"
    sections_to_remove: []
    benchmark_references: ["acv", "arr"]

  - template: "due-diligence-checklist"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS due diligence has specific areas of focus: metrics verification, churn cohort analysis, revenue quality assessment, and technical architecture review."
    field_changes:
      - field: "Financial review"
        sector_label: "SaaS Metrics Verification"
        sector_guidance: "Verify: ARR calculation methodology, MRR component decomposition, churn calculation (logo and revenue), NRR calculation, CAC calculation (fully loaded), and gross margin (COGS classification). Request access to billing system data."
      - field: "Operational review"
        sector_label: "GTM and Retention Review"
        sector_guidance: "Review: sales pipeline hygiene, win/loss data, customer health scores, support ticket trends, NPS data, and churn reasons. Request cohort retention data for the last 12 months."
    sections_to_add:
      - section_name: "Technical Due Diligence"
        placement: "end"
        description: "SaaS-specific technical assessment."
        fields:
          - "Architecture review (scalability, security, uptime history)"
          - "Technical debt assessment"
          - "Key technical dependencies (infrastructure, APIs, third-party services)"
          - "Security posture (SOC 2, penetration testing, data encryption)"
    sections_to_remove: []
    benchmark_references: ["arr", "nrr", "grr", "cac", "ltv", "gross-margin"]

  - template: "cap-table-summary"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Cap table structure is not SaaS-specific. Standard venture capital cap table formats apply regardless of sector."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "decision-rationale-memo"
    audience: "investor"
    sector_adaptation: "as-is"
    adaptation_rationale: "Decision rationale documentation follows a standard format across sectors. SaaS context is naturally incorporated through the specific decision being documented."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "exit-scenario-analysis"
    audience: "investor"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS exit scenarios are governed by well-known valuation multiples and acquirer categories. The template should incorporate SaaS-specific valuation methodologies."
    field_changes:
      - field: "Valuation methodology"
        sector_label: "SaaS Valuation Multiples"
        sector_guidance: "SaaS companies are valued on ARR multiples, modulated by growth rate and NRR. Report: current ARR, growth rate, NRR, and comparable company multiples (public and private). Rule of 40 score directly correlates with valuation multiples."
      - field: "Potential acquirers"
        sector_label: "SaaS Acquirer Landscape"
        sector_guidance: "Categorize: (1) Strategic acquirers (larger SaaS companies in adjacent categories), (2) Platform acquirers (major platforms that benefit from adding your capability), (3) PE acquirers (private equity firms acquiring profitable SaaS businesses), (4) Public company acquirers (acqui-hires or tuck-in acquisitions)."
    sections_to_add:
      - section_name: "SaaS Valuation Benchmarks"
        placement: "after:SaaS Valuation Multiples"
        description: "Current market multiples for SaaS companies by growth and profitability profile."
        fields:
          - "Public SaaS median ARR multiple (current)"
          - "Growth-adjusted ARR multiples (by Rule of 40 score)"
          - "Recent comparable M&A transactions with multiples"
    sections_to_remove: []
    benchmark_references: ["arr", "nrr", "rule-of-40"]

  # ─────────────────────────────────────────────
  # BOARD TEMPLATES (7)
  # ─────────────────────────────────────────────

  - template: "quarterly-strategic-review"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS board meetings follow a well-established cadence and metric set. Board members expect specific SaaS KPIs, cohort data, and efficiency metrics presented in a standardized format."
    field_changes:
      - field: "Financial summary"
        sector_label: "SaaS Financial Dashboard"
        sector_guidance: "Present: ARR waterfall (opening ARR + new + expansion - contraction - churn = closing ARR), MRR trend chart (12 months), gross margin trend, burn rate, and runway. Compare each metric to plan and to prior quarter."
      - field: "Strategic priorities"
        sector_label: "OKR Progress and Strategic Priorities"
        sector_guidance: "Report against quarterly OKRs with explicit metric outcomes. Flag any OKR that is off-track with root cause and corrective action. Present next quarter's strategic priorities with measurable targets."
      - field: "Risks"
        sector_label: "Risk Dashboard"
        sector_guidance: "Categorize: Product risks (technical debt, competitive feature gaps), GTM risks (pipeline coverage, churn trends, CAC increases), People risks (key person dependency, attrition), and Financial risks (runway, unit economics trends)."
    sections_to_add:
      - section_name: "SaaS Metrics Summary"
        placement: "before:SaaS Financial Dashboard"
        description: "One-page SaaS metrics dashboard that board members can review in 60 seconds."
        fields:
          - "ARR and growth rate (QoQ and YoY)"
          - "NRR and GRR"
          - "Customer count and logo churn"
          - "LTV:CAC and CAC Payback"
          - "Burn Multiple and runway"
          - "Rule of 40 score"
      - section_name: "Cohort Performance"
        placement: "after:SaaS Financial Dashboard"
        description: "Retention and expansion data by acquisition cohort."
        fields:
          - "Cohort retention curves (logo and revenue)"
          - "Cohort expansion trends"
          - "Cohort quality assessment (are recent cohorts performing better or worse than earlier ones?)"
      - section_name: "GTM Performance"
        placement: "after:Cohort Performance"
        description: "Go-to-market effectiveness metrics."
        fields:
          - "Pipeline coverage ratio"
          - "Win rate (overall and by segment)"
          - "Sales cycle length (trend)"
          - "Magic Number"
          - "CAC by channel"
    sections_to_remove: []
    benchmark_references: ["arr", "nrr", "grr", "ltv-cac-ratio", "cac-payback-period", "burn-multiple", "rule-of-40", "pipeline-coverage-ratio", "win-rate", "magic-number"]

  - template: "board-meeting-agenda"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS board meeting agendas should allocate time to the specific topics that SaaS board members expect: metrics review, GTM performance, product roadmap, and fundraising/runway discussion."
    field_changes:
      - field: "Agenda items"
        sector_label: "SaaS Board Agenda"
        sector_guidance: "Standard SaaS board agenda: (1) Metrics review — 15 min (pre-read, discussion only), (2) Strategic topic deep-dive — 30 min (one topic per meeting: GTM, product, hiring, pricing, competitive), (3) Fundraising/runway — 10 min, (4) CEO asks — 10 min (specific, actionable), (5) Executive session — 15 min. Total: 90 minutes maximum."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "risk-assessment-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS risk categories include sector-specific risks: infrastructure reliability, data security/privacy, platform dependency, and AI disruption."
    field_changes:
      - field: "Risk categories"
        sector_label: "SaaS Risk Categories"
        sector_guidance: "Include SaaS-specific categories: (1) Customer concentration risk — revenue dependency on top 10 customers. (2) Platform risk — dependency on cloud providers, API vendors, or distribution platforms. (3) Security and compliance risk — data breaches, regulatory changes, certification requirements. (4) Churn risk — NRR trend, cohort degradation, competitive displacement. (5) Technology risk — technical debt, AI disruption, architecture limitations."
    sections_to_add:
      - section_name: "Customer Concentration Analysis"
        placement: "end"
        description: "Revenue concentration risk assessment."
        fields:
          - "Revenue share of top 1, 5, and 10 customers"
          - "Largest single-customer dependency as % of ARR"
          - "Customer diversification trend (improving or worsening)"
    sections_to_remove: []
    benchmark_references: ["nrr", "logo-churn", "arr"]

  - template: "change-initiative-proposal"
    audience: "board"
    sector_adaptation: "as-is"
    adaptation_rationale: "Change initiative proposals follow a standard format. SaaS context is naturally incorporated through the specific initiative being proposed."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "compensation-review-brief"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS compensation includes equity-heavy packages, and comp benchmarking uses SaaS-specific data sources (Carta, Pave, levels.fyi for engineering)."
    field_changes:
      - field: "Compensation benchmarks"
        sector_label: "SaaS Compensation Benchmarks"
        sector_guidance: "Use SaaS-specific comp data: Pave, Carta, Levels.fyi (engineering), RepVue (sales). Benchmark by company stage (seed, Series A, B, C+), function, and geography. Include equity component as percentage of total comp."
    sections_to_add:
      - section_name: "Sales Compensation Structure"
        placement: "end"
        description: "SaaS sales compensation is structurally different and warrants specific analysis."
        fields:
          - "OTE structure (base:variable split, typically 50:50 for AEs)"
          - "Quota-to-OTE ratio (industry standard: 4-6x)"
          - "Accelerators and decelerators"
          - "Quota attainment distribution"
    sections_to_remove: []
    benchmark_references: ["acv"]

  - template: "regulatory-compliance-update"
    audience: "board"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS compliance centers on data privacy (GDPR, CCPA), security certifications (SOC 2), and increasingly on AI regulation."
    field_changes:
      - field: "Regulatory landscape"
        sector_label: "SaaS Compliance Landscape"
        sector_guidance: "Cover: data privacy regulations (GDPR, CCPA, emerging state/national laws), security certifications (SOC 2 Type II status, ISO 27001), industry-specific compliance (HIPAA for health, PCI for payments), and AI regulation (EU AI Act, emerging US frameworks)."
    sections_to_add:
      - section_name: "Data Processing and Privacy"
        placement: "end"
        description: "SaaS-specific data handling compliance."
        fields:
          - "Data processing agreement (DPA) status with all customers"
          - "Data residency and sovereignty compliance"
          - "Sub-processor list and compliance status"
          - "Data breach notification procedures and history"
    sections_to_remove: []
    benchmark_references: []

  - template: "ceo-succession-brief"
    audience: "board"
    sector_adaptation: "as-is"
    adaptation_rationale: "CEO succession planning follows standard corporate governance practices regardless of sector."
    field_changes: []
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  # ─────────────────────────────────────────────
  # TEAM TEMPLATES (13)
  # ─────────────────────────────────────────────

  - template: "action-plan"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS action plans should be metric-driven with clear KPI targets, owner assignments, and weekly measurement cadence."
    field_changes:
      - field: "Success metrics"
        sector_label: "SaaS KPI Targets"
        sector_guidance: "Define success using SaaS metrics: MRR impact, churn reduction target, activation rate improvement, NPS change, or pipeline coverage increase. Every action item should connect to a measurable SaaS KPI."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "new-initiative-brief"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS initiative briefs should include unit economics impact and the effect on key SaaS metrics."
    field_changes:
      - field: "Expected outcomes"
        sector_label: "Expected SaaS Impact"
        sector_guidance: "Quantify impact on SaaS metrics: expected MRR contribution, churn reduction, CAC improvement, activation rate increase, or NRR improvement. Include the time to measurable impact."
      - field: "Resource requirements"
        sector_label: "Resource Requirements and Opportunity Cost"
        sector_guidance: "In SaaS, engineering capacity is the scarcest resource. Quantify the engineering weeks required and the opportunity cost — what will not be built if this initiative is prioritized."
    sections_to_add:
      - section_name: "Metric Impact Model"
        placement: "after:Expected SaaS Impact"
        description: "Quantitative model of how the initiative affects the SaaS flywheel."
        fields:
          - "Primary metric impacted and expected delta"
          - "Secondary metrics affected"
          - "Time to measurable impact"
          - "Confidence level (high/medium/low) with supporting rationale"
    sections_to_remove: []
    benchmark_references: ["mrr", "nrr", "cac", "activation-rate"]

  - template: "project-kickoff-document"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS project kickoffs should define success in terms of product metrics and include a measurement plan."
    field_changes:
      - field: "Success criteria"
        sector_label: "Success Metrics and Measurement Plan"
        sector_guidance: "Define 2-3 SaaS metrics that this project will move. Include baseline measurement, target, measurement method, and evaluation date. Common: activation rate, time to value, NPS delta, churn reduction, expansion MRR contribution."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["activation-rate", "time-to-value", "nrr"]

  - template: "hiring-scorecard"
    audience: "team"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS hiring scorecards should include SaaS-specific competency assessments, especially for GTM and product roles."
    field_changes:
      - field: "Required competencies"
        sector_label: "SaaS-Specific Competencies"
        sector_guidance: "For GTM roles: SaaS sales motion experience (PLG, inside sales, field sales), understanding of SaaS metrics, experience at the relevant company stage. For product roles: experience with subscription/usage products, data-driven product management, PLG or sales-led product experience. For engineering roles: SaaS architecture experience (multi-tenant, API-first, CI/CD)."
    sections_to_add:
      - section_name: "Stage Fit Assessment"
        placement: "end"
        description: "Assessment of whether the candidate's experience matches the company's current stage."
