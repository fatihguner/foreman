        sector_guidance: "Include: Investors (lead, follow-on, angels, advisors), Customers (champions, economic buyers, technical evaluators), Partners (platform, integration, channel, technology), Team (executives, key ICs, advisors), and Market (analysts, media, community leaders)."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "negotiation-prep-sheet"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS negotiation prep should include SaaS-specific negotiation contexts and leverage points."
    field_changes:
      - field: "Negotiation type"
        sector_label: "SaaS Negotiation Context"
        sector_guidance: "Classify: enterprise deal (contract terms), fundraising (term sheet), partnership (integration/channel terms), M&A (acquisition terms), or internal (resource allocation, compensation). Each type has distinct SaaS-specific dynamics and leverage points."
      - field: "BATNA"
        sector_label: "BATNA and SaaS Leverage"
