  # ─────────────────────────────────────────────
  # CLIENT TEMPLATES (8)
  # ─────────────────────────────────────────────

  - template: "quarterly-business-review"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS QBRs are the primary retention and expansion vehicle. The template should structure the QBR around value delivered, usage trends, and growth opportunities."
    field_changes:
      - field: "Performance summary"
        sector_label: "Value Delivered"
        sector_guidance: "Quantify the value the SaaS product delivered this quarter: time saved, revenue generated, costs reduced, errors prevented, or compliance maintained. Use the customer's own metrics and language, not your product metrics."
      - field: "Account status"
        sector_label: "Usage and Adoption Metrics"
        sector_guidance: "Present: active users vs. licensed users, feature adoption by module, usage trend (growing, stable, declining), and comparison to peer accounts in the same segment."
      - field: "Next steps"
        sector_label: "Growth Opportunities"
        sector_guidance: "Identify expansion opportunities: additional seats, new modules, higher tier, or new use cases. Frame as business outcomes, not product features. Include a mutual success plan with milestones for the next quarter."
    sections_to_add:
      - section_name: "Health Score"
        placement: "before:Value Delivered"
        description: "Overall account health assessment."
        fields:
          - "Account health score (methodology transparent to the customer)"
          - "Usage trend indicator"
          - "Support interaction summary"
          - "Renewal timeline and status"
    sections_to_remove: []
    benchmark_references: ["nrr", "nps-saas"]

  - template: "onboarding-welcome-packet"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS onboarding directly determines activation rate and time to value — two of the most important product metrics. The welcome packet should be structured to minimize time to value."
    field_changes:
      - field: "Getting started steps"
        sector_label: "Time-to-Value Path"
        sector_guidance: "Define the shortest path to the activation milestone. Organize steps as: (1) Critical first action (what to do in the first 30 minutes), (2) Foundation setup (first day), (3) Team onboarding (first week), (4) Full activation (first month). Each step should include estimated time and a clear 'done' criterion."
      - field: "Resources"
        sector_label: "Self-Serve Resources"
        sector_guidance: "Include: knowledge base link, video tutorial library, community forum, and office hours schedule. Prioritize self-serve resources over human touch for scalability."
    sections_to_add:
      - section_name: "Success Milestones"
        placement: "end"
        description: "Defined milestones that predict long-term retention."
        fields:
          - "30-day activation milestone (specific action)"
          - "60-day adoption milestone"
          - "90-day value realization milestone"
          - "Check-in schedule with customer success"
    sections_to_remove: []
    benchmark_references: ["time-to-value", "activation-rate"]

  - template: "proposal-outline"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS proposals should frame the investment as an ongoing subscription with measurable ROI, not a one-time purchase."
    field_changes:
      - field: "Pricing"
        sector_label: "Investment and ROI"
        sector_guidance: "Present: subscription pricing (monthly and annual options), implementation costs (if any, presented separately), and a clear ROI model showing when the investment pays for itself. Frame as ongoing value delivery, not a cost."
      - field: "Scope"
        sector_label: "Implementation Scope and Timeline"
        sector_guidance: "For SaaS: define the implementation phases (setup, data migration, integration, training, go-live), the timeline for each phase, and the customer's time commitment. Set expectations for time to value."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["acv", "time-to-value"]

  - template: "service-level-agreement"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS SLAs have specific standard structures: uptime commitments, support response times, data handling, and remediation terms."
    field_changes:
      - field: "Service levels"
        sector_label: "SaaS Service Commitments"
        sector_guidance: "Standard SaaS SLA components: (1) Uptime commitment (99.9% or 99.95% for enterprise), (2) Planned maintenance windows, (3) Support response time by severity (P0: 1 hour, P1: 4 hours, P2: 1 business day, P3: 2 business days), (4) Data backup and recovery commitments, (5) Security and compliance commitments."
      - field: "Remediation"
        sector_label: "Credit and Remediation Terms"
        sector_guidance: "Define: service credit structure for SLA breaches (typically 5-10% of monthly fee per breach, capped at 30% of monthly fee), termination rights for sustained breaches, and notification obligations."
    sections_to_add:
      - section_name: "Data Processing Terms"
        placement: "end"
        description: "Data handling commitments standard in SaaS contracts."
        fields:
          - "Data ownership and portability"
          - "Data processing and privacy (DPA reference)"
          - "Data deletion upon contract termination"
          - "Sub-processor disclosure"
    sections_to_remove: []
    benchmark_references: []

  - template: "project-status-update"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS project status updates (typically for implementation projects) should track progress toward the activation milestone and time to value."
    field_changes:
      - field: "Progress summary"
        sector_label: "Implementation Progress"
        sector_guidance: "Track against the implementation phases defined in the onboarding plan. Report: phase completion status, blockers (especially customer-side dependencies), and projected time to go-live/activation."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["time-to-value"]

  - template: "analysis-report"
    audience: "client"
    sector_adaptation: "as-is"
