  - template: "case-study-template"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS case studies should follow a quantified-outcome structure that buyers can use to build internal business cases."
    field_changes:
      - field: "Results"
        sector_label: "Quantified Outcomes"
        sector_guidance: "Every SaaS case study must include at least 2-3 quantified outcomes: time saved (hours/week), revenue impact (% increase or dollar amount), cost reduction (% or dollar amount), or error reduction (% decrease). Abstract outcomes ('improved efficiency') are insufficient."
      - field: "Challenge"
        sector_label: "Challenge and Buying Context"
        sector_guidance: "Include: the business problem (not the product gap), what the customer was using before, what triggered the evaluation, and what other solutions they considered. This helps prospects see themselves in the story."
    sections_to_add:
      - section_name: "Implementation Details"
        placement: "after:Quantified Outcomes"
        description: "Practical details that help prospects understand the adoption path."
        fields:
          - "Implementation timeline"
          - "Team involvement required"
          - "Time to value (when outcomes were first realized)"
          - "Integration with existing stack"
    sections_to_remove: []
    benchmark_references: ["time-to-value"]

  - template: "partnership-memo"
    audience: "client"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS partnership memos should address the integration architecture, data sharing terms, and go-to-market collaboration structure."
    field_changes:
      - field: "Partnership structure"
        sector_label: "SaaS Partnership Structure"
        sector_guidance: "Define: partnership type (technology integration, channel, platform, strategic alliance), technical integration scope (API access, data sharing, SSO, embedded/white-label), commercial terms (revenue share, referral fees, co-marketing budget), and governance (joint review cadence, escalation path, integration SLA)."
    sections_to_add:
      - section_name: "Integration Architecture"
        placement: "after:SaaS Partnership Structure"
        description: "Technical specification of the partnership integration."
        fields:
          - "Integration approach (API, webhook, embedded, SSO)"
          - "Data sharing scope and limitations"
          - "Security and compliance requirements"
          - "Maintenance and versioning responsibilities"
    sections_to_remove: []
