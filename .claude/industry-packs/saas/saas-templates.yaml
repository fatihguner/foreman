  - template: "weekly-ceo-review"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "A SaaS CEO's weekly review should be structured around the SaaS metrics that drive decision-making, with a specific cadence of what to review weekly versus monthly."
    field_changes:
      - field: "Weekly metrics"
        sector_label: "Weekly SaaS Dashboard"
        sector_guidance: "Review weekly: MRR and WoW change, new sign-ups and activations, support ticket volume and response time, pipeline changes, cash balance. Monthly metrics (NRR, churn, CAC) should be reviewed on a monthly cadence, not weekly — weekly fluctuations are noise."
      - field: "Priorities"
        sector_label: "This Week's Priorities"
        sector_guidance: "Identify the single most important thing for the week. In SaaS, this is often: closing a specific deal, resolving a customer escalation, making a hiring decision, or shipping a feature. Ruthless prioritization — not a list of 10 items."
    sections_to_add:
      - section_name: "Customer Signal Review"
        placement: "after:Weekly SaaS Dashboard"
        description: "Weekly review of qualitative customer signals."
        fields:
          - "Churn reasons this week (if any)"
          - "Customer escalations and their resolution"
          - "Positive signals (expansion conversations, referrals, testimonials)"
    sections_to_remove: []
    benchmark_references: ["mrr", "activation-rate"]

  - template: "decision-journal"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS decision journals should explicitly capture the metrics that informed the decision and the metric-based criteria for evaluating whether the decision was correct."
    field_changes:
      - field: "Decision context"
        sector_label: "Decision Context and Data"
        sector_guidance: "Record: the SaaS metrics that informed this decision, the alternatives considered, and the specific metric outcome that will confirm the decision was correct. For reversible decisions, note the 'kill criteria' — what metric threshold would trigger reversal."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: []

  - template: "annual-review-and-planning"
    audience: "self"
    sector_adaptation: "modified"
    adaptation_rationale: "SaaS annual reviews should assess performance against SaaS-specific milestones and set the following year's targets using SaaS benchmarks."
    field_changes:
      - field: "Year in review"
        sector_label: "SaaS Year in Review"
        sector_guidance: "Assess: ARR growth (actual vs. plan), NRR trend, unit economics evolution (LTV:CAC, CAC Payback), team growth, product milestones, and capital efficiency (burn multiple). Compare to beginning-of-year targets."
      - field: "Next year goals"
        sector_label: "Next Year SaaS Targets"
        sector_guidance: "Set targets across all SaaS dimensions: ARR target, NRR target, efficiency targets (burn multiple, gross margin), product targets (activation rate, time to value), and team targets (headcount, key hires). Each target should reference the benchmark tier being targeted."
    sections_to_add: []
    sections_to_remove: []
    benchmark_references: ["arr", "nrr", "ltv-cac-ratio", "burn-multiple", "gross-margin"]

